<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Adividiardi</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #040507;
      --bg2: #090b10;
      --ink: #e8e0d1;
    }
    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.018), transparent 24%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      font-family: Cambria, Georgia, "Times New Roman", serif;
      touch-action: none;
    }
    body { min-height: 100dvh; }
    #stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
      isolation: isolate;
    }
    #particles, #quotes, #wordmark-wrap, #veil {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #veil::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(78vw, 760px);
      height: 1px;
      transform: translate(-50%, -50%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    }
    #wordmark-wrap {
      display: grid;
      place-items: center;
    }
    #wordmark {
      position: relative;
      display: inline-block;
      animation: breathe 15s ease-in-out infinite;
      will-change: opacity, filter, transform;
    }
    #wordmark::after {
      content: "";
      position: absolute;
      inset: -20px -24px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(232,224,209,0.06), rgba(232,224,209,0.015) 36%, transparent 74%);
      opacity: var(--after-opacity, 0.04);
      filter: blur(22px);
      z-index: -1;
      will-change: opacity, transform;
    }
    .title-letter {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      white-space: pre;
      color: rgba(232,224,209,0.24);
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(255,255,255,0.02);
      will-change: transform, color, text-shadow;
    }
    .quote {
      position: absolute;
      max-width: min(38vw, 320px);
      color: rgba(232,224,209,1);
      opacity: 0;
      filter: blur(0.7px);
      transition: opacity 1000ms ease;
      will-change: opacity;
    }
    .quote.left { text-align: left; }
    .quote.right { text-align: right; }
    .quote .body {
      font-size: clamp(13px, 1.4vw, 18px);
      line-height: 1.42;
      letter-spacing: 0.01em;
    }
    .quote .cite {
      margin-top: 8px;
      font-size: clamp(11px, 1vw, 13px);
      color: rgba(232,224,209,1);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.95); }
      50% { transform: scale(1.05); }
    }
    @media (max-width: 720px) {
      .quote { max-width: min(62vw, 260px); }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Interactive Adividiardi landing page">
    <canvas id="particles"></canvas>
    <div id="veil"></div>
    <div id="quotes"></div>
    <div id="wordmark-wrap"><div id="wordmark" aria-label="ADIVIDIARDI"></div></div>
  </main>

  <script>
    (() => {
      const TITLE = 'ADIVIDIARDI';
      const QUOTES = [
        { body: '"The world is my representation."', cite: 'Arthur Schopenhauer' },
        { body: '"The eternal silence of these infinite spaces terrifies me."', cite: 'Blaise Pascal' },
        { body: '"No man ever steps in the same river twice."', cite: 'Heraclitus' },
        { body: '"Be patient toward all that is unsolved in your heart."', cite: 'Rainer Maria Rilke' },
        { body: '"The mystery of life is not a problem to be solved but a reality to be experienced."', cite: 'Søren Kierkegaard' }
      ];

      const stage = document.getElementById('stage');
      const particlesCanvas = document.getElementById('particles');
      const pctx = particlesCanvas.getContext('2d');
      const word = document.getElementById('wordmark');
      const quotesEl = document.getElementById('quotes');
      if (!pctx) return;

      const measureCanvas = document.createElement('canvas');
      const measureCtx = measureCanvas.getContext('2d');
      const titleLetters = [];
      const particles = [];
      const lights = [];
      const zones = [];
      let activeQuote = null;
      let nextQuoteAt = 0;
      let lastFrame = 0;

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(min, max) { return min + Math.random() * (max - min); }
      function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

      function setCanvasSize(canvas, ctx) {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(stage.clientWidth * dpr);
        canvas.height = Math.round(stage.clientHeight * dpr);
        canvas.style.width = stage.clientWidth + 'px';
        canvas.style.height = stage.clientHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function buildZones() {
        const w = stage.clientWidth, h = stage.clientHeight;
        zones.length = 0;
        zones.push({ x: w * 0.18, y: h * 0.24, align: 'left' });
        zones.push({ x: w * 0.79, y: h * 0.29, align: 'right' });
        zones.push({ x: w * 0.18, y: h * 0.71, align: 'left' });
        zones.push({ x: w * 0.8, y: h * 0.68, align: 'right' });
      }

      function buildTitle() {
        titleLetters.length = 0;
        word.innerHTML = '';
        const fontSize = clamp(stage.clientWidth * 0.105, 38, 108);
        const tracking = fontSize * 0.08;
        measureCtx.font = `700 ${fontSize}px Cambria, Georgia, Times New Roman, serif`;
        const widths = [...TITLE].map(ch => measureCtx.measureText(ch).width);
        const total = widths.reduce((a, b) => a + b, 0) + tracking * (widths.length - 1);
        word.style.width = `${Math.ceil(total)}px`;
        word.style.height = `${Math.ceil(fontSize * 1.2)}px`;
        let x = 0;
        for (let i = 0; i < TITLE.length; i++) {
          const span = document.createElement('span');
          span.className = 'title-letter';
          span.textContent = TITLE[i];
          span.style.fontSize = `${fontSize}px`;
          const baseX = x + widths[i] / 2;
          span.style.left = `${baseX}px`;
          word.appendChild(span);
          titleLetters.push({ el: span, baseX, x: baseX, y: 0, vx: 0, vy: 0 });
          x += widths[i] + tracking;
        }
      }

      function seedParticles() {
        particles.length = 0;
        for (let i = 0; i < 72; i++) {
          particles.push({
            x: Math.random() * stage.clientWidth,
            y: Math.random() * stage.clientHeight,
            vx: rand(-0.012, 0.012),
            vy: rand(-0.008, 0.008),
            size: Math.random() > 0.86 ? 2 : 1,
            tw: Math.random() * Math.PI * 2,
            alpha: rand(0.16, 0.34)
          });
        }
      }

      function nearestZoneIndex(x, y) {
        let best = 0, bestDist = Infinity;
        for (let i = 0; i < zones.length; i++) {
          const d = dist(x, y, zones[i].x, zones[i].y);
          if (d < bestDist) { best = i; bestDist = d; }
        }
        return best;
      }

      function showQuoteAtZone(zoneIndex, forced = false) {
        const zone = zones[zoneIndex];
        if (!zone) return;
        if (activeQuote && activeQuote.zoneIndex === zoneIndex) {
          activeQuote.born = performance.now();
          return;
        }
        if (activeQuote) {
          activeQuote.el.remove();
          activeQuote = null;
        }
        const pool = QUOTES.filter(q => !activeQuote || q.body !== activeQuote.body);
        const quote = pool[Math.floor(Math.random() * pool.length)];
        const el = document.createElement('div');
        el.className = `quote ${zone.align}`;
        el.innerHTML = `<div class="body">${quote.body}</div><div class="cite">${quote.cite}</div>`;
        el.style.left = `${zone.x}px`;
        el.style.top = `${zone.y}px`;
        el.style.transform = zone.align === 'right' ? 'translate(-100%, -50%)' : 'translate(0, -50%)';
        quotesEl.appendChild(el);
        activeQuote = {
          ...quote,
          el,
          zoneIndex,
          x: zone.x,
          y: zone.y,
          align: zone.align,
          born: performance.now(),
          life: forced ? rand(8000, 12000) : rand(10000, 15000),
          reveal: 0,
          graceUntil: 0,
          swayX: 0,
          swayY: 0,
          svx: 0,
          svy: 0
        };
      }

      function addLight(x, y, strength = 1, ttl = 1500) {
        lights.push({ x, y, strength, ttl, maxTtl: ttl });
      }

      function pointerLight(event, strength = 1) {
        const rect = stage.getBoundingClientRect();
        const p = event.touches ? event.touches[0] : event;
        const x = p.clientX - rect.left;
        const y = p.clientY - rect.top;
        const ttl = event.touches ? 1600 : 1200;
        const existing = lights.find(light => light.kind === 'pointer');
        if (existing) {
          existing.x = x;
          existing.y = y;
          existing.strength = Math.max(existing.strength, strength);
          existing.ttl = ttl;
          existing.maxTtl = 8000;
        } else {
          lights.push({ x, y, strength, ttl, maxTtl: 8000, kind: 'pointer' });
        }
        showQuoteAtZone(nearestZoneIndex(x, y), true);
      }

      function lightAt(x, y) {
        let total = 0;
        for (const light of lights) {
          const d = dist(x, y, light.x, light.y);
          const radius = light.kind === 'pointer' ? (68 + light.strength * 62) : (96 + light.strength * 64);
          const life = clamp(light.ttl / light.maxTtl, 0, 1);
          const easedLife = Math.pow(life, 0.55);
          total += Math.max(0, 1 - d / radius) * light.strength * easedLife;
        }
        return clamp(total, 0, 1);
      }

      function updateQuotes(now, dt) {
        if (activeQuote) {
          const q = activeQuote;
          const age = now - q.born;
          if (age > q.life) {
            q.el.remove();
            activeQuote = null;
          } else {
            const light = clamp(lightAt(q.x + (q.align === 'right' ? -30 : 30), q.y) * 4.2, 0, 1);
            q.reveal = lerp(q.reveal, light, 0.18);
            const fadeIn = clamp(age / 900, 0, 1);
            const fadeOut = clamp((q.life - age) / 1800, 0, 1);
            const opacity = Math.min(fadeIn, fadeOut) * (q.reveal * 0.34);
            q.el.style.opacity = opacity.toFixed(3);
            q.el.style.filter = `blur(${0.9 - q.reveal * 0.65}px)`;
            q.el.style.textShadow = `0 0 ${4 + q.reveal * 18}px rgba(232,224,209,${q.reveal * 0.16})`;

            let fx = 0, fy = 0;
            for (const lightObj of lights) {
              const dx = q.x - lightObj.x;
              const dy = q.y - lightObj.y;
              const d = Math.hypot(dx, dy) || 1;
              const influence = Math.max(0, 1 - d / 130) * lightObj.strength;
              fx += (dx / d) * influence * 0.004;
              fy += (dy / d) * influence * 0.003;
            }
            q.svx += fx + (-q.swayX) * 0.08;
            q.svy += fy + (-q.swayY) * 0.08;
            q.svx *= 0.62;
            q.svy *= 0.62;
            q.swayX = clamp(q.swayX + q.svx * dt * 0.02, -1.2, 1.2);
            q.swayY = clamp(q.swayY + q.svy * dt * 0.02, -0.9, 0.9);
            const base = q.align === 'right' ? 'translate(-100%, -50%)' : 'translate(0, -50%)';
            q.el.style.transform = `${base} translate(${q.swayX}px, ${q.swayY}px)`;
          }
        }
        if (!activeQuote && now >= nextQuoteAt) {
          showQuoteAtZone(Math.floor(Math.random() * zones.length), false);
          nextQuoteAt = now + rand(14000, 24000);
        }
      }

      function updateParticles(now, dt) {
        const w = stage.clientWidth, h = stage.clientHeight;
        for (const p of particles) {
          p.tw += dt * 0.00045;
          for (const light of lights) {
            const dx = p.x - light.x;
            const dy = p.y - light.y;
            const d = Math.hypot(dx, dy) || 1;
            const influence = Math.max(0, 1 - d / 165) * light.strength * 0.0105;
            p.vx += (dx / d) * influence;
            p.vy += (dy / d) * influence;
          }
          p.vx *= 0.99915;
          p.vy *= 0.99915;
          p.x += p.vx * dt * 0.026;
          p.y += p.vy * dt * 0.026;
          if (p.x < -6) p.x = w + 6;
          if (p.x > w + 6) p.x = -6;
          if (p.y < -6) p.y = h + 6;
          if (p.y > h + 6) p.y = -6;
        }
      }

      function drawParticles(now) {
        pctx.clearRect(0, 0, stage.clientWidth, stage.clientHeight);
        for (const p of particles) {
          const local = lightAt(p.x, p.y);
          const pulse = 0.5 + Math.sin(now * 0.0007 + p.tw) * 0.5;
          const alpha = (p.alpha * 0.44) + local * (0.28 + pulse * 0.18);
          pctx.globalAlpha = alpha;
          pctx.shadowBlur = local > 0.01 ? (3 + local * 13) : 0;
          pctx.shadowColor = `rgba(241,234,220,${local * 0.24})`;
          pctx.fillStyle = '#f1eadc';
          pctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
        }
        pctx.globalAlpha = 1;
        pctx.shadowBlur = 0;
      }


      function updateLights(dt) {
        for (let i = lights.length - 1; i >= 0; i--) {
          lights[i].ttl -= dt;
          if (lights[i].ttl <= 0) lights.splice(i, 1);
        }
      }

      function updateTitle(dt) {
        const w = stage.clientWidth;
        const h = stage.clientHeight;
        const wordLeft = (w - word.offsetWidth) * 0.5;
        let titleGlow = 0;
        for (const l of titleLetters) {
          let fx = 0, fy = 0, localLight = 0;
          for (const light of lights) {
            const lx = wordLeft + l.baseX;
            const ly = h * 0.5;
            const dx = lx - light.x;
            const dy = ly - light.y;
            const d = Math.hypot(dx, dy) || 1;
            const influence = Math.max(0, 1 - d / 160) * light.strength;
            localLight = Math.max(localLight, influence);
            fx += (dx / d) * influence * 0.05;
            fy += (dy / d) * influence * 0.034;
          }
          titleGlow = Math.max(titleGlow, localLight);
          l.vx += fx + (l.baseX - l.x) * 0.17;
          l.vy += fy + (0 - l.y) * 0.19;
          l.vx *= 0.53;
          l.vy *= 0.53;
          l.x += l.vx * dt * 0.045;
          l.y += l.vy * dt * 0.045;
          const glow = clamp(localLight, 0, 1);
          l.el.style.color = `rgba(232,224,209,${0.24 + glow * 0.76})`;
          l.el.style.textShadow = `0 1px 0 rgba(255,255,255,0.01), 0 0 ${glow * 20}px rgba(232,224,209,${glow * 0.15})`;
          l.el.style.transform = `translate(-50%, -50%) translate(${l.x - l.baseX}px, ${l.y}px) scale(${1 + glow * 0.018}, ${1 - glow * 0.006})`;
        }
        word.style.filter = `blur(${titleGlow * 0.18}px)`;
        word.style.opacity = (0.72 + titleGlow * 0.28).toFixed(3);
        word.style.textShadow = `0 0 ${titleGlow * 18}px rgba(232,224,209,${titleGlow * 0.08})`;
        word.style.setProperty('--after-opacity', (0.04 + titleGlow * 0.08).toFixed(3));
      }

      function resize() {
        setCanvasSize(particlesCanvas, pctx);
        buildZones();
        buildTitle();
        seedParticles();
        if (activeQuote) {
          activeQuote.el.remove();
          activeQuote = null;
        }
      }

      function frame(now) {
        const dt = Math.min(32, now - (lastFrame || now));
        lastFrame = now;
        updateLights(dt);
        updateParticles(now, dt);
        updateQuotes(now, dt);
        updateTitle(dt);
        drawParticles(now);
        requestAnimationFrame(frame);
      }

      stage.addEventListener('pointerdown', (event) => pointerLight(event, 1.05));
      stage.addEventListener('pointermove', (event) => {
        if (event.pointerType === 'mouse') pointerLight(event, 0.14);
        else if (event.buttons) pointerLight(event, 0.28);
      });
      stage.addEventListener('touchstart', (event) => pointerLight(event, 1.0), { passive: true });
      stage.addEventListener('touchmove', (event) => pointerLight(event, 0.3), { passive: true });
      window.addEventListener('resize', resize);

      resize();
      lights.push({ x: stage.clientWidth * 0.5, y: stage.clientHeight * 0.5, strength: 0.18, ttl: 900, maxTtl: 2200, kind: 'ambient' });
      nextQuoteAt = performance.now() + 10000;
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
