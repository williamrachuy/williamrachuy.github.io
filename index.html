<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Adividiardi</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #040507;
      --bg2: #090b10;
    }
    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.018), transparent 24%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      font-family: Cambria, Georgia, "Times New Roman", serif;
      touch-action: none;
    }
    body { min-height: 100dvh; }
    #stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
      isolation: isolate;
    }
    #particles, #wordmark-wrap, #veil {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #wordmark-wrap { display: grid; align-items: start; justify-content: center; padding-top: 18dvh; }
    #wordmark {
      position: relative;
      display: inline-block;
      transform-origin: center center;
      animation: none;
      will-change: opacity, filter;
    }
    #wordmark::after {
      content: "";
      position: absolute;
      inset: -20px -24px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(232,224,209,0.06), rgba(232,224,209,0.015) 36%, transparent 74%);
      opacity: var(--after-opacity, 0.04);
      filter: blur(22px);
      z-index: -1;
      will-change: opacity;
    }
    .title-letter {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      white-space: pre;
      color: rgba(232,224,209,0.24);
      font-weight: 400;
      text-shadow: 0 1px 0 rgba(255,255,255,0.02);
      will-change: color, text-shadow;
    }
  #ver-stamp {
    position: fixed;
    bottom: max(12px, env(safe-area-inset-bottom, 12px));
    right: 12px;
    font: 11px/1 monospace;
    color: rgba(170,200,216,0.38);
    pointer-events: none;
    z-index: 9999;
    user-select: none;
    white-space: nowrap;
  }
  </style>
</head>
<body>
  <div id="ver-stamp"></div>
  <main id="stage" aria-label="Interactive Adividiardi landing page">
    <canvas id="particles"></canvas>
    <div id="veil"></div>
    <div id="wordmark-wrap"><div id="wordmark" aria-label="ADIVIDIARDI"></div></div>
  </main>
  <script>
    (() => {
      const TITLE   = 'ADIVIDIARDI';
      const VERSION = '20260717.3';
      const COMMIT  = 'pending';

      const stage          = document.getElementById('stage');
      const versionStamp    = document.getElementById('ver-stamp');
      const particlesCanvas = document.getElementById('particles');
      const pctx           = particlesCanvas.getContext('2d');
      const word           = document.getElementById('wordmark');
      const audioSources = {
        nautilus: 'audio/Nautilus.mp3',
        endless: 'audio/endless.mp3',
        chripper: 'audio/Chripper.mp3',
        following_a_deviatioin: 'audio/Following a Deviatioin.mp3',
        hypersthene: 'audio/Hypersthene.mp3',
        lsd_1: 'audio/LSD 1.mp3',
        lsd_2: 'audio/LSD 2.mp3',
        lux: 'audio/Lux.mp3',
        portal_open: 'audio/Portal Open.mp3',
        quadruple: 'audio/Quadruple.mp3',
        singest: 'audio/Singest.mp3',
        sovereign: 'audio/Sovereign.mp3',
        spiral_observations: 'audio/Spiral Observations 2.mp3',
        traversion_approach: 'audio/Traversion Approach.mp3',
        camerons_art: 'audio/Camerons Art.mp3',
        documents: 'audio/Documents.mp3',
        elevator: 'audio/Elevator.mp3',
        msr_trimmed: 'audio/MSR Trimmed.mp3',
      };
      const audioElements = {}; // lazy-created on first click; no page-load audio GETs
      let currentAudioKey = null;
      if (!pctx) return;

      const measureCanvas = document.createElement('canvas');
      const measureCtx    = measureCanvas.getContext('2d');
      const titleLetters  = [];
      const particles     = [];
      const lights        = [];
      // spawnQueue removed — particles now regrow in place
      const appParticles     = []; // living particles — one per sub-page, immune to ablation
      const hotParticles     = []; // subset of particles with heat≥0.3 — rebuilt each frame
      const liberatedNodes   = []; // VE nodes after full dissolution — persist forever
      const catOrbImg    = new Image(); catOrbImg.src = 'catorb.png';
      const aboutQuestionImg = new Image(); aboutQuestionImg.src = 'about/question.svg?v=20260630.9';
      const cubeCobraCardbackImg = new Image(); cubeCobraCardbackImg.src = 'assets/cube-cobra-cardback.png';
      const gregEganCoverImg = new Image(); gregEganCoverImg.src = 'assets/greg-egan-cover.jpg';
      const gebCoverImg = new Image(); gebCoverImg.src = 'assets/geb-cover.jpg';
      const paleBlueDotCoverImg = new Image(); paleBlueDotCoverImg.src = 'assets/pale-blue-dot-cover.jpg';
      const qrCodeImg = new Image(); qrCodeImg.src = 'assets/adividiardi-qr.png';
      const eveningHorseImg = new Image(); eveningHorseImg.src = 'assets/evening-horse-head.png';
      const catMeowAudio = new Audio('meow.mp3');
      let cat           = null;   // reference to world-cup AppParticle after seed
      let catCursorX    = -9999;  // cursor position for pet-seeking
      let catCursorY    = -9999;
      let lastFrame       = 0;
      let holdActive      = false; // true while mouse/touch is held down
      let orbInteractionActive = false; // suppress VE activation while pressing an orb
      const ORB_RELEASE_CLICK_WINDOW_MS = 500;
      const ORB_POINTER_CAPTURE_SCALE = 1.12;       // pointerdown capture only; click still uses normal radius
      const TOUCH_ORB_POINTER_CAPTURE_SCALE = 1.24; // touch gets a little forgiveness without stealing VE taps
      const VE_POINTER_TAP_LATCH_MS = 140;          // lets very quick taps survive until the next animation frame
      let orbPressStartedAt = 0;
      let orbPressStartedOnOrb = false;
      let orbPressedTarget = null;
      let orbReleaseClickAllowed = false;
      let suppressClickUntil = 0;
      let vePointerActiveUntil = 0;
      let veActivationPendingFrame = false; // every eligible pointerdown must reach updateVE at least once
      let veInteractionSuppressedByObject = false; // foreground-object pointerdown blocks VE activation/release latch
      let lastStageW      = 0;
      let lastStageH      = 0;
      let hoverClientX    = null;
      let hoverClientY    = null;
      const pointerPressure = {
        active: false,
        x: 0, y: 0,
        lastX: 0, lastY: 0,
        vx: 0, vy: 0,
        dirX: 0, dirY: 0,
        amp: 0,
        lastT: 0,
      };

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function rand(lo, hi)     { return lo + Math.random() * (hi - lo); }
      function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
      function gaussianRandom(mean, std) {
        const u1 = Math.max(1e-10, Math.random());
        return mean + std * Math.sqrt(-2 * Math.log(u1)) * Math.cos(Math.PI * 2 * Math.random());
      }
      function brightenColor(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        const lift = (c, f) => Math.round(c + (255-c)*f).toString(16).padStart(2,'0');
        return `#${lift(r,0.62)}${lift(g,0.62)}${lift(b,0.62)}`;
      }

      function desaturateColor(hex, amount) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        const gray = (r + g + b) / 3;
        const mix = (c) => Math.round(c + (gray - c) * amount).toString(16).padStart(2,'0');
        return `#${mix(r)}${mix(g)}${mix(b)}`;
      }

      function smoothstep(edge0, edge1, x) {
        const t = clamp((x - edge0) / Math.max(edge1 - edge0, 1e-6), 0, 1);
        return t * t * (3 - 2 * t);
      }

      // Physical pressure field: full-strength center out to 1/3 radius,
      // then a slow exponential feather to zero at the outer radius.
      function slowExpPressureFeather(d, radius) {
        if (radius <= 0 || d >= radius) return 0;
        const coreR = radius / 3;
        if (d <= coreR) return 1;
        const t = clamp((d - coreR) / Math.max(radius - coreR, 1e-6), 0, 1);
        const edge = Math.exp(-2.35);
        const raw = Math.exp(-2.35 * t * t);
        return clamp((raw - edge) / (1 - edge), 0, 1);
      }

      function turnWanderToward(ap, targetAngle, amount) {
        const delta = Math.atan2(Math.sin(targetAngle - ap.wAngle), Math.cos(targetAngle - ap.wAngle));
        ap.wAngle += delta * clamp(amount, 0, 1);
      }

      function applyOrbHomeField(ap, homeX, homeY, innerR, outerR, featherR, outerStrength, innerStrength, tangentStrength = 0) {
        let dx = ap.x - homeX;
        let dy = ap.y - homeY;
        let d = Math.hypot(dx, dy);

        if (d < 0.001) {
          dx = Math.cos(ap.wAngle || 0);
          dy = Math.sin(ap.wAngle || 0);
          d = 1;
        }

        const ux = dx / d;
        const uy = dy / d;

        // Inner exclusion: "subtract" the reset orb's smaller home circle from
        // the larger sound/site home field. Orbs inside it bias outward.
        if (innerR > 0 && d < innerR) {
          const innerT = Math.pow(clamp(1 - d / innerR, 0, 1), 1.7);
          const push = innerStrength * innerT * Math.max(0.85, ap.speed || 1);
          ap.vx += ux * push;
          ap.vy += uy * push;
          turnWanderToward(ap, Math.atan2(uy, ux), innerT * 0.045);
        }

        // Outer feather: inside outerR is mostly free; beyond it, the farther out
        // the orb drifts, the more its wander direction bends back home.
        if (d > outerR) {
          const outerT = smoothstep(outerR, outerR + featherR, d);
          const pull = outerStrength * outerT * outerT * Math.max(0.85, ap.speed || 1);
          ap.vx -= ux * pull;
          ap.vy -= uy * pull;
          turnWanderToward(ap, Math.atan2(-uy, -ux), outerT * 0.030);
        }

        // Very weak annular drift gives the Goldilocks zone an orbital feel
        // without forcing literal circular motion.
        if (tangentStrength > 0 && d > innerR && d < outerR + featherR) {
          const mid = innerR + (outerR - innerR) * 0.55;
          const zoneT = 1 - clamp(Math.abs(d - mid) / Math.max(outerR - innerR, 1), 0, 1);
          ap.vx += -uy * tangentStrength * zoneT;
          ap.vy +=  ux * tangentStrength * zoneT;
        }
      }

      // ─── Vector Equilibrium geometry ────────────────────────────────────────
      // Cuboctahedron: 12 vertices at all permutations of (±1,±1,0)/√2 on the unit sphere.
      // Circumradius = edge length = 1. Fuller's "vector equilibrium" — all vectors cancel.
      const VE_S = 1 / Math.SQRT2;
      const VE_V = [
        [ VE_S, VE_S,    0],[ VE_S,-VE_S,    0],[-VE_S, VE_S,    0],[-VE_S,-VE_S,    0],
        [ VE_S,    0, VE_S],[ VE_S,    0,-VE_S],[-VE_S,    0, VE_S],[-VE_S,    0,-VE_S],
        [    0, VE_S, VE_S],[    0, VE_S,-VE_S],[    0,-VE_S, VE_S],[    0,-VE_S,-VE_S]
      ];
      const VE_E = []; // 24 edges — vertex pairs at unit distance
      for (let i = 0; i < 12; i++)
        for (let j = i+1; j < 12; j++) {
          const [ax,ay,az] = VE_V[i], [bx,by,bz] = VE_V[j];
          const d2 = (ax-bx)**2 + (ay-by)**2 + (az-bz)**2;
          if (d2 > 0.95 && d2 < 1.05) VE_E.push([i, j]);
        }
      const VE_T = [[0,4,8],[0,5,9],[1,4,10],[1,5,11],[2,6,8],[2,7,9],[3,6,10],[3,7,11]];
      const VE_Q = [[0,4,1,5],[2,6,3,7],[0,8,2,9],[1,10,3,11],[4,8,6,10],[5,9,7,11]];
      // Per-vertex edge lists (degree 4 per vertex in cuboctahedron)
      const VE_VERTEX_EDGES = Array.from({length: 12}, () => []);
      for (let _ei = 0; _ei < VE_E.length; _ei++) {
        VE_VERTEX_EDGES[VE_E[_ei][0]].push(_ei);
        VE_VERTEX_EDGES[VE_E[_ei][1]].push(_ei);
      }
      // Edge lookup for face-to-edge mapping
      const VE_E_MAP = {};
      for (let _ei = 0; _ei < VE_E.length; _ei++) VE_E_MAP[VE_E[_ei][0]*12+VE_E[_ei][1]] = _ei;
      const _fei = (a,b) => a < b ? VE_E_MAP[a*12+b] : VE_E_MAP[b*12+a];
      const VE_T_EDGES = VE_T.map(([a,b,c]) => [_fei(a,b),_fei(b,c),_fei(a,c)]);
      const VE_Q_EDGES = VE_Q.map(([a,b,c,d]) => [_fei(a,b),_fei(b,c),_fei(c,d),_fei(d,a)]);
      // Per-edge rest lengths — initial 2D projected distances (computed once at init angles)
      const VE_E_REST = (() => {
        const tx=0.4,ty=1.1,tz=0.2,S=52,f=280;
        const ip = VE_V.map(([vx,vy,vz]) => {
          const y1=vy*Math.cos(tx)-vz*Math.sin(tx), z1=vy*Math.sin(tx)+vz*Math.cos(tx);
          const x2=vx*Math.cos(ty)+z1*Math.sin(ty), z2=-vx*Math.sin(ty)+z1*Math.cos(ty);
          const x3=x2*Math.cos(tz)-y1*Math.sin(tz), y3=x2*Math.sin(tz)+y1*Math.cos(tz);
          const p=f/(f+z2*S); return [x3*S*p, y3*S*p];
        });
        return VE_E.map(([i,j]) => Math.hypot(ip[i][0]-ip[j][0], ip[i][1]-ip[j][1]));
      })();
      // Spring physics constants (tuned via Python simulation — stable 52→65px radius after full dissolution)
      const VE_SPRING_K = 0.0015; // per-edge spring stiffness
      const VE_REP_STR  = 0.003;  // node-pair repulsion (inv-square, softened)
      const VE_DAMP     = 0.975;  // velocity damping per frame

      // VE runtime state
      const ve = {
        x: 0, y: 0, targetX: 0, targetY: 0, prevTX: 0, prevTY: 0,
        vx: 0, vy: 0,
        pressurePrevX: 0, pressurePrevY: 0,
        pressureVX: 0, pressureVY: 0,
        pressureSpeed: 0,
        pressureReady: false,
        cvx: 0, cvy: 0,
        θx: 0.4, θy: 1.1, θz: 0.2,
        ωx: 0.00025, ωy: 0.00041, ωz: 0.00016,
        scale: 52, brightness: 0.55, alphaP: 0, scaleP: 0, alpha: 0, scaleCurrent: 0,
        excitement: 0, strain: 0, active: false, voltaHeld: false,
        destroyedEdges: new Set(),   // edge indices claimed by Volta during infection
        edgeEnergies: null,          // Float32Array — per-edge energy [0,1], dims in drawVE
        edgeDrainRates: null,        // per-edge randomized drain rate
        vertNodes: null,             // per-vertex {x,y,vx,vy,freedom} spring objects
        centerNode: null,             // center node joins vertex physics once Volta attacks
        liberated: false,            // true once all edges destroyed (vertices drift freely)
        liberatedAt: 0,              // timestamp when VE exploded into free nodes
        reinitializeAfter: 0,        // timestamp when old nodes begin fading out
        nodeFadeStartedAt: 0,        // timestamp when final teardown fade begins
        projCache: null,             // last projected vertex screen positions (ideal)
      };

      function pointSegmentDistance(x, y, ax, ay, bx, by) {
        const abx = bx - ax;
        const aby = by - ay;
        const len2 = abx * abx + aby * aby || 1;
        const t = clamp(((x - ax) * abx + (y - ay) * aby) / len2, 0, 1);
        const px = ax + abx * t;
        const py = ay + aby * t;
        return Math.hypot(x - px, y - py);
      }

      function vectorEquilibriumSubstrateFieldAt(x, y) {
        if (ve.liberated || ve.alpha <= 0.01 || ve.scaleCurrent <= 3) return 0;

        const dx = x - ve.x;
        const dy = y - ve.y;
        const d = Math.hypot(dx, dy);

        // Center-weighted feather: strongest at the VE center.
        const centerR = Math.max(18, ve.scaleCurrent * 1.10);
        const centerField = Math.pow(clamp(1 - d / centerR, 0, 1), 1.75);

        // Shape-weighted feather: projected VE edges define the 2D footprint.
        let edgeField = 0;
        if (ve.projCache && ve.projCache.length >= 12) {
          const edgeFeather = clamp(ve.scaleCurrent * 0.20, 12, 52);
          for (const [i, j] of VE_E) {
            const a = ve.projCache[i];
            const b = ve.projCache[j];
            if (!a || !b) continue;
            const sd = pointSegmentDistance(x, y, a.px, a.py, b.px, b.py);
            if (sd < edgeFeather) {
              edgeField = Math.max(edgeField, Math.pow(1 - sd / edgeFeather, 2.1));
            }
          }
        }

        return clamp(centerField * 0.86 + edgeField * 0.24, 0, 1);
      }

      // Volta — arc lightning creature that traverses particle fields toward the VE
      const volta = {
        active: false,
        state: 'dormant',      // 'dormant' | 'entering' | 'traversing' | 'infecting'
        cx: 0, cy: 0,          // creature center
        energy: 1.0,
        pool: 1.0,             // arc energy pool — drains on arc creation, regens over time
        arcs: [],              // active arc segments: { a, b, born, maxAge, strength }
        infectedTimer: 0,
        infectedDuration: 0,
        charge: 0,             // 0→1 during infection — drives VE wildness
        idleSince: 0,          // when Volta last became eligible to reappear
        interactionPressure: 0, // accumulates user clicks/taps until the next spawn
        activeTimeMs: 0,       // only increments while the VE is actively engaged
        nextSpawnCheck: 0,     // throttles probabilistic spawn checks
        tapTimes: [],          // timestamps for 12-tap summon detection
      };

      // ─── Canvas sizing ──────────────────────────────────────────────────────

      function setCanvasSize(canvas, ctx) {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        canvas.width  = Math.round(stage.clientWidth  * dpr);
        canvas.height = Math.round(stage.clientHeight * dpr);
        canvas.style.width  = stage.clientWidth  + 'px';
        canvas.style.height = stage.clientHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // ─── Title ─────────────────────────────────────────────────────────────

      function buildTitle() {
        titleLetters.length = 0;
        word.innerHTML = '';
        const fontSize = clamp(stage.clientWidth * 0.105, 38, 108);
        const tracking = fontSize * 0.08;
        measureCtx.font = `400 ${fontSize}px Cambria, Georgia, Times New Roman, serif`;
        const widths = [...TITLE].map(ch => measureCtx.measureText(ch).width);
        const total  = widths.reduce((a, b) => a + b, 0) + tracking * (widths.length - 1);
        word.style.width  = `${Math.ceil(total)}px`;
        word.style.height = `${Math.ceil(fontSize * 1.2)}px`;
        let x = 0;
        for (let i = 0; i < TITLE.length; i++) {
          const span = document.createElement('span');
          span.className   = 'title-letter';
          span.textContent = TITLE[i];
          span.style.fontSize = `${fontSize}px`;
          const baseX = x + widths[i] / 2;
          span.style.left = `${baseX}px`;
          word.appendChild(span);
          titleLetters.push({ el: span, baseX, x: baseX, y: 0, vx: 0, vy: 0 });
          x += widths[i] + tracking;
        }
      }

      // ─── Lazy audio ────────────────────────────────────────────────────────

      function syncAudioOrb(audioKey) {
        const orb = appParticles.find(ap => ap.audioKey === audioKey);
        const audio = audioElements[audioKey];
        if (orb) {
          orb.audioEl = audio || null;
          orb.playing = !!(audio && !audio.paused && !audio.ended);
        }
      }

      function unloadAudioElement(audioKey) {
        const audio = audioElements[audioKey];
        if (!audio) {
          syncAudioOrb(audioKey);
          return;
        }
        try {
          audio.pause();
          audio.removeAttribute('src');
          audio.load();
        } catch (_) {}
        delete audioElements[audioKey];
        if (currentAudioKey === audioKey) currentAudioKey = null;
        syncAudioOrb(audioKey);
      }

      function unloadOtherAudio(exceptKey = null) {
        for (const key of Object.keys(audioElements)) {
          if (key !== exceptKey) unloadAudioElement(key);
        }
      }

      function getAudioElement(audioKey) {
        if (!audioKey || !audioSources[audioKey]) return null;
        if (audioElements[audioKey]) return audioElements[audioKey];

        const audio = new Audio();
        audio.preload = 'none';
        audio.src = audioSources[audioKey];

        audio.addEventListener('play', () => {
          currentAudioKey = audioKey;
          unloadOtherAudio(audioKey);
          syncAudioOrb(audioKey);
        });
        audio.addEventListener('pause', () => syncAudioOrb(audioKey));
        audio.addEventListener('ended', () => {
          unloadAudioElement(audioKey);
        });

        audioElements[audioKey] = audio;
        syncAudioOrb(audioKey);
        return audio;
      }

      // ─── App particles (living — sub-pages) ────────────────────────────────

      function seedAppParticles() {
        appParticles.length = 0;
        const linkPages = [
          { path: 'snake',            color: '#3d4d26' }, // dark moss
          { path: 'berzerk',          color: '#6b3420' }, // dark terracotta
          { path: 'calculator',       color: '#6a5410' }, // dark ochre
          { path: 'clock',            color: '#263d4a' }, // dark slate
          { path: 'cellularautomata', color: '#47301e' }, // dark umber
          { path: 'blog',            color: '#5c3333' }, // dark dusty rose
          { path: 'about',            color: '#4a4258', overlayImg: aboutQuestionImg, speed: 0.96 }, // about orb
          { path: 'nanaimo',          color: '#6a5840' }, // dark sand
          { path: 'pretext-demo',     color: '#354027' }, // dark sage
          { path: 'meowdividiardi',   color: '#772277', orbImg: catOrbImg }, // cat orb
          { path: 'qr',               color: '#d9d9d9', cardImg: qrCodeImg, r0: 10.0, speed: 0.97 }, // QR code orb
          { path: 'evening',          color: '#6b3525', orbImg: eveningHorseImg, r0: 10.4, speed: 0.94 }, // October Evening memorial orb
          { path: 'horse-anatomy',    color: '#5b4632', emoji: '🐴', speed: 0.93 }, // interactive equine anatomy lab
          { path: 'star-trek',        color: '#121e3a', emoji: '🖖', speed: 0.97 }, // Star Trek film reviews
          { path: 'missile-command',  color: '#3a2410', emoji: '🚀', speed: 1.02 }, // Missile Command arcade recreation
          { path: 'poop-patrol',      color: '#6a4a2a', emoji: '💩', speed: 1.03 }, // Poop Patrol pigeon-bombing game
          { path: 'cross-country',    color: '#3f6b2f', emoji: '🏇', speed: 1.00 }, // Cross Country eventing game
          { path: 'pyramid',          color: '#6b5a30', emoji: '🔺', speed: 0.99 }, // Pyramid — houses, gems & the peak
          { path: 'world-cup',        color: '#d8dee2', emoji: '⚽', speed: 1.06 }, // soccer orb
          { path: 'library/#schilds-ladder', color: '#39415f', cardImg: gregEganCoverImg, r0: 10.0, speed: 0.96 }, // Schild's Ladder library orb
          { url: 'https://cubecobra.com/cube/list/553c1c94-5665-4aa5-a18a-30b15e684ddc?display=spoiler', color: '#665034', cardImg: cubeCobraCardbackImg, r0: 10.2, speed: 0.98 }, // Cube Cobra cardback orb
          { path: 'library/#godel-escher-bach', color: '#5a4634', cardImg: gebCoverImg, r0: 10.0, speed: 0.95 }, // Godel, Escher, Bach library orb
          { path: 'library/#pale-blue-dot', color: '#4e5c6b', cardImg: paleBlueDotCoverImg, r0: 10.0, speed: 0.95 }, // Pale Blue Dot library orb
          { resetOrb: true,        color: '#dfe6ec', r0: 9.6, speed: 1.18 }, // soft reset orb
        ];
        const audioPages = [
          { audioKey: 'nautilus',               color: '#32465f' },
          { audioKey: 'endless',                color: '#5c284f' },
          { audioKey: 'chripper',               color: '#2e6a5f' },
          { audioKey: 'following_a_deviatioin', color: '#6a3f2a' },
          { audioKey: 'hypersthene',            color: '#3f4f72' },
          { audioKey: 'lsd_1',                  color: '#6a2f5f' },
          { audioKey: 'lsd_2',                  color: '#2c4f7a' },
          { audioKey: 'lux',                    color: '#8a7a45' },
          { audioKey: 'portal_open',            color: '#2f6f88' },
          { audioKey: 'quadruple',              color: '#6a4f86' },
          { audioKey: 'singest',                color: '#5d6f2d' },
          { audioKey: 'sovereign',              color: '#7a5b2f' },
          { audioKey: 'spiral_observations',    color: '#355d86' },
          { audioKey: 'traversion_approach',    color: '#3f6a4d' },
          { audioKey: 'camerons_art',           color: '#7a5f44' },
          { audioKey: 'documents',              color: '#6a6f4c' },
          { audioKey: 'elevator',               color: '#5c5c66' },
          { audioKey: 'msr_trimmed',            color: '#6f3f52' },
        ];
        const bell = (Math.random() + Math.random() + Math.random()) / 3;
        const soundOrbCount = Math.max(3, Math.min(7, 3 + Math.round(bell * 4)));
        const pickedAudioPages = [...audioPages]
          .sort(() => Math.random() - 0.5)
          .slice(0, soundOrbCount);
        const pages = [...linkPages, ...pickedAudioPages];
        const w = stage.clientWidth, h = stage.clientHeight;
        const margin = 40;
        for (const page of pages) {
          const r0 = page.r0 || (7 + Math.random() * 3);
          const minDim = Math.min(w, h);
          const seedAngle = Math.random() * Math.PI * 2;
          const ringInner = clamp(minDim * 0.20, 105, 240);
          const ringOuter = clamp(minDim * 0.40, 220, 480);
          const seedR = ringInner + Math.random() * Math.max(1, ringOuter - ringInner);
          const seedX = page.resetOrb
            ? clamp(w * 0.5 + rand(-minDim * 0.035, minDim * 0.035), margin, w - margin)
            : clamp(w * 0.5 + Math.cos(seedAngle) * seedR, margin, w - margin);
          const seedY = page.resetOrb
            ? clamp(h * 0.5 + rand(-minDim * 0.035, minDim * 0.035), margin, h - margin)
            : clamp(h * 0.5 + Math.sin(seedAngle) * seedR, margin, h - margin);
          appParticles.push({
            ...page,
            brightColor: brightenColor(page.color),
            x: seedX,
            y: seedY,
            vx: 0, vy: 0,
            r0,
            wAngle:      Math.random() * Math.PI * 2,
            breathPhase: Math.random() * Math.PI * 2,
            breathRate:  0.0006 + Math.random() * 0.0004,
            speed: page.speed || (page.audioKey ? 2.2 : 1),
            playing: false,
            audioEl: null,
            audioSrc: page.audioKey ? audioSources[page.audioKey] : null,
            emoji: page.emoji || null,
            voltaStrain: 0,
            voltaStrainTarget: 0,
            voltaEvasiveUntil: 0,
            voltaEvasiveAmp: 0,
          });
        }
      }

      // ─── Particles ─────────────────────────────────────────────────────────

      function seedParticles() {
        particles.length = 0;
        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 1;
        const count = isMobile ? 288 : 518;
        for (let i = 0; i < count; i++) {
          const r0 = Math.random() > 0.86 ? 1.0 : 0.5; // 3D radius; visual diameter = r0*2
          particles.push({
            x:  Math.random() * stage.clientWidth,
            y:  Math.random() * stage.clientHeight,
            vx: rand(-0.012, 0.012),
            vy: rand(-0.008, 0.008),
            tw:    Math.random() * Math.PI * 2,
            alpha: rand(0.16, 0.34),
            trail: [],
            r:    r0,  // current 3D radius (drives mass + visual size)
            r0:   r0,  // max radius (recovery ceiling)
            heat: 0,   // 0=cold, 1=fully ablating
            thermalInput: 0, // force/arc energy deposited this frame
            mass: r0 * r0 * r0,
            drag: Math.max(0.86, 1 - 0.00075 / (r0 * r0) - 0.0014 / r0),
            vs:   Math.max(1, r0 * 2) // visual size (px), kept in sync each frame
          });
        }
      }

      function softResetScene(event = null) {
        const now = performance.now();

        // Stop and unload any lazy-created audio so reset does not keep media loaded.
        unloadOtherAudio(null);
        try {
          catMeowAudio.pause();
          catMeowAudio.currentTime = 0;
        } catch (_) {}

        // Clear transient visual/physics systems.
        lights.length = 0;
        hotParticles.length = 0;
        liberatedNodes.length = 0;

        holdActive = false;
        orbInteractionActive = false;
        orbPressStartedAt = 0;
        orbPressStartedOnOrb = false;
        orbPressedTarget = null;
        orbReleaseClickAllowed = false;
        suppressClickUntil = 0;
        vePointerActiveUntil = 0;
        veActivationPendingFrame = false;
        veInteractionSuppressedByObject = false;
        catCursorX = -9999;
        catCursorY = -9999;

        if (typeof pointerPressure !== 'undefined') {
          pointerPressure.active = false;
          pointerPressure.x = pointerPressure.y = 0;
          pointerPressure.lastX = pointerPressure.lastY = 0;
          pointerPressure.vx = pointerPressure.vy = 0;
          pointerPressure.dirX = pointerPressure.dirY = 0;
          pointerPressure.amp = 0;
          pointerPressure.lastT = 0;
        }

        // Reset VE invisibly, without the fading/scaling artifact of a browser refresh.
        ve.x = ve.targetX = ve.prevTX = stage.clientWidth * 0.5;
        ve.y = ve.targetY = ve.prevTY = stage.clientHeight * 0.5;
        ve.vx = 0; ve.vy = 0;
        ve.pressurePrevX = ve.x;
        ve.pressurePrevY = ve.y;
        ve.pressureVX = 0;
        ve.pressureVY = 0;
        ve.pressureSpeed = 0;
        ve.pressureReady = false;
        ve.cvx = 0; ve.cvy = 0;
        ve.θx = 0.4; ve.θy = 1.1; ve.θz = 0.2;
        ve.ωx = 0.00025; ve.ωy = 0.00041; ve.ωz = 0.00016;
        ve.alphaP = 0;
        ve.scaleP = 0;
        ve.alpha = 0;
        ve.scaleCurrent = 0;
        ve.excitement = 0;
        ve.strain = 0;
        ve.active = false;
        ve.voltaHeld = false;
        ve.liberated = false;
        ve.liberatedAt = 0;
        ve.reinitializeAfter = 0;
        ve.nodeFadeStartedAt = 0;
        ve.destroyedEdges.clear();
        ve.edgeEnergies = null;
        ve.edgeDrainRates = null;
        ve.vertNodes = null;
        ve.centerNode = null;
        ve.projCache = null;
        ve.orbsInside = 0;

        // Reset Volta.
        volta.active = false;
        volta.state = 'dormant';
        volta.cx = 0; volta.cy = 0;
        volta.energy = 1.0;
        volta.pool = 1.0;
        volta.arcs = [];
        volta.infectedTimer = 0;
        volta.infectedDuration = 0;
        volta.charge = 0;
        volta.idleSince = now;
        volta.interactionPressure = 0;
        volta.activeTimeMs = 0;
        volta.nextSpawnCheck = now + 22000;
        volta.tapTimes.length = 0;

        // Rebuild all regenerated scene contents.
        seedParticles();
        seedAppParticles();
        initCat();
        buildTitle();

        // Small reset pulse where the reset orb was clicked/tapped.
        if (event) emitPointerPulse(event, 0.65);
      }

      // Blend cool-white (#f1eadc) → hot-orange (#ff8c40) based on heat [0,1]
      function heatColor(heat) {
        const h = heat * heat; // square = more dramatic near source
        const r = Math.round(241 + (255 - 241) * h);
        const g = Math.round(234 + (140 - 234) * h);
        const b = Math.round(220 + ( 64 - 220) * h);
        return `rgb(${r},${g},${b})`;
      }

      function applyThermalResponse(p, thermalInput, dt) {
        const heatTarget = clamp(thermalInput, 0, 1);
        const heatRate = heatTarget > p.heat ? 0.006 : 0.0015;
        p.heat += (heatTarget - p.heat) * clamp(dt * heatRate, 0, 1);
      }

      function soundOrbTwinkleAt(x, y, phase, now, activeAudioOrbs, reach, reach2) {
        if (activeAudioOrbs.length === 0 || reach <= 0) return 0;
        let twinkle = 0;
        for (const orb of activeAudioOrbs) {
          const dx = x - orb.x, dy = y - orb.y;
          const d2 = dx * dx + dy * dy;
          if (d2 >= reach2) continue;
          const prox = 1 - d2 / reach2;
          const shimmer = Math.sin(now * 0.032 + phase * 6.7 + dx * 0.020) * 0.54
                        + Math.sin(now * 0.071 + phase * 12.9 + dy * 0.016 + 0.9) * 0.38;
          const feather = 0.18 + prox * prox * 1.28;
          twinkle += feather * shimmer;
        }
        return clamp(twinkle, -1.2, 1.2);
      }

      function updateParticles(dt) {
        const w = stage.clientWidth, h = stage.clientHeight;
        // dr/dt = (net dm/dt) / (3r²), m ∝ r³, uniform density
        const kLoss = 0.00022;   // ablation rate — ~3s to evaporate at 50% light radius
        const kGain = 0.000015;  // recovery rate via ODE phase

        for (const p of particles) {
          p.tw += dt * 0.00045;

          // All heating sources deposit energy into one material model. Lights
          // are substrate disturbances: proximity alone is not temperature;
          // only the force they actually exert contributes frictional heat.
          let thermalInput = p.thermalInput || 0;
          p.thermalInput = 0;
          for (const l of lights) {
            const dx = p.x - l.x, dy = p.y - l.y;
            const d    = Math.hypot(dx, dy) || 1;
            const pressureField = slowExpPressureFeather(d, 140);
            const pressureScale = l.pressureScale === undefined ? 1 : l.pressureScale;
            const force = pressureField * l.strength * pressureScale;
            if (p.mass > 0.01) {
              p.vx += (dx / d) * force * 0.057 / p.mass;
              p.vy += (dy / d) * force * 0.057 / p.mass;
              thermalInput = Math.max(thermalInput, force);
            }
          }

          // User substrate pressure: click/tap initiation is the radial pulse
          // above. Sustained pressure exists only while the pointer is moving,
          // and pushes substrate in the movement direction.
          if (pointerPressure.amp > 0.001 && p.mass > 0.01) {
            const dx = p.x - pointerPressure.x, dy = p.y - pointerPressure.y;
            const d  = Math.hypot(dx, dy) || 1;
            const reach = 165;
            if (d < reach) {
              const prox = Math.max(0, 1 - d / reach);
              const force = Math.pow(prox, 1.75) * pointerPressure.amp;
              p.vx += pointerPressure.dirX * force * 0.046 / p.mass;
              p.vy += pointerPressure.dirY * force * 0.046 / p.mass;
              thermalInput = Math.max(thermalInput, force * 0.62);
            }
          }

          // Moving VE pressure: the VE pushes substrate through its projected 2D
          // footprint. Intensity is feathered and strongest near the center, with
          // projected edges contributing the shape boundary.
          const veMoveSpeed = Math.hypot(ve.pressureVX || 0, ve.pressureVY || 0);
          if (veMoveSpeed > 0.0015 && ve.alpha > 0.01 && ve.scaleCurrent > 3 && p.mass > 0.01) {
            const veField = vectorEquilibriumSubstrateFieldAt(p.x, p.y);
            if (veField > 0.001) {
              const mvx = (ve.pressureVX || 0) / veMoveSpeed;
              const mvy = (ve.pressureVY || 0) / veMoveSpeed;
              const dx = p.x - ve.x;
              const dy = p.y - ve.y;
              const d = Math.hypot(dx, dy) || 1;
              const rx = dx / d;
              const ry = dy / d;

              const pressure = veField
                * clamp(veMoveSpeed * 0.86, 0, 0.52)
                * ve.alpha
                * (0.42 + clamp(ve.scaleP, 0, 1) * 0.58);

              p.vx += (mvx * 0.78 + rx * 0.22) * pressure * 0.060 / p.mass;
              p.vy += (mvy * 0.78 + ry * 0.22) * pressure * 0.060 / p.mass;
              thermalInput = Math.max(thermalInput, pressure * 0.46);
            }
          }

          // Orbs do not heat the substrate; they simply shove nearby particles aside.
          for (const ap of appParticles) {
            if (p.mass <= 0.01) continue;
            const dx = p.x - ap.x, dy = p.y - ap.y;
            const d  = Math.hypot(dx, dy) || 1;
            const reach = ap.r0 * 4.4;
            if (d >= reach) continue;
            const pressureField = slowExpPressureFeather(d, reach);
            const speed = Math.hypot(ap.vx, ap.vy);
            const push = pressureField * (0.0018 + Math.min(0.0042, speed * 0.14));
            p.vx += (dx / d) * push / p.mass;
            p.vy += (dy / d) * push / p.mass;
          }

          // Shared thermal response: force and arc energy heat identically;
          // absence of either cools the material back toward ambient.
          applyThermalResponse(p, thermalInput, dt);

          // Evaporated particles cool before they can nucleate and regrow.
          if (p.r <= 0) {
            p.r = (p.heat < 0.1) ? 0.001 : 0;
            continue;
          }

          // Ablation / regrowth ODE; denominator clamped to avoid 1/r² singularity at r→0
          const r2safe = Math.max(p.r * p.r, 0.04);
          const drdt   = (-p.heat * kLoss + (1 - p.heat) * kGain) / (3 * r2safe);
          p.r = Math.min(p.r0, Math.max(0, p.r + drdt * dt));

          p.mass = p.r * p.r * p.r;
          p.drag = Math.max(0.86, 1 - 0.00075 / Math.max(p.r * p.r, 0.01)
                                    - 0.0014 / Math.max(p.r, 0.1));
          p.vs   = Math.max(1, p.r * 2);
          p.vx  *= p.drag; p.vy *= p.drag;
          p.trail.unshift({ x: p.x, y: p.y });
          if (p.trail.length > 5) p.trail.pop();
          p.x  += p.vx * dt * 0.026;
          p.y  += p.vy * dt * 0.026;
          if (p.x < -6) p.x = w + 6; if (p.x > w + 6) p.x = -6;
          if (p.y < -6) p.y = h + 6; if (p.y > h + 6) p.y = -6;
        }

      }

      // Mass threshold: particles below this are dark-matter — invisible unless lit or hot
      const MASS_THRESH = 0.15; // r ≈ 0.53; captures all small-variant particles

      function drawParticles(now) {
        pctx.clearRect(0, 0, stage.clientWidth, stage.clientHeight);
        const activeAudioOrbs = appParticles.filter(ap => ap.audioKey && ap.playing);
        const soundOrbReach = activeAudioOrbs.length > 0 ? Math.hypot(stage.clientWidth, stage.clientHeight) * 0.09246 : 0;
        const soundOrbReach2 = soundOrbReach * soundOrbReach;
        for (const p of particles) {
          if (p.r < 0.05) continue; // fully evaporated
          const local = lightAt(p.x, p.y, now);
          // Small + unlit + cool → invisible (dark matter until illuminated or heated)
          const baseVisible = !(p.mass < MASS_THRESH && local < 0.06 && p.heat < 0.15);
          if (!baseVisible) continue;
          const pulse  = 0.5 + Math.sin(now * 0.0007 + p.tw) * 0.5;
          const twinkle = soundOrbTwinkleAt(p.x, p.y, p.tw, now, activeAudioOrbs, soundOrbReach, soundOrbReach2);
          const twinkleLift = clamp(1 + twinkle * 0.85, 0.35, 2.2);
          const alpha  = ((p.alpha * 0.59) + local * (0.32 + pulse * 0.18)) * clamp(1 + twinkle * 0.72, 0.45, 2.1);
          const color  = heatColor(p.heat);
          const emission = Math.max(local, p.heat);
          const luminous = clamp(emission * twinkleLift, 0, 2.1);
          const speed  = Math.hypot(p.vx, p.vy);

          // Comet tail — only when moving + lit; no shadowBlur on trail segments (perf)
          if (emission > 0.04 && speed > 0.002 && p.trail.length > 1) {
            pctx.shadowBlur = 0;
            const tailLen = p.trail.length;
            for (let t = 0; t < tailLen; t++) {
              const frac   = (t + 1) / tailLen;
              const evap   = Math.pow(1 - frac, 1.6);
              const tAlpha = alpha * evap * emission * 0.55;
              if (tAlpha < 0.005) break;
              pctx.globalAlpha = tAlpha;
              pctx.fillStyle   = color;
              pctx.fillRect(Math.round(p.trail[t].x), Math.round(p.trail[t].y), p.vs, p.vs);
            }
          }

          // Particle head — glow only on particles with significant illumination (perf)
          const heatSq = luminous * luminous;
          pctx.globalAlpha = Math.min(1, alpha + p.heat * 0.22);
          const baseBlur = emission > 0.32 ? (1 + emission * emission * 10) : 0;
          const twinkleBlur = twinkle > 0 ? baseBlur * (1 + twinkle * 1.25) + twinkle * 10 : baseBlur * clamp(1 + twinkle * 0.55, 0.35, 1);
          pctx.shadowBlur  = Math.min(28, Math.max(0, twinkleBlur));
          pctx.shadowColor = color;
          pctx.fillStyle   = color;
          pctx.fillRect(Math.round(p.x), Math.round(p.y), p.vs, p.vs);
        }
        pctx.globalAlpha = 1;
        pctx.shadowBlur  = 0;
      }

      // ─── Light system ───────────────────────────────────────────────────────
      // Touch: 3s log fade-in, 7s log fade-out. Mouse: 200ms log fade-in, 7s fade-out.
      // Intensity is purely time-driven — no hold phase outside the fade windows.
      // Light center rubber-bands behind the actual pointer (no overshoot).

      // Logarithmic curve: t ∈ [0,1] → [0,1], fast rise then plateau
      function logCurve(t) { return Math.log(1 + 9 * t) / Math.LN10; }

      function lightIntensity(l, now) {
        const fadeInDur = l.fadeInMs || 3000;
        if (!l.releaseTime) {
          // Active: log fade-in over fadeInDur, saturates and holds at 1
          return logCurve(clamp((now - l.born) / fadeInDur, 0, 1));
        }
        // Released: log fade-out from whatever level we were at on release
        const levelAtRelease = logCurve(clamp(l.ageAtRelease / fadeInDur, 0, 1));
        const t = clamp((now - l.releaseTime) / (l.fadeOutMs || 7000), 0, 1);
        return levelAtRelease * (1 - logCurve(t));
      }

      function lightAt(x, y, now) {
        let total = 0;
        for (const l of lights) {
          const d      = dist(x, y, l.x, l.y);
          const radius = l.kind === 'pointer' ? (72 + l.strength * 64) : (96 + l.strength * 64);
          total += Math.max(0, 1 - d / radius) * l.strength * lightIntensity(l, now);
        }
        // App particles emit light — illuminates nearby dead particles + other orbs
        for (const ap of appParticles) {
          const d = dist(x, y, ap.x, ap.y);
          const pulse = (Math.sin(now * ap.breathRate + ap.breathPhase) + 1) * 0.5;
          total += Math.max(0, 1 - d / 200) * (0.55 + pulse * 0.32);
        }
        // Hot particles glow — hotParticles is a pre-filtered subset rebuilt each frame
        for (const p of hotParticles) {
          const d = dist(x, y, p.x, p.y);
          const radius = 12 + p.heat * 30;
          if (d >= radius) continue;
          total += (1 - d / radius) * p.heat * 0.4;
        }
        // VE illumination grows with excitement (orbs inside amplify brightness + radius)
        if (ve.alpha > 0.01) {
          const d = dist(x, y, ve.x, ve.y);
          const veEx = ve.excitement;
          const veR = ve.scaleCurrent * (1 + veEx * 0.20) * 2.2;
          if (d < veR) total += (1 - d / veR) * ve.brightness * ve.alpha * (1 + veEx * 1.5);
        }
        return clamp(total, 0, 1);
      }

      function updateLights(dt) {
        const lag = 1 - Math.exp(-dt * 0.018);
        for (let i = lights.length - 1; i >= 0; i--) {
          const l = lights[i];
          if (l.targetX !== undefined) {
            l.x += (l.targetX - l.x) * lag;
            l.y += (l.targetY - l.y) * lag;
          }
          if (!l.released) continue;
          l.ttl -= dt;
          if (l.ttl <= 0) lights.splice(i, 1);
        }

        // No static hold pressure: movement pressure fades quickly unless
        // pointermove keeps replenishing it.
        pointerPressure.amp *= Math.exp(-dt * 0.020);
        if (!pointerPressure.active && pointerPressure.amp < 0.001) pointerPressure.amp = 0;

        // Very quick taps can pointerup before the next animation frame. Keep VE
        // active briefly so updateVE sees the activation at least once.
        const now = performance.now();
        if (ve.active && !holdActive && !ve.voltaHeld && !veActivationPendingFrame
            && vePointerActiveUntil && now >= vePointerActiveUntil) {
          ve.active = false;
          vePointerActiveUntil = 0;
        }
      }

      function updateVEPointerTarget(event, activate = true) {
        // Liberation and its reinitialization delay are the only period in which
        // a rising edge is intentionally ignored. Orb and Volta state must not
        // swallow an otherwise valid VE activation.
        if (ve.liberated || veInteractionSuppressedByObject) return false;
        const rect  = stage.getBoundingClientRect();
        const p     = event.touches ? event.touches[0] : event;
        const tx    = p.clientX - rect.left;
        const ty    = p.clientY - rect.top;
        if (activate) {
          if (!ve.active) {
            ve.x = tx; ve.y = ty; ve.prevTX = tx; ve.prevTY = ty; ve.vx = 0; ve.vy = 0;
            ve.pressurePrevX = tx;
            ve.pressurePrevY = ty;
            ve.pressureVX = 0;
            ve.pressureVY = 0;
            ve.pressureSpeed = 0;
            ve.pressureReady = true;
          }
          ve.active = true;
          veActivationPendingFrame = true;
          vePointerActiveUntil = Math.max(vePointerActiveUntil, performance.now() + VE_POINTER_TAP_LATCH_MS);
        }
        ve.targetX = tx; ve.targetY = ty;
        return true;
      }

      function pointerStagePoint(event) {
        const rect = stage.getBoundingClientRect();
        const p = event.touches ? event.touches[0] : event;
        return { x: p.clientX - rect.left, y: p.clientY - rect.top };
      }

      function beginPointerPressure(event) {
        if (orbInteractionActive) return;
        const pt = pointerStagePoint(event);
        const now = performance.now();
        pointerPressure.active = true;
        pointerPressure.x = pointerPressure.lastX = pt.x;
        pointerPressure.y = pointerPressure.lastY = pt.y;
        pointerPressure.vx = pointerPressure.vy = 0;
        pointerPressure.dirX = pointerPressure.dirY = 0;
        pointerPressure.amp = 0; // tap/click gets a pulse only, no static sustain
        pointerPressure.lastT = now;
      }

      function updatePointerPressure(event) {
        if (!pointerPressure.active || orbInteractionActive) return;
        const pt = pointerStagePoint(event);
        const now = performance.now();
        const elapsed = Math.max(8, now - pointerPressure.lastT);
        const dx = pt.x - pointerPressure.lastX;
        const dy = pt.y - pointerPressure.lastY;
        const distance = Math.hypot(dx, dy);
        if (distance < 0.4) return;

        const vx = dx / elapsed;
        const vy = dy / elapsed;
        const speed = Math.hypot(vx, vy);
        const accel = Math.hypot(vx - pointerPressure.vx, vy - pointerPressure.vy);
        const directionBlend = clamp(distance / 22, 0.18, 1);

        pointerPressure.x = pt.x;
        pointerPressure.y = pt.y;
        pointerPressure.dirX = pointerPressure.dirX * (1 - directionBlend) + (dx / distance) * directionBlend;
        pointerPressure.dirY = pointerPressure.dirY * (1 - directionBlend) + (dy / distance) * directionBlend;
        const dirMag = Math.hypot(pointerPressure.dirX, pointerPressure.dirY) || 1;
        pointerPressure.dirX /= dirMag;
        pointerPressure.dirY /= dirMag;

        // Reduced sustained level. Speed gives the baseline; acceleration adds
        // pressure when movement sharpens, changes direction, or speeds up.
        const targetAmp = clamp(speed * 0.82 + accel * 7.5, 0, 0.42);
        pointerPressure.amp += (targetAmp - pointerPressure.amp) * 0.42;

        pointerPressure.vx = vx;
        pointerPressure.vy = vy;
        pointerPressure.lastX = pt.x;
        pointerPressure.lastY = pt.y;
        pointerPressure.lastT = now;
      }

      function endPointerPressure() {
        pointerPressure.active = false;
      }

      function emitPointerPulse(event, strength = 1.0) {
        if (orbInteractionActive) return;
        const rect = stage.getBoundingClientRect();
        const p    = event.touches ? event.touches[0] : event;
        const tx   = p.clientX - rect.left;
        const ty   = p.clientY - rect.top;
        const now  = performance.now();
        const fadeInMs = 45;
        const pulseStrength = strength * 0.42;
        const pulsePressureScale = 0.22;
        lights.push({
          x: tx, y: ty,
          strength: pulseStrength,
          sustainStrength: 0,
          ttl: 620, maxTtl: 620, kind: 'pointer',
          born: now - fadeInMs,
          released: true,
          releaseTime: now,
          ageAtRelease: fadeInMs,
          fadeInMs,
          pressureScale: pulsePressureScale,
          fadeOutMs: 620,
        });
      }

      function appParticleHitRadius(ap, hitScale = 1.0) {
        // Hit testing must match the visible foreground object, not the tiny seed
        // radius. Substrate/background particles are intentionally excluded from
        // this system; only deliberate app/orb foreground objects are interactive.
        const baseR = ap.r0 || 8;

        // drawAppParticles expands ordinary orbs by their breathing pulse, sound
        // orbs by a stronger unstable pulse, and the cat image by another 1.5x
        // plus behavioral scale. Use a max visual envelope so the whole visible
        // circle counts, not only the center/core pixel.
        const breathMax = ap.audioKey ? 1.34 : 1.22;
        const catScale = ap.orbImg ? clamp((ap._c && ap._c.sca) || 1.0, 0.82, 1.40) : 1.0;
        const kindScale = ap.orbImg ? 1.50
                        : ap.cardImg ? 1.70
                        : ap.emoji ? 1.42
                        : ap.resetOrb ? 1.52
                        : 1.34;

        const visualR = baseR * breathMax * kindScale * catScale;

        // Minimum makes small orbs humane on touch/mouse without making substrate
        // particles interactive. This still only applies to appParticles.
        return Math.max(visualR * hitScale, 18);
      }

      function appParticleAtClient(clientX, clientY, hitScale = 1.0) {
        const rect = stage.getBoundingClientRect();
        const cx = clientX - rect.left;
        const cy = clientY - rect.top;

        // If several foreground objects overlap, choose the closest center whose
        // visible circular hit radius contains the pointer.
        let best = null;
        let bestNorm = Infinity;
        for (const ap of appParticles) {
          const hitR = appParticleHitRadius(ap, hitScale);
          const d = Math.hypot(cx - ap.x, cy - ap.y);
          if (d <= hitR) {
            const norm = d / hitR;
            if (norm < bestNorm) {
              best = ap;
              bestNorm = norm;
            }
          }
        }
        return best;
      }

      function interactiveObjectAtClient(clientX, clientY, hitScale = 1.0) {
        // General rising-edge interaction gate.
        // IMPORTANT: substrate/background particles are intentionally NOT checked.
        // Future foreground interactive objects should be added here.
        const appParticle = appParticleAtClient(clientX, clientY, hitScale);
        if (appParticle) return { kind: 'appParticle', target: appParticle };
        return null;
      }

      function refreshInteractiveCursor() {
        if (hoverClientX === null || hoverClientY === null) {
          stage.style.cursor = 'default';
          return;
        }

        // While dragging/holding, keep the cursor neutral. Hover affordance is for
        // identifying foreground clickable objects before interaction.
        if (holdActive || orbInteractionActive || veInteractionSuppressedByObject) {
          stage.style.cursor = 'default';
          return;
        }

        stage.style.cursor = interactiveObjectAtClient(hoverClientX, hoverClientY, 1.0)
          ? 'pointer'
          : 'default';
      }

      const releasePointerLight = () => {
        holdActive = false;

        if (veInteractionSuppressedByObject) {
          // Pointer began on a foreground interactive object. Do not let stale
          // VE activation state survive into pointerup/touchend and resurrect a
          // stationary VE.
          vePointerActiveUntil = 0;
          veActivationPendingFrame = false;
          veInteractionSuppressedByObject = false;
          orbInteractionActive = false;
          if (!ve.voltaHeld) ve.active = false;
          return;
        }

        orbInteractionActive = false;
        const now = performance.now();
        ve.active = !!((veActivationPendingFrame || (vePointerActiveUntil && now < vePointerActiveUntil))
          && !ve.voltaHeld && !ve.liberated);
        // Inherit cursor velocity at moment of release — this is the "throw"
        ve.vx = ve.cvx * 0.45;
        ve.vy = ve.cvy * 0.45;
      };

      const playCatMeow = (volume = 0.60) => {
        catMeowAudio.volume = volume;
        // Disable pitch correction where supported so playbackRate actually changes pitch.
        if ('preservesPitch' in catMeowAudio) catMeowAudio.preservesPitch = false;
        if ('mozPreservesPitch' in catMeowAudio) catMeowAudio.mozPreservesPitch = false;
        if ('webkitPreservesPitch' in catMeowAudio) catMeowAudio.webkitPreservesPitch = false;
        // Slightly above default pitch for a more natural, less identical meow.
        catMeowAudio.playbackRate = 1.02 + Math.random() * 0.10;
        catMeowAudio.currentTime = 0;
        catMeowAudio.play().catch(() => {});
      };

      function activateAppParticle(ap, event) {
        if (!ap) return false;
        if (ap.resetOrb) {
          softResetScene(event);
          return true;
        }
        if (ap.audioKey) {
          const audio = getAudioElement(ap.audioKey);
          if (!audio) return true;
          if (audio.paused) {
            unloadOtherAudio(ap.audioKey);
            audio.play().catch(() => {
              ap.playing = false;
              unloadAudioElement(ap.audioKey);
            });
          } else {
            unloadAudioElement(ap.audioKey);
          }
          return true;
        }
        if (ap.url) {
          window.location.href = ap.url;
          return true;
        }
        if (ap.path) {
          window.location.href = '/' + ap.path;
          return true;
        }
        return false;
      }

      // ─── Title letters ──────────────────────────────────────────────────────
      // Static title: no pulsation, no spring movement, no interaction scaling.
      // Lighting is sampled at each rendered letter's actual screen position.

      function updateTitle(dt) {
        const now = performance.now();
        const stageRect = stage.getBoundingClientRect();
        const wordRect  = word.getBoundingClientRect();
        const letterY   = wordRect.top - stageRect.top + wordRect.height * 0.5;

        // Title illumination now follows the VE as a physical light source.
        // Scale drives luminosity with a normalized exponential curve: small VE
        // presence is dim, but brightness rises rapidly as the VE expands.
        const veVisible = !ve.liberated && (ve.active || ve.voltaHeld || ve.alphaP > 0.01 || ve.scaleP > 0.01);
        const veScaleP = clamp(ve.scaleP, 0, 1);
        const veAlphaP = clamp(ve.alphaP, 0, 1);
        // Fast-to-slow VE luminosity curve.
        // This is not a slow-start exponential rise. It is an ease-out curve:
        // early scale growth creates a large brightness jump, then the glow
        // tapers smoothly as the VE approaches full size. When scale falls, the
        // same curve runs in reverse: it holds brightness through medium scale,
        // then drops off near the end.
        const veScaleLuminosity = 1 - Math.pow(1 - veScaleP, 2.35);
        const veExcitementBoost = 1 + clamp(ve.excitement || 0, 0, 1) * 1.35;
        const veLightAmplitude = veVisible
          ? clamp(ve.brightness * veAlphaP * veScaleLuminosity * veExcitementBoost, 0, 2.4)
          : 0;
        const veLightRadius = 96 + Math.max(0, ve.scaleCurrent) * (2.45 + clamp(ve.excitement || 0, 0, 1) * 0.55);

        let titleGlow = 0;

        for (const l of titleLetters) {
          let localLight = 0;
          const lx = wordRect.left - stageRect.left + l.baseX;
          const ly = letterY;

          if (veLightAmplitude > 0.001) {
            const vdx = lx - ve.x;
            const vdy = ly - ve.y;
            const vd  = Math.hypot(vdx, vdy) || 1;
            if (vd < veLightRadius) {
              const falloff = Math.pow(1 - vd / veLightRadius, 1.72);
              const coreBloom = Math.pow(falloff, 0.72);
              localLight = Math.max(localLight, veLightAmplitude * coreBloom);
            }
          }

          // Actual click/tap pulse lights remain visible, but they are additive
          // accents. The sustained title brightness is now governed by VE light.
          for (const light of lights) {
            const dx = lx - light.x;
            const dy = ly - light.y;
            const d  = Math.hypot(dx, dy) || 1;
            const inf = Math.max(0, 1 - d / 220) * light.strength * lightIntensity(light, now);
            localLight = Math.max(localLight, inf);
          }

          // No independent title fade envelope. The title follows the instantaneous
          // light field, whose rise/fall comes from VE scale/alpha dynamics.
          l.smoothGlow = clamp(localLight, 0, 2.2);

          const glow = l.smoothGlow;
          const glow01 = clamp(glow, 0, 1);
          const overGlow = Math.max(0, glow - 1);

          titleGlow = Math.max(titleGlow, glow);

          // Darker unlit baseline; VE light lifts opacity, halo, and warmth.
          l.el.style.color      = `rgba(232,224,209,${clamp(0.105 + glow01 * 0.64 + overGlow * 0.08, 0.105, 0.92).toFixed(3)})`;
          l.el.style.textShadow = `0 1px 0 rgba(255,255,255,0.006), 0 0 ${(glow01 * 18 + overGlow * 10).toFixed(1)}px rgba(232,224,209,${clamp(glow01 * 0.15 + overGlow * 0.08, 0, 0.28).toFixed(3)})`;
          l.el.style.transform  = 'translate(-50%, -50%)';
        }

        const titleGlow01 = clamp(titleGlow, 0, 1);
        const titleOverGlow = Math.max(0, titleGlow - 1);
        word.style.filter     = 'none';
        word.style.opacity    = clamp(0.46 + titleGlow01 * 0.30 + titleOverGlow * 0.05, 0.46, 0.86).toFixed(3);
        word.style.textShadow = `0 0 ${(titleGlow01 * 13 + titleOverGlow * 9).toFixed(1)}px rgba(232,224,209,${clamp(titleGlow01 * 0.08 + titleOverGlow * 0.05, 0, 0.16).toFixed(3)})`;
        word.style.setProperty('--after-opacity', clamp(0.006 + titleGlow01 * 0.058 + titleOverGlow * 0.020, 0.006, 0.095).toFixed(3));
      }

      // ─── App particle update & draw ─────────────────────────────────────────

      function updateAppParticles(dt) {
        const w = stage.clientWidth, h = stage.clientHeight;
        const now = performance.now();
        const veInteractive = (ve.active || ve.voltaHeld) && !ve.liberated;
        const veVisible = !ve.liberated && (veInteractive || ve.alphaP > 0.16 || ve.scaleP > 0.16);
        const resetOrb = appParticles.find(p => p.resetOrb);
        const minDim = Math.min(w, h);
        const resetHomeX = w * 0.5;
        const resetHomeY = h * 0.5;
        const resetHomeR = clamp(minDim * 0.14, 72, 155);
        const resetHomeFeatherR = clamp(minDim * 0.20, 120, 270);
        const goldInnerR = clamp(resetHomeR * 1.12, 88, 190);
        const goldOuterR = clamp(minDim * 0.39, 215, 455);
        const goldFeatherR = clamp(minDim * 0.24, 150, 360);

        for (const ap of appParticles) {
          if (ap.orbImg) continue; // cat has its own behavioral update and remains freer than the other orbs
          ap.voltaStrain += ((ap.voltaStrainTarget || 0) - (ap.voltaStrain || 0)) * clamp(dt * 0.01, 0, 1);
          const soundOrbPinned = ap.audioKey && ap.playing && !veVisible;
          if (soundOrbPinned) {
            // Sound-producing orb holds position unless the VE is actively pulling it.
            ap.vx = 0;
            ap.vy = 0;
          }
          if (!soundOrbPinned) {
            const isReset = !!ap.resetOrb;
            const isSound = !!ap.audioKey;
            const liberatedBoost = ve.liberated ? 1.25 : 1.0;

            // Reset orb: slow, graceful wander around page-center home.
            // Sound orbs: faster and a little more erratic.
            // Site orbs: slower, steadier wander.
            // If Volta is arcing to an orb, it gets a 0.2s evasive burst:
            // roughly 2x wander speed plus extra direction jitter and outward escape.
            const evasiveActive = volta.active && now < (ap.voltaEvasiveUntil || 0);
            const evasiveT = evasiveActive ? clamp(((ap.voltaEvasiveUntil || 0) - now) / 200, 0, 1) : 0;
            const evasiveAmp = evasiveActive ? Math.max(evasiveT, ap.voltaEvasiveAmp || 0.35) : 0;
            const evasiveSpeed = evasiveActive ? 2.0 : 1.0;
            const evasiveJitter = evasiveActive ? 3.4 : 1.0;

            const wanderStr = isReset ? 0.00034 : isSound ? 0.00138 : 0.00076;
            const angleJitter = isReset ? 0.00032 : isSound ? 0.00155 : 0.00078;
            ap.wAngle += (Math.random() - 0.5) * angleJitter * evasiveJitter * dt * ap.speed * liberatedBoost;
            ap.vx += Math.cos(ap.wAngle) * wanderStr * evasiveSpeed * ap.speed * liberatedBoost;
            ap.vy += Math.sin(ap.wAngle) * wanderStr * evasiveSpeed * ap.speed * liberatedBoost;

            if (evasiveActive) {
              const ex = ap.x - volta.cx;
              const ey = ap.y - volta.cy;
              const ed = Math.hypot(ex, ey) || 1;
              const escapeKick = (isSound ? 0.0034 : 0.0027) * dt * evasiveAmp;
              ap.vx += (ex / ed) * escapeKick;
              ap.vy += (ey / ed) * escapeKick;
              ap.wAngle += (Math.random() - 0.5) * 0.022 * dt * evasiveAmp;
            }

            if (isReset) {
              // Reset orb's smaller home is always page-center.
              applyOrbHomeField(ap, resetHomeX, resetHomeY, 0, resetHomeR, resetHomeFeatherR, 0.0048, 0, 0.00006);
            } else if (resetOrb) {
              // Other orbs live in a larger field centered on the reset orb, with
              // the reset orb's inner zone subtracted to create a Goldilocks annulus.
              applyOrbHomeField(
                ap,
                resetOrb.x,
                resetOrb.y,
                goldInnerR,
                goldOuterR,
                goldFeatherR,
                isSound ? 0.0034 : 0.0023,
                isSound ? 0.0068 : 0.0048,
                isSound ? 0.00016 : 0.00009
              );
            } else {
              // Fallback if reset orb is absent.
              applyOrbHomeField(ap, resetHomeX, resetHomeY, 0, goldOuterR, goldFeatherR, 0.0020, 0, 0.00006);
            }
          }
          // Sound orbs are attracted to the VE while it lives; link orbs are not.
          const mass = ap.r0 * ap.r0 * ap.r0;
          const accelBoost = holdActive ? 1.6 : 1.0;
          if (ap.audioKey && veVisible && ve.scaleCurrent > 5) {
            const dx = ap.x - ve.x, dy = ap.y - ve.y;
            const d  = Math.hypot(dx, dy) || 1;
            const pull = 110 * accelBoost / (d * 0.035 + 1);
            ap.vx -= (dx / d) * pull / mass;
            ap.vy -= (dy / d) * pull / mass;
          }
          // Orbs moving inside the VE transfer a little momentum into the VE.
          // Tangential motion becomes visible rotation; crossing/radial motion gives
          // a soft tumble; average orb velocity gives tiny center drift. This is
          // deliberately damped while the user is holding/controlling the VE.
          if (veVisible && ve.scaleCurrent > 5) {
            const dx = ap.x - ve.x, dy = ap.y - ve.y;
            const d  = Math.hypot(dx, dy) || 1;
            const innerR = ve.scaleCurrent * 0.96;
            if (d < innerR) {
              const ux = dx / d, uy = dy / d;
              const nx = dx / innerR, ny = dy / innerR;
              const speed = Math.hypot(ap.vx, ap.vy);
              const inside = Math.pow(clamp(1 - d / innerR, 0, 1), 0.55);
              const speedT = clamp(speed / 4.2, 0, 1.35);
              const userControlDamp = holdActive ? 0.32 : 1.0;
              const voltaDamp = ve.voltaHeld ? 0.35 : 1.0;
              const transfer = inside * speedT * userControlDamp * voltaDamp;

              // 2D cross product: orbital/tangential motion around VE center.
              const tangential = nx * ap.vy - ny * ap.vx;
              // Radial crossing motion gives a little tumble instead of pure spin.
              const radial = ux * ap.vx + uy * ap.vy;

              ve.ωz += tangential * transfer * dt * 0.0000044;
              ve.ωx += (ap.vy * 0.56 + uy * radial * 0.42) * transfer * dt * 0.0000015;
              ve.ωy -= (ap.vx * 0.56 + ux * radial * 0.42) * transfer * dt * 0.0000015;

              // Tiny translational inheritance, only when the user is not directly
              // steering the VE. This makes it feel alive without stealing control.
              if (!holdActive && !ve.voltaHeld) {
                ve.vx += ap.vx * transfer * dt * 0.000010;
                ve.vy += ap.vy * transfer * dt * 0.000010;
              }

              // Safety caps: visible but never allowed to overpower pointer control.
              const maxW = holdActive ? 0.0048 : 0.0105;
              ve.ωx = clamp(ve.ωx, -maxW, maxW);
              ve.ωy = clamp(ve.ωy, -maxW, maxW);
              ve.ωz = clamp(ve.ωz, -maxW, maxW);
              const maxV = holdActive ? 0.18 : 0.42;
              ve.vx = clamp(ve.vx, -maxV, maxV);
              ve.vy = clamp(ve.vy, -maxV, maxV);
            }
          }
          // Strained orbs shake, jitter, and try to throw off Volta arcs rather than fleeing the creature.
          if (ap.voltaStrain > 0.01) {
            ap.wAngle += (Math.random() - 0.5) * dt * 0.008 * ap.voltaStrain;
            ap.vx += (Math.random() - 0.5) * 0.0040 * dt * ap.voltaStrain;
            ap.vy += (Math.random() - 0.5) * 0.0040 * dt * ap.voltaStrain;
          }
          ap.vx *= 0.988; ap.vy *= 0.988;
          // Edge repulsion only: zero force in the inner 95%, grows in outer 5%
          const ew = w * 0.05, eh = h * 0.05;
          if (ap.x < ew)     ap.vx += Math.pow((ew - ap.x) / ew, 1.6) * 0.022;
          if (ap.x > w - ew) ap.vx -= Math.pow((ap.x - (w - ew)) / ew, 1.6) * 0.022;
          if (ap.y < eh)     ap.vy += Math.pow((eh - ap.y) / eh, 1.6) * 0.022;
          if (ap.y > h - eh) ap.vy -= Math.pow((ap.y - (h - eh)) / eh, 1.6) * 0.022;
          ap.x += ap.vx * dt * 0.026;
          ap.y += ap.vy * dt * 0.026;
        }
      }

      function applyOrbToOrbPressure() {
        const n = appParticles.length;
        for (let i = 0; i < n; i++) {
          const emitter = appParticles[i];
          const speed = Math.hypot(emitter.vx, emitter.vy);
          if (speed < 0.004) continue;
          const dirX = emitter.vx / speed, dirY = emitter.vy / speed;
          const reach = emitter.r0 * 11 + speed * 300;
          const width = emitter.r0 * 4.4 + speed * 100;
          for (let j = 0; j < n; j++) {
            if (i === j) continue;
            const target = appParticles[j];
            const relX = target.x - emitter.x, relY = target.y - emitter.y;
            const forward = relX * dirX + relY * dirY;
            if (forward <= 0 || forward >= reach) continue;
            const lateral = Math.abs(relX * dirY - relY * dirX);
            if (lateral >= width) continue;
            const wave = Math.pow(1 - forward / reach, 2) * Math.pow(1 - lateral / width, 2) * Math.min(1.0, speed * 24) * 0.00065;
            target.vx += dirX * wave;
            target.vy += dirY * wave;
          }
        }
      }

      // ─── Cat behavioral AI ───────────────────────────────────────────────────

      function initCat() {
        cat = appParticles.find(p => p.orbImg) || null;
        if (!cat) return;
        cat._c = {
          mood: 'idle',
          moodTimer: 1500 + Math.random() * 2000,
          rot: 0, rotTarget: 0,            // radians; capped ±20°
          sca: 1.0, scaTarget: 1.0,        // scale multiplier on draw
          targetX: null, targetY: null,    // wander destination
          sprintDX: 0, sprintDY: 0,
          scaredPhase: 0,
          leanSign: 1,                     // which way to tilt when curious
          attackCooldown: 0,               // ms before cat may attack again
          meowIn: 20000 + Math.random() * 40000, // first meow delay: 20–60s
          clickInterestX: null,
          clickInterestY: null,
          clickInterestUntil: 0,
          clickInterestCooldownUntil: 0,
          clickGraceUntil: 0,                    // stay easy to click when pointer is near/on cat
        };
      }

      function noteCatTapInterest(event, pressedOrb = null) {
        if (!cat) return;
        if (!cat._c) initCat();
        if (!cat || !cat._c) return;

        const c = cat._c;
        const rect = stage.getBoundingClientRect();
        const p = event.touches ? event.touches[0] : event;
        const tx = p.clientX - rect.left;
        const ty = p.clientY - rect.top;
        const now = performance.now();
        const pressedCat = !!(pressedOrb && pressedOrb.orbImg);
        const tapDist = Math.hypot(tx - cat.x, ty - cat.y);

        // If the user is trying to click the cat, make the cat hold still
        // instead of reacting and slipping out from under the click.
        if (pressedCat || tapDist < Math.max(42, cat.r0 * 3.6)) {
          c.clickGraceUntil = now + 950;
          if (c.mood !== 'scared' && c.mood !== 'attack') {
            c.mood = 'idle';
            c.moodTimer = Math.max(c.moodTimer, 650);
          }
          return;
        }

        // Do not treat clicks on other orbs as cat targets.
        if (pressedOrb) return;
        if (c.mood === 'scared' || c.mood === 'attack') return;
        if (now < c.clickInterestCooldownUntil) return;

        // Sometimes investigate a click/tap, but not every time.
        if (Math.random() > 0.34) return;

        const dx = tx - cat.x, dy = ty - cat.y;
        const d = Math.hypot(dx, dy) || 1;
        if (d < 120) return;

        // Approach near the tap, but stop short and offset sideways so the cat
        // does not cover the intended click/tap point.
        const ux = dx / d, uy = dy / d;
        const stopShort = clamp(cat.r0 * 4.4 + rand(48, 82), 70, 128);
        const sideOffset = rand(-58, 58);
        const targetX = tx - ux * stopShort + (-uy) * sideOffset;
        const targetY = ty - uy * stopShort + ux * sideOffset;

        c.clickInterestX = clamp(targetX, w * 0.06, stage.clientWidth  * 0.94);
        c.clickInterestY = clamp(targetY, h * 0.06, stage.clientHeight * 0.94);
        c.clickInterestUntil = now + rand(1800, 3600);
        c.clickInterestCooldownUntil = now + rand(2600, 5200);
        c.mood = 'tap_interest';
        c.moodTimer = rand(900, 1800);
      }

      function updateCat(dt, now) {
        if (!cat) return;
        if (!cat._c) initCat();
        const c  = cat._c;
        const w  = stage.clientWidth, h = stage.clientHeight;
        const D20 = Math.PI / 9;  // 20° in radians

        // Distances to relevant things
        const cursorDist = Math.hypot(catCursorX - cat.x, catCursorY - cat.y);
        const voltaDist  = volta.active ? Math.hypot(volta.cx - cat.x, volta.cy - cat.y) : 9999;

        // Nearest non-cat orb
        let nearOrb = null, nearDist = 9999;
        for (const ap of appParticles) {
          if (ap === cat || ap.orbImg) continue;
          const d = Math.hypot(ap.x - cat.x, ap.y - cat.y);
          if (d < nearDist) { nearDist = d; nearOrb = ap; }
        }

        // ── Timers ────────────────────────────────────────────────────────────
        c.moodTimer      -= dt;
        c.attackCooldown  = Math.max(0, c.attackCooldown - dt);
        const voltaScary = voltaDist < 290;
        const pointerNearCat = cursorDist < Math.max(38, cat.r0 * 3.4);
        const orbNear    = nearOrb && nearDist < 340;
        if (pointerNearCat && c.mood !== 'scared' && c.mood !== 'attack') {
          c.clickGraceUntil = Math.max(c.clickGraceUntil || 0, now + 420);
        }

        // ── State machine ─────────────────────────────────────────────────────

        // Scared overrides everything (except self-initiated attack)
        if (voltaScary && c.mood !== 'attack') {
          if (c.mood !== 'scared') {
            c.mood = 'scared'; c.moodTimer = 800; c.scaredPhase = 0;
          }
        }

        // From scared → brief brave attack (rare)
        if (c.mood === 'scared' && c.attackCooldown === 0 && voltaDist < 240
            && Math.random() < 0.0005 * dt) {
          c.mood = 'attack'; c.moodTimer = 320 + Math.random() * 380;
          c.attackCooldown = 9000;
        }

        // Attack → scared immediately on expiry
        if (c.mood === 'attack' && c.moodTimer <= 0) {
          c.mood = 'scared'; c.moodTimer = 1800;
        }

        // Scared → calm when Volta gone and timer expired
        if (c.mood === 'scared' && !voltaScary && c.moodTimer <= 0) {
          c.mood = 'idle'; c.moodTimer = 500 + Math.random() * 1200;
        }

        // Tap interest is explicit and occasional; passive cursor proximity
        // never pulls the cat toward the mouse.
        if (c.mood !== 'scared' && c.mood !== 'attack') {
          if (c.mood === 'tap_interest') {
            const hasTarget = c.clickInterestX !== null && c.clickInterestY !== null;
            const done = !hasTarget
              || now > c.clickInterestUntil
              || c.moodTimer <= 0
              || Math.hypot(c.clickInterestX - cat.x, c.clickInterestY - cat.y) < 24;
            if (done) {
              c.clickInterestX = null;
              c.clickInterestY = null;
              c.mood = 'idle';
              c.moodTimer = 700 + Math.random() * 1500;
            }
          }

          // Curiosity toward other orbs, but not while investigating a tap.
          if (orbNear && c.mood !== 'tap_interest' && c.mood !== 'curious') {
            c.mood = 'curious'; c.moodTimer = 3000 + Math.random() * 3000;
            c.leanSign = Math.random() < 0.5 ? 1 : -1;
          }
          if (c.mood === 'curious' && (!orbNear || c.moodTimer <= 0)) {
            c.mood = 'idle'; c.moodTimer = 600 + Math.random() * 1400;
          }
        }

        // Idle timer: decide next vibe
        if (c.mood === 'idle' && c.moodTimer <= 0) {
          const r = Math.random();
          if (r < 0.22) {
            // ZOOMIES — more frequent
            c.mood = 'sprint';
            const a = Math.random() * Math.PI * 2;
            c.sprintDX = Math.cos(a); c.sprintDY = Math.sin(a);
            c.moodTimer = 400 + Math.random() * 900;
          } else if (r < 0.72) {
            // Wander — bias targets toward center half so cat stays in the scene
            c.mood = 'wander';
            c.targetX = w * 0.20 + Math.random() * w * 0.60;
            c.targetY = h * 0.20 + Math.random() * h * 0.60;
            c.moodTimer = 2500 + Math.random() * 3500;
          } else {
            // Sit a bit longer
            c.moodTimer = 700 + Math.random() * 1500;
          }
        }

        // Wander finishes when close to target
        if (c.mood === 'wander') {
          if (c.moodTimer <= 0 || (c.targetX !== null && Math.hypot(c.targetX - cat.x, c.targetY - cat.y) < 22)) {
            c.mood = 'idle'; c.moodTimer = 700 + Math.random() * 2000;
          }
        }
        if (c.mood === 'sprint' && c.moodTimer <= 0) {
          c.mood = 'idle'; c.moodTimer = 500 + Math.random() * 1600;
        }

        // ── Velocity / impulses by mood ───────────────────────────────────────
        const DAMP = Math.pow(0.90, dt / 16);

        switch (c.mood) {
          case 'idle': {
            // Soft drift toward canvas center so the cat stays in the scene
            const cxPull = (w * 0.5 - cat.x) * 0.000012 * dt;
            const cyPull = (h * 0.5 - cat.y) * 0.000012 * dt;
            cat.vx *= Math.pow(0.91, dt / 16);
            cat.vy *= Math.pow(0.91, dt / 16);
            cat.vx += (Math.random() - 0.5) * 0.014 * dt + cxPull;
            cat.vy += (Math.random() - 0.5) * 0.014 * dt + cyPull;
            c.rotTarget = Math.sin(now * 0.00088) * D20 * 0.28 + Math.sin(now * 0.00063) * D20 * 0.14;
            if (Math.random() < 0.0004 * dt) c.rotTarget += (Math.random() - 0.5) * D20 * 1.6; // tail flick
            c.scaTarget = 1.0;
            break;
          }
          case 'wander': {
            const dx = c.targetX - cat.x, dy = c.targetY - cat.y;
            const d  = Math.hypot(dx, dy) || 1;
            const spd = 2.0 * clamp(d / 70, 0.1, 1.0);
            cat.vx = cat.vx * DAMP + (dx / d) * spd * 0.038 * dt;
            cat.vy = cat.vy * DAMP + (dy / d) * spd * 0.038 * dt;
            const moveMag = Math.hypot(cat.vx, cat.vy);
            c.rotTarget = moveMag > 0.25
              ? clamp(Math.atan2(cat.vy, cat.vx), -D20, D20)
              : Math.sin(now * 0.00095) * D20 * 0.2;
            c.scaTarget = 1.0;
            break;
          }
          case 'sprint': {
            cat.vx = cat.vx * DAMP + c.sprintDX * 8.0 * 0.050 * dt;
            cat.vy = cat.vy * DAMP + c.sprintDY * 8.0 * 0.050 * dt;
            c.rotTarget = clamp(Math.atan2(c.sprintDY, c.sprintDX), -D20, D20)
                        + Math.sin(now * 0.033) * D20 * 0.32;
            c.scaTarget = 1.0 + Math.abs(Math.sin(now * 0.031)) * 0.20; // bounding excitement
            break;
          }
          case 'curious': {
            if (nearOrb) {
              const dx = nearOrb.x - cat.x, dy = nearOrb.y - cat.y;
              const d  = Math.hypot(dx, dy) || 1;
              if (d > 28) {
                cat.vx = cat.vx * DAMP + (dx / d) * 1.2 * 0.030 * dt;
                cat.vy = cat.vy * DAMP + (dy / d) * 1.2 * 0.030 * dt;
              } else {
                cat.vx *= DAMP; cat.vy *= DAMP;
              }
            }
            // Classic head-tilt: lean sideways, slight forward bob
            c.rotTarget = c.leanSign * D20 * (0.72 + Math.sin(now * 0.00085) * 0.28);
            c.scaTarget = 1.10;
            break;
          }
          case 'tap_interest': {
            if (c.clickInterestX === null || c.clickInterestY === null) {
              cat.vx *= DAMP; cat.vy *= DAMP;
              c.rotTarget = Math.sin(now * 0.0011) * D20 * 0.22;
              c.scaTarget = 1.0;
              break;
            }
            const dx = c.clickInterestX - cat.x, dy = c.clickInterestY - cat.y;
            const d  = Math.hypot(dx, dy) || 1;
            if (d > 24) {
              const spd = 1.35 * clamp(d / 95, 0.18, 1.0);
              cat.vx = cat.vx * DAMP + (dx / d) * spd * 0.026 * dt;
              cat.vy = cat.vy * DAMP + (dy / d) * spd * 0.026 * dt;
            } else {
              cat.vx *= DAMP; cat.vy *= DAMP;
            }
            c.rotTarget = Math.sin(now * 0.0024) * D20 * 0.32;
            c.scaTarget = 1.04;
            break;
          }
          case 'scared': {
            const dx = cat.x - volta.cx, dy = cat.y - volta.cy;
            const d  = Math.hypot(dx, dy) || 1;
            cat.vx = cat.vx * DAMP + (dx / d) * 6.0 * 0.052 * dt;
            cat.vy = cat.vy * DAMP + (dy / d) * 6.0 * 0.052 * dt;
            c.scaredPhase += dt * 0.019;
            c.rotTarget = Math.sin(c.scaredPhase) * D20 * 0.92
                        + Math.sin(c.scaredPhase * 2.6 + 1.3) * D20 * 0.42;
            c.scaTarget = 1.24; // puffed up
            break;
          }
          case 'attack': {
            const dx = volta.cx - cat.x, dy = volta.cy - cat.y;
            const d  = Math.hypot(dx, dy) || 1;
            cat.vx = cat.vx * DAMP + (dx / d) * 7.0 * 0.055 * dt;
