<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Adividiardi</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #060708;
      --bg2: #0d1014;
      --ink: #ebe4d7;
      --ghost: rgba(235, 228, 215, 0.16);
      --line: rgba(235, 228, 215, 0.08);
    }
    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.03), transparent 28%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      color: var(--ink);
      font-family: Cambria, Georgia, "Times New Roman", serif;
      touch-action: none;
    }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    #field {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #field::before,
    #field::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #field::before {
      width: min(80vw, 720px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }
    #field::after {
      width: min(64vw, 560px);
      height: min(18vw, 120px);
      border-top: 1px solid rgba(255,255,255,0.025);
      border-bottom: 1px solid rgba(255,255,255,0.025);
      opacity: 0.45;
    }
    .letter,
    .echo {
      position: absolute;
      top: 50%;
      left: 50%;
      white-space: pre;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      will-change: transform, opacity;
      pointer-events: none;
    }
    .letter {
      color: var(--ink);
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(255,255,255,0.03);
    }
    .echo {
      color: var(--ghost);
      font-weight: 600;
      animation: echoFade 900ms cubic-bezier(.19,.72,.24,1) forwards;
    }
    @keyframes echoFade {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.94); }
      12% { opacity: 0.7; }
      100% { opacity: 0; transform: translate(-50%, calc(-50% - 10px)) scale(1.02); }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Interactive Adividiardi wordmark">
    <div id="field"></div>
  </main>

  <script>
    (() => {
      const TEXT = 'ADIVIDIARDI';
      const stage = document.getElementById('stage');
      const measureCanvas = document.createElement('canvas');
      const measureCtx = measureCanvas.getContext('2d');
      if (!measureCtx) return;

      const letters = [];
      const anchors = [];
      const pointer = {
        active: false,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        lastX: 0,
        lastY: 0,
        time: 0,
        strength: 0
      };

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

      function fontPx() {
        return clamp(stage.clientWidth * 0.108, 38, 92);
      }
      function baseTracking() {
        return clamp(stage.clientWidth * 0.0115, 5, 12);
      }

      function createLetters() {
        for (const ch of TEXT) {
          const el = document.createElement('span');
          el.className = 'letter';
          el.textContent = ch;
          stage.appendChild(el);
          letters.push({
            ch,
            el,
            baseX: 0,
            baseY: 0,
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            width: 0,
            lift: 0,
            phase: Math.random() * Math.PI * 2,
            kick: 0,
          });
        }
      }

      function layout() {
        const size = fontPx();
        const tracking = baseTracking();
        measureCtx.font = `700 ${size}px Cambria, Georgia, serif`;

        let total = 0;
        const widths = letters.map(letter => {
          const width = measureCtx.measureText(letter.ch).width;
          total += width;
          return width;
        });
        total += tracking * (letters.length - 1);

        const centerX = stage.clientWidth / 2;
        const centerY = stage.clientHeight / 2;
        let cursor = centerX - total / 2;
        anchors.length = 0;

        letters.forEach((letter, i) => {
          const width = widths[i];
          const x = cursor + width / 2;
          const y = centerY;
          letter.baseX = letter.x = x;
          letter.baseY = letter.y = y;
          letter.width = width;
          letter.vx = 0;
          letter.vy = 0;
          letter.el.style.fontSize = `${size}px`;
          anchors.push({ x, y, width, ch: letter.ch });
          cursor += width + tracking;
        });
      }

      function spawnEcho(index, dx = 0, dy = 0) {
        const anchor = anchors[index];
        if (!anchor) return;
        const echo = document.createElement('span');
        echo.className = 'echo';
        echo.textContent = anchor.ch;
        echo.style.fontSize = `${fontPx() * 0.98}px`;
        echo.style.left = `${anchor.x + dx}px`;
        echo.style.top = `${anchor.y + dy}px`;
        stage.appendChild(echo);
        echo.addEventListener('animationend', () => echo.remove(), { once: true });
      }

      function nearestIndex(x) {
        let best = 0;
        let bestDist = Infinity;
        for (let i = 0; i < anchors.length; i++) {
          const d = Math.abs(anchors[i].x - x);
          if (d < bestDist) { best = i; bestDist = d; }
        }
        return best;
      }

      function excite(x, y, velocity = 1) {
        const index = nearestIndex(x);
        const spread = clamp(velocity * 0.8, 0.5, 1.8);
        for (let i = 0; i < letters.length; i++) {
          const falloff = Math.max(0, 1 - Math.abs(i - index) / 4.5);
          if (falloff <= 0) continue;
          const direction = i < index ? -1 : 1;
          letters[i].vx += direction * 1.3 * falloff * spread;
          letters[i].vy += (i === index ? -2.4 : -1.1) * falloff * spread;
          letters[i].kick = Math.max(letters[i].kick, 0.18 * falloff * spread);
        }
        spawnEcho(index, 0, -4);
        if (index > 0) spawnEcho(index - 1, -4, 2);
        if (index < anchors.length - 1) spawnEcho(index + 1, 4, 2);
      }

      function pointFromEvent(event) {
        const rect = stage.getBoundingClientRect();
        const p = event.touches ? event.touches[0] : event;
        return { x: p.clientX - rect.left, y: p.clientY - rect.top };
      }

      function setPointer(x, y) {
        const now = performance.now();
        if (pointer.time) {
          pointer.vx = x - pointer.lastX;
          pointer.vy = y - pointer.lastY;
        }
        pointer.active = true;
        pointer.x = x;
        pointer.y = y;
        pointer.lastX = x;
        pointer.lastY = y;
        pointer.time = now;
        pointer.strength = 1;
      }

      function clearPointerSoon() {
        pointer.strength *= 0.92;
        if (pointer.strength < 0.02) pointer.active = false;
      }

      function tick(now) {
        const t = now * 0.001;
        const sizePulse = 1 + Math.sin(t * 1.15) * 0.016;

        for (let i = 0; i < letters.length; i++) {
          const letter = letters[i];
          const anchor = anchors[i];
          let tx = anchor.x;
          let ty = anchor.y;

          const ambientY = Math.sin(t * 1.2 + i * 0.42 + letter.phase) * 2.2;
          const ambientX = Math.sin(t * 0.9 + i * 0.31) * 0.8;
          tx += ambientX;
          ty += ambientY;

          if (pointer.active) {
            const dx = letter.x - pointer.x;
            const dy = letter.y - pointer.y;
            const d = Math.hypot(dx, dy) || 1;
            const influence = Math.max(0, 1 - d / (stage.clientWidth < 700 ? 150 : 190)) * pointer.strength;
            const sweep = clamp(pointer.vx * 0.18, -10, 10) * influence;
            tx += sweep;
            ty += (-18 * influence) + clamp(dy * 0.045, -8, 8) * influence;
            letter.vx += (dx / d) * 0.22 * influence;
            letter.vy += (dy / d) * 0.14 * influence;
          }

          letter.vx += (tx - letter.x) * 0.04;
          letter.vy += (ty - letter.y) * 0.07;
          letter.vx *= 0.86;
          letter.vy *= 0.8;
          letter.x += letter.vx;
          letter.y += letter.vy;
          letter.kick *= 0.9;

          const skew = clamp(letter.vx * 1.6, -10, 10);
          const scaleX = sizePulse + letter.kick * 0.12 + Math.abs(letter.vx) * 0.003;
          const scaleY = sizePulse - letter.kick * 0.05;
          letter.el.style.left = `${letter.x}px`;
          letter.el.style.top = `${letter.y}px`;
          letter.el.style.opacity = `${0.92 + Math.min(0.08, letter.kick)}`;
          letter.el.style.transform = `translate(-50%, -50%) skewX(${skew}deg) scale(${scaleX}, ${scaleY})`;
        }

        clearPointerSoon();
        requestAnimationFrame(tick);
      }

      stage.addEventListener('pointerdown', (event) => {
        const p = pointFromEvent(event);
        setPointer(p.x, p.y);
        excite(p.x, p.y, 1.2);
      });

      stage.addEventListener('pointermove', (event) => {
        if (event.pointerType === 'mouse' && event.buttons === 0) return;
        const p = pointFromEvent(event);
        setPointer(p.x, p.y);
        if (Math.abs(pointer.vx) + Math.abs(pointer.vy) > 6) {
          excite(p.x, p.y, clamp((Math.abs(pointer.vx) + Math.abs(pointer.vy)) / 14, 0.6, 1.3));
        }
      });

      stage.addEventListener('pointerup', () => { pointer.active = false; });
      stage.addEventListener('pointercancel', () => { pointer.active = false; });
      stage.addEventListener('touchstart', (event) => {
        const p = pointFromEvent(event);
        setPointer(p.x, p.y);
        excite(p.x, p.y, 1.1);
      }, { passive: true });

      window.addEventListener('resize', layout);

      createLetters();
      layout();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
