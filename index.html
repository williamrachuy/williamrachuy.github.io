<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Adividiardi</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #040507;
      --bg2: #090b10;
    }
    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.018), transparent 24%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      font-family: Cambria, Georgia, "Times New Roman", serif;
      touch-action: none;
    }
    body { min-height: 100dvh; }
    #stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
      isolation: isolate;
    }
    #particles, #wordmark-wrap, #veil {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #wordmark-wrap { display: grid; align-items: start; justify-content: center; padding-top: 18dvh; }
    #wordmark {
      position: relative;
      display: inline-block;
      transform-origin: center center;
      animation: breathe 15s ease-in-out infinite;
      will-change: opacity, filter, transform;
    }
    #wordmark::after {
      content: "";
      position: absolute;
      inset: -20px -24px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(232,224,209,0.06), rgba(232,224,209,0.015) 36%, transparent 74%);
      opacity: var(--after-opacity, 0.04);
      filter: blur(22px);
      z-index: -1;
      will-change: opacity;
    }
    .title-letter {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      white-space: pre;
      color: rgba(232,224,209,0.24);
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(255,255,255,0.02);
      will-change: transform, color, text-shadow;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.95); }
      50%       { transform: scale(1.05); }
    }
  #ver-stamp {
    position: fixed;
    bottom: max(12px, env(safe-area-inset-bottom, 12px));
    right: 12px;
    font: 11px/1 monospace;
    color: rgba(170,200,216,0.38);
    pointer-events: none;
    z-index: 9999;
    user-select: none;
    white-space: nowrap;
  }
  </style>
</head>
<body>
  <div id="ver-stamp"></div>
  <main id="stage" aria-label="Interactive Adividiardi landing page">
    <canvas id="particles"></canvas>
    <div id="veil"></div>
    <div id="wordmark-wrap"><div id="wordmark" aria-label="ADIVIDIARDI"></div></div>
  </main>
  <audio id="nautilus-audio" src="audio/Nautilus.mp3" preload="metadata"></audio>

  <script>
    (() => {
      const TITLE   = 'ADIVIDIARDI';
      const VERSION = '20260627.32 · da699e4';

      const stage          = document.getElementById('stage');
      const particlesCanvas = document.getElementById('particles');
      const pctx           = particlesCanvas.getContext('2d');
      const word           = document.getElementById('wordmark');
      const nautilusAudio  = document.getElementById('nautilus-audio');
      if (!pctx) return;

      const measureCanvas = document.createElement('canvas');
      const measureCtx    = measureCanvas.getContext('2d');
      const titleLetters  = [];
      const particles     = [];
      const lights        = [];
      // spawnQueue removed — particles now regrow in place
      const appParticles     = []; // living particles — one per sub-page, immune to ablation
      const hotParticles     = []; // subset of particles with heat≥0.3 — rebuilt each frame
      const liberatedNodes   = []; // VE nodes after full dissolution — persist forever
      let lastFrame       = 0;
      let holdActive      = false; // true while mouse/touch is held down
      let lastStageW      = 0;
      let lastStageH      = 0;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function rand(lo, hi)     { return lo + Math.random() * (hi - lo); }
      function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
      function gaussianRandom(mean, std) {
        const u1 = Math.max(1e-10, Math.random());
        return mean + std * Math.sqrt(-2 * Math.log(u1)) * Math.cos(Math.PI * 2 * Math.random());
      }
      function brightenColor(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        const lift = (c, f) => Math.round(c + (255-c)*f).toString(16).padStart(2,'0');
        return `#${lift(r,0.62)}${lift(g,0.62)}${lift(b,0.62)}`;
      }

      // ─── Vector Equilibrium geometry ────────────────────────────────────────
      // Cuboctahedron: 12 vertices at all permutations of (±1,±1,0)/√2 on the unit sphere.
      // Circumradius = edge length = 1. Fuller's "vector equilibrium" — all vectors cancel.
      const VE_S = 1 / Math.SQRT2;
      const VE_V = [
        [ VE_S, VE_S,    0],[ VE_S,-VE_S,    0],[-VE_S, VE_S,    0],[-VE_S,-VE_S,    0],
        [ VE_S,    0, VE_S],[ VE_S,    0,-VE_S],[-VE_S,    0, VE_S],[-VE_S,    0,-VE_S],
        [    0, VE_S, VE_S],[    0, VE_S,-VE_S],[    0,-VE_S, VE_S],[    0,-VE_S,-VE_S]
      ];
      const VE_E = []; // 24 edges — vertex pairs at unit distance
      for (let i = 0; i < 12; i++)
        for (let j = i+1; j < 12; j++) {
          const [ax,ay,az] = VE_V[i], [bx,by,bz] = VE_V[j];
          const d2 = (ax-bx)**2 + (ay-by)**2 + (az-bz)**2;
          if (d2 > 0.95 && d2 < 1.05) VE_E.push([i, j]);
        }
      const VE_T = [[0,4,8],[0,5,9],[1,4,10],[1,5,11],[2,6,8],[2,7,9],[3,6,10],[3,7,11]];
      const VE_Q = [[0,4,1,5],[2,6,3,7],[0,8,2,9],[1,10,3,11],[4,8,6,10],[5,9,7,11]];
      // Per-vertex edge lists (degree 4 per vertex in cuboctahedron)
      const VE_VERTEX_EDGES = Array.from({length: 12}, () => []);
      for (let _ei = 0; _ei < VE_E.length; _ei++) {
        VE_VERTEX_EDGES[VE_E[_ei][0]].push(_ei);
        VE_VERTEX_EDGES[VE_E[_ei][1]].push(_ei);
      }
      // Edge lookup for face-to-edge mapping
      const VE_E_MAP = {};
      for (let _ei = 0; _ei < VE_E.length; _ei++) VE_E_MAP[VE_E[_ei][0]*12+VE_E[_ei][1]] = _ei;
      const _fei = (a,b) => a < b ? VE_E_MAP[a*12+b] : VE_E_MAP[b*12+a];
      const VE_T_EDGES = VE_T.map(([a,b,c]) => [_fei(a,b),_fei(b,c),_fei(a,c)]);
      const VE_Q_EDGES = VE_Q.map(([a,b,c,d]) => [_fei(a,b),_fei(b,c),_fei(c,d),_fei(d,a)]);
      // Per-edge rest lengths — initial 2D projected distances (computed once at init angles)
      const VE_E_REST = (() => {
        const tx=0.4,ty=1.1,tz=0.2,S=52,f=280;
        const ip = VE_V.map(([vx,vy,vz]) => {
          const y1=vy*Math.cos(tx)-vz*Math.sin(tx), z1=vy*Math.sin(tx)+vz*Math.cos(tx);
          const x2=vx*Math.cos(ty)+z1*Math.sin(ty), z2=-vx*Math.sin(ty)+z1*Math.cos(ty);
          const x3=x2*Math.cos(tz)-y1*Math.sin(tz), y3=x2*Math.sin(tz)+y1*Math.cos(tz);
          const p=f/(f+z2*S); return [x3*S*p, y3*S*p];
        });
        return VE_E.map(([i,j]) => Math.hypot(ip[i][0]-ip[j][0], ip[i][1]-ip[j][1]));
      })();
      // Spring physics constants (tuned via Python simulation — stable 52→65px radius after full dissolution)
      const VE_SPRING_K = 0.0015; // per-edge spring stiffness
      const VE_REP_STR  = 0.003;  // node-pair repulsion (inv-square, softened)
      const VE_DAMP     = 0.975;  // velocity damping per frame

      // VE runtime state
      const ve = {
        x: 0, y: 0, targetX: 0, targetY: 0, prevTX: 0, prevTY: 0,
        vx: 0, vy: 0,
        cvx: 0, cvy: 0,
        θx: 0.4, θy: 1.1, θz: 0.2,
        ωx: 0.00025, ωy: 0.00041, ωz: 0.00016,
        scale: 52, brightness: 0.55, alphaP: 0, scaleP: 0, alpha: 0, scaleCurrent: 0,
        excitement: 0, strain: 0, active: false, voltaHeld: false,
        destroyedEdges: new Set(),   // edge indices claimed by Volta during infection
        edgeEnergies: null,          // Float32Array — per-edge energy [0,1], dims in drawVE
        edgeDrainRates: null,        // per-edge randomized drain rate
        vertNodes: null,             // per-vertex {x,y,vx,vy,freedom} spring objects
        centerNode: null,             // center node joins vertex physics once Volta attacks
        liberated: false,            // true once all edges destroyed (vertices drift freely)
        projCache: null,             // last projected vertex screen positions (ideal)
      };

      // Volta — arc lightning creature that traverses particle fields toward the VE
      const volta = {
        active: false,
        state: 'dormant',      // 'dormant' | 'entering' | 'traversing' | 'infecting'
        cx: 0, cy: 0,          // creature center
        energy: 1.0,
        pool: 1.0,             // arc energy pool — drains on arc creation, regens over time
        arcs: [],              // active arc segments: { a, b, born, maxAge, strength }
        infectedTimer: 0,
        infectedDuration: 0,
        charge: 0,             // 0→1 during infection — drives VE wildness
        nextSpawn: 0,
        tapTimes: [],          // timestamps for 12-tap summon detection
      };

      // ─── Canvas sizing ──────────────────────────────────────────────────────

      function setCanvasSize(canvas, ctx) {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        canvas.width  = Math.round(stage.clientWidth  * dpr);
        canvas.height = Math.round(stage.clientHeight * dpr);
        canvas.style.width  = stage.clientWidth  + 'px';
        canvas.style.height = stage.clientHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // ─── Title ─────────────────────────────────────────────────────────────

      function buildTitle() {
        titleLetters.length = 0;
        word.innerHTML = '';
        const fontSize = clamp(stage.clientWidth * 0.105, 38, 108);
        const tracking = fontSize * 0.08;
        measureCtx.font = `700 ${fontSize}px Cambria, Georgia, Times New Roman, serif`;
        const widths = [...TITLE].map(ch => measureCtx.measureText(ch).width);
        const total  = widths.reduce((a, b) => a + b, 0) + tracking * (widths.length - 1);
        word.style.width  = `${Math.ceil(total)}px`;
        word.style.height = `${Math.ceil(fontSize * 1.2)}px`;
        let x = 0;
        for (let i = 0; i < TITLE.length; i++) {
          const span = document.createElement('span');
          span.className   = 'title-letter';
          span.textContent = TITLE[i];
          span.style.fontSize = `${fontSize}px`;
          const baseX = x + widths[i] / 2;
          span.style.left = `${baseX}px`;
          word.appendChild(span);
          titleLetters.push({ el: span, baseX, x: baseX, y: 0, vx: 0, vy: 0 });
          x += widths[i] + tracking;
        }
      }

      // ─── App particles (living — sub-pages) ────────────────────────────────

      function seedAppParticles() {
        appParticles.length = 0;
        const pages = [
          { path: 'snake',            color: '#3d4d26' }, // dark moss
          { path: 'berzerk',          color: '#6b3420' }, // dark terracotta
          { path: 'calculator',       color: '#6a5410' }, // dark ochre
          { path: 'clock',            color: '#263d4a' }, // dark slate
          { path: 'cellularautomata', color: '#47301e' }, // dark umber
          { path: 'blog',             color: '#5c3333' }, // dark dusty rose
          { path: 'nanaimo',          color: '#6a5840' }, // dark sand
          { path: 'pretext-demo',     color: '#354027' }, // dark sage
          { audio: true,              color: '#32465f' }, // Nautilus — fast, cursor-independent
        ];
        const w = stage.clientWidth, h = stage.clientHeight;
        const margin = 40;
        for (const page of pages) {
          const r0 = 7 + Math.random() * 3;
          appParticles.push({
            ...page,
            brightColor: brightenColor(page.color),
            x: margin + Math.random() * (w - margin * 2),
            y: margin + Math.random() * (h - margin * 2),
            vx: 0, vy: 0,
            r0,
            wAngle:      Math.random() * Math.PI * 2,
            breathPhase: Math.random() * Math.PI * 2,
            breathRate:  0.0006 + Math.random() * 0.0004,
            speed: page.audio ? 2.2 : 1,
            playing: false,
          });
        }
      }

      // ─── Particles ─────────────────────────────────────────────────────────

      function seedParticles() {
        particles.length = 0;
        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 1;
        const count = isMobile ? 240 : 432;
        for (let i = 0; i < count; i++) {
          const r0 = Math.random() > 0.86 ? 1.0 : 0.5; // 3D radius; visual diameter = r0*2
          particles.push({
            x:  Math.random() * stage.clientWidth,
            y:  Math.random() * stage.clientHeight,
            vx: rand(-0.012, 0.012),
            vy: rand(-0.008, 0.008),
            tw:    Math.random() * Math.PI * 2,
            alpha: rand(0.16, 0.34),
            trail: [],
            r:    r0,  // current 3D radius (drives mass + visual size)
            r0:   r0,  // max radius (recovery ceiling)
            heat: 0,   // 0=cold, 1=fully ablating
            thermalInput: 0, // force/arc energy deposited this frame
            mass: r0 * r0 * r0,
            drag: Math.max(0.90, 1 - 0.0003 / (r0 * r0) - 0.0006 / r0),
            vs:   Math.max(1, r0 * 2) // visual size (px), kept in sync each frame
          });
        }
      }

      // Blend cool-white (#f1eadc) → hot-orange (#ff8c40) based on heat [0,1]
      function heatColor(heat) {
        const h = heat * heat; // square = more dramatic near source
        const r = Math.round(241 + (255 - 241) * h);
        const g = Math.round(234 + (140 - 234) * h);
        const b = Math.round(220 + ( 64 - 220) * h);
        return `rgb(${r},${g},${b})`;
      }

      function applyThermalResponse(p, thermalInput, dt) {
        const heatTarget = clamp(thermalInput, 0, 1);
        const heatRate = heatTarget > p.heat ? 0.006 : 0.0015;
        p.heat += (heatTarget - p.heat) * clamp(dt * heatRate, 0, 1);
      }

      function updateParticles(dt) {
        const w = stage.clientWidth, h = stage.clientHeight;
        // dr/dt = (net dm/dt) / (3r²), m ∝ r³, uniform density
        const kLoss = 0.00022;   // ablation rate — ~3s to evaporate at 50% light radius
        const kGain = 0.000015;  // recovery rate via ODE phase

        for (const p of particles) {
          p.tw += dt * 0.00045;

          // All heating sources deposit energy into one material model. Lights
          // are substrate disturbances: proximity alone is not temperature;
          // only the force they actually exert contributes frictional heat.
          let thermalInput = p.thermalInput || 0;
          p.thermalInput = 0;
          for (const l of lights) {
            const dx = p.x - l.x, dy = p.y - l.y;
            const d    = Math.hypot(dx, dy) || 1;
            const prox = Math.max(0, 1 - d / 140);
            const force = Math.pow(prox, 1.8) * l.strength;
            if (p.mass > 0.01) {
              p.vx += (dx / d) * force * 0.057 / p.mass;
              p.vy += (dy / d) * force * 0.057 / p.mass;
              thermalInput = Math.max(thermalInput, force);
            }
          }

          // App-particle pressure
          for (const ap of appParticles) {
            const adx = p.x - ap.x, ady = p.y - ap.y;
            const ad  = Math.hypot(adx, ady) || 1;
            const apr = Math.max(0, 1 - ad / (ap.r0 * 6));
            if (apr > 0 && p.mass > 0.01) {
              const pressure = ap.audio && ap.playing ? 1.30 : 1;
              const forceLoad = apr * apr * pressure;
              const ainf = forceLoad * 0.0012 / p.mass;
              p.vx += (adx / ad) * ainf;
              p.vy += (ady / ad) * ainf;
              thermalInput = Math.max(thermalInput, forceLoad);
            }
          }

          // Shared thermal response: force and arc energy heat identically;
          // absence of either cools the material back toward ambient.
          applyThermalResponse(p, thermalInput, dt);

          // Evaporated particles cool before they can nucleate and regrow.
          if (p.r <= 0) {
            p.r = (p.heat < 0.1) ? 0.001 : 0;
            continue;
          }

          // Ablation / regrowth ODE; denominator clamped to avoid 1/r² singularity at r→0
          const r2safe = Math.max(p.r * p.r, 0.04);
          const drdt   = (-p.heat * kLoss + (1 - p.heat) * kGain) / (3 * r2safe);
          p.r = Math.min(p.r0, Math.max(0, p.r + drdt * dt));

          p.mass = p.r * p.r * p.r;
          p.drag = Math.max(0.90, 1 - 0.0003 / Math.max(p.r * p.r, 0.01)
                                    - 0.0006 / Math.max(p.r, 0.1));
          p.vs   = Math.max(1, p.r * 2);
          p.vx  *= p.drag; p.vy *= p.drag;
          p.trail.unshift({ x: p.x, y: p.y });
          if (p.trail.length > 5) p.trail.pop();
          p.x  += p.vx * dt * 0.026;
          p.y  += p.vy * dt * 0.026;
          if (p.x < -6) p.x = w + 6; if (p.x > w + 6) p.x = -6;
          if (p.y < -6) p.y = h + 6; if (p.y > h + 6) p.y = -6;
        }

      }

      // Mass threshold: particles below this are dark-matter — invisible unless lit or hot
      const MASS_THRESH = 0.15; // r ≈ 0.53; captures all small-variant particles

      function drawParticles(now) {
        pctx.clearRect(0, 0, stage.clientWidth, stage.clientHeight);
        for (const p of particles) {
          if (p.r < 0.05) continue; // fully evaporated
          const local = lightAt(p.x, p.y, now);
          // Small + unlit + cool → invisible (dark matter until illuminated or heated)
          if (p.mass < MASS_THRESH && local < 0.06 && p.heat < 0.15) continue;
          const pulse  = 0.5 + Math.sin(now * 0.0007 + p.tw) * 0.5;
          const alpha  = (p.alpha * 0.59) + local * (0.32 + pulse * 0.18);
          const color  = heatColor(p.heat);
          const emission = Math.max(local, p.heat);
          const speed  = Math.hypot(p.vx, p.vy);

          // Comet tail — only when moving + lit; no shadowBlur on trail segments (perf)
          if (emission > 0.04 && speed > 0.002 && p.trail.length > 1) {
            pctx.shadowBlur = 0;
            const tailLen = p.trail.length;
            for (let t = 0; t < tailLen; t++) {
              const frac   = (t + 1) / tailLen;
              const evap   = Math.pow(1 - frac, 1.6);
              const tAlpha = alpha * evap * emission * 0.55;
              if (tAlpha < 0.005) break;
              pctx.globalAlpha = tAlpha;
              pctx.fillStyle   = color;
              pctx.fillRect(Math.round(p.trail[t].x), Math.round(p.trail[t].y), p.vs, p.vs);
            }
          }

          // Particle head — glow only on particles with significant illumination (perf)
          const heatSq = emission * emission;
          pctx.globalAlpha = Math.min(1, alpha + p.heat * 0.22);
          pctx.shadowBlur  = emission > 0.35 ? (2 + heatSq * 18) : 0;
          pctx.shadowColor = color;
          pctx.fillStyle   = color;
          pctx.fillRect(Math.round(p.x), Math.round(p.y), p.vs, p.vs);
        }
        pctx.globalAlpha = 1;
        pctx.shadowBlur  = 0;
      }

      // ─── Light system ───────────────────────────────────────────────────────
      // Touch: 3s log fade-in, 7s log fade-out. Mouse: 200ms log fade-in, 7s fade-out.
      // Intensity is purely time-driven — no hold phase outside the fade windows.
      // Light center rubber-bands behind the actual pointer (no overshoot).

      // Logarithmic curve: t ∈ [0,1] → [0,1], fast rise then plateau
      function logCurve(t) { return Math.log(1 + 9 * t) / Math.LN10; }

      function lightIntensity(l, now) {
        const fadeInDur = l.fadeInMs || 3000;
        if (!l.releaseTime) {
          // Active: log fade-in over fadeInDur, saturates and holds at 1
          return logCurve(clamp((now - l.born) / fadeInDur, 0, 1));
        }
        // Released: log fade-out from whatever level we were at on release
        const levelAtRelease = logCurve(clamp(l.ageAtRelease / fadeInDur, 0, 1));
        const t = clamp((now - l.releaseTime) / (l.fadeOutMs || 7000), 0, 1);
        return levelAtRelease * (1 - logCurve(t));
      }

      function lightAt(x, y, now) {
        let total = 0;
        for (const l of lights) {
          const d      = dist(x, y, l.x, l.y);
          const radius = l.kind === 'pointer' ? (72 + l.strength * 64) : (96 + l.strength * 64);
          total += Math.max(0, 1 - d / radius) * l.strength * lightIntensity(l, now);
        }
        // App particles emit light — illuminates nearby dead particles + other orbs
        for (const ap of appParticles) {
          const d = dist(x, y, ap.x, ap.y);
          const pulse = (Math.sin(now * ap.breathRate + ap.breathPhase) + 1) * 0.5;
          total += Math.max(0, 1 - d / 200) * (0.55 + pulse * 0.32);
        }
        // Hot particles glow — hotParticles is a pre-filtered subset rebuilt each frame
        for (const p of hotParticles) {
          const d = dist(x, y, p.x, p.y);
          const radius = 12 + p.heat * 30;
          if (d >= radius) continue;
          total += (1 - d / radius) * p.heat * 0.4;
        }
        // VE illumination grows with excitement (orbs inside amplify brightness + radius)
        if (ve.alpha > 0.01) {
          const d = dist(x, y, ve.x, ve.y);
          const veEx = ve.excitement;
          const veR = ve.scaleCurrent * (1 + veEx * 0.20) * 2.2;
          if (d < veR) total += (1 - d / veR) * ve.brightness * ve.alpha * (1 + veEx * 1.5);
        }
        return clamp(total, 0, 1);
      }

      function updateLights(dt) {
        const lag = 1 - Math.exp(-dt * 0.018);
        for (let i = lights.length - 1; i >= 0; i--) {
          const l = lights[i];
          if (l.targetX !== undefined) {
            l.x += (l.targetX - l.x) * lag;
            l.y += (l.targetY - l.y) * lag;
          }
          // Pulse decay: strength drains toward sustainStrength exponentially
          if (l.sustainStrength !== undefined && l.strength > l.sustainStrength + 0.005) {
            const excess = l.strength - l.sustainStrength;
            l.strength = l.sustainStrength + excess * Math.exp(-dt * 0.006);
          }
          // Sustained pressure slowly tails off while held — faster when volta is searching
          // (spreads particles so the creature has traversal paths)
          if (l.sustainStrength > 0.02 && !l.released) {
            const halfLife = volta.active ? 8000 : 45000;
            l.sustainStrength *= Math.pow(0.5, dt / halfLife);
          }
          if (!l.released) continue;
          l.ttl -= dt;
          if (l.ttl <= 0) lights.splice(i, 1);
        }
      }

      // strength: spike value (null = no spike, just update sustain)
      // sustainStrength: the level it decays toward after the spike
      function pointerLight(event, strength, sustainStrength) {
        const rect  = stage.getBoundingClientRect();
        const p     = event.touches ? event.touches[0] : event;
        const tx    = p.clientX - rect.left;
        const ty    = p.clientY - rect.top;
        const touch = event.pointerType === 'touch' || !!event.touches;
        const veActivate = touch || (event.pointerType === 'mouse' && (event.buttons & 1));
        // VE cannot be summoned while Volta holds it, or after it has been destroyed
        if (veActivate && !ve.voltaHeld && !ve.liberated) {
          if (!ve.active) { ve.x = tx; ve.y = ty; ve.prevTX = tx; ve.prevTY = ty; ve.vx = 0; ve.vy = 0; }
          ve.targetX = tx; ve.targetY = ty;
          ve.active = true;
        }
        const sus = sustainStrength !== undefined ? sustainStrength : (strength || 0.30);
        const existing = lights.find(l => l.kind === 'pointer');
        if (existing) {
          existing.targetX = tx; existing.targetY = ty;
          existing.sustainStrength = sus;
          if (strength !== null && strength > existing.strength) {
            existing.strength = strength;  // spike: allow strength to jump up
          }
          if (existing.released && strength !== null && strength > 0.5) {
            // Re-tap while fading: resume fade-in from current intensity
            const now  = performance.now();
            const prev = lightIntensity(existing, now);
            const t0   = (Math.pow(10, prev) - 1) / 9;
            existing.born         = now - t0 * (existing.fadeInMs || 3000);
            existing.releaseTime  = undefined;
            existing.ageAtRelease = undefined;
            existing.released     = false;
            existing.ttl          = 99999;
          }
        } else {
          const initStr = strength !== null ? strength : sus;
          lights.push({ x: tx, y: ty, targetX: tx, targetY: ty,
            strength: initStr, sustainStrength: sus,
            ttl: 99999, maxTtl: 99999, kind: 'pointer',
            born: performance.now(), released: false,
            fadeInMs: touch ? 3000 : 200, fadeOutMs: 7000 });
        }
      }

      const releasePointerLight = () => {
        holdActive = false;
        ve.active = false;
        // Inherit cursor velocity at moment of release — this is the "throw"
        ve.vx = ve.cvx * 0.45;
        ve.vy = ve.cvy * 0.45;
        const l = lights.find(li => li.kind === 'pointer' && !li.released);
        if (l) {
          const now      = performance.now();
          l.releaseTime  = now;
          l.ageAtRelease = now - l.born;
          l.released     = true;
          l.ttl          = l.fadeOutMs || 7000;
          l.maxTtl       = l.ttl;
        }
      };

      // ─── Title letters ──────────────────────────────────────────────────────
      // Springy but viscous: pushed away from tap, spring back to rest.
      // smoothGlow per-letter eliminates quantized scale steps.

      function updateTitle(dt) {
        const w        = stage.clientWidth, h = stage.clientHeight;
        const wordLeft = (w - word.offsetWidth) * 0.5;
        let titleGlow  = 0;

        for (const l of titleLetters) {
          let fx = 0, fy = 0, localLight = 0;
          for (const light of lights) {
            const lx = wordLeft + l.baseX;
            const ly = h * 0.5;
            const dx = lx - light.x;
            const dy = ly - light.y;
            const d  = Math.hypot(dx, dy) || 1;
            const inf = Math.max(0, 1 - d / 240) * light.strength;
            localLight = Math.max(localLight, inf);
            fx += (dx / d) * inf * 0.045;
            fy += (dy / d) * inf * 0.028;
          }
          titleGlow = Math.max(titleGlow, localLight);

          l.vx += fx + (l.baseX - l.x) * 0.065;
          l.vy += fy + (0       - l.y) * 0.068;
          l.vx *= 0.90;
          l.vy *= 0.90;
          l.x += l.vx * dt * 0.038;
          l.y += l.vy * dt * 0.038;

          // Low-pass filter on glow — eliminates quantized scale jumps
          if (l.smoothGlow === undefined) l.smoothGlow = 0;
          l.smoothGlow += (localLight - l.smoothGlow) * 0.12;
          const glow = clamp(l.smoothGlow, 0, 1);
          l.el.style.color      = `rgba(232,224,209,${(0.24 + glow * 0.76).toFixed(3)})`;
          l.el.style.textShadow = `0 1px 0 rgba(255,255,255,0.01), 0 0 ${(glow * 22).toFixed(1)}px rgba(232,224,209,${(glow * 0.16).toFixed(3)})`;
          l.el.style.transform  = `translate(-50%,-50%) translate(${l.x - l.baseX}px,${l.y}px) scale(${1 + glow * 0.035},${1 - glow * 0.012})`;
        }

        word.style.filter     = `blur(${(titleGlow * 0.18).toFixed(2)}px)`;
        word.style.opacity    = (0.72 + titleGlow * 0.28).toFixed(3);
        word.style.textShadow = `0 0 ${(titleGlow * 20).toFixed(1)}px rgba(232,224,209,${(titleGlow * 0.09).toFixed(3)})`;
        word.style.setProperty('--after-opacity', (0.04 + titleGlow * 0.10).toFixed(3));
      }

      // ─── App particle update & draw ─────────────────────────────────────────

      function updateAppParticles(dt) {
        const w = stage.clientWidth, h = stage.clientHeight;
        const now = performance.now();
        for (const ap of appParticles) {
          if (ap.audio && ap.playing) {
            // Sound-producing orb holds position; rendering supplies the violent jitter.
            ap.vx = 0;
            ap.vy = 0;
            continue;
          }
          // Slow wander — more active after VE is destroyed (no pull to mask the drift)
          const wanderStr = ve.liberated ? 0.0042 : 0.001;
          ap.wAngle += (Math.random() - 0.5) * (ve.liberated ? 0.0013 : 0.0008) * dt * ap.speed;
          ap.vx += Math.cos(ap.wAngle) * wanderStr * ap.speed;
          ap.vy += Math.sin(ap.wAngle) * wanderStr * ap.speed;
          // Attracted to VE center while it lives; nothing once VE is destroyed
          const mass = ap.r0 * ap.r0 * ap.r0;
          const accelBoost = holdActive ? 1.6 : 1.0;
          if (!ap.audio && ve.scaleCurrent > 5 && !ve.liberated) {
            const dx = ap.x - ve.x, dy = ap.y - ve.y;
            const d  = Math.hypot(dx, dy) || 1;
            const pull = 60 * accelBoost / (d * 0.04 + 1);
            ap.vx -= (dx / d) * pull / mass;
            ap.vy -= (dy / d) * pull / mass;
            // Inside VE: orb momentum converts to VE axial torque; orb slows proportionally
            const innerR = ve.scale * 0.80;
            if (d < innerR) {
              // Gentle indirect influence — orb motion nudges VE rotation tendency,
              // no direct momentum drain on the orb
              const infl = 0.0000018 * dt;
              ve.ωz += ((dx / innerR) * ap.vy - (dy / innerR) * ap.vx) * infl;
              ve.ωx += ap.vy * infl * 0.4;
              ve.ωy -= ap.vx * infl * 0.4;
            }
          }
          // Orbs sense Volta arcs and steer their wander path away — not a push, a redirect
          if (volta.active && !ap.audio) {
            let avoidX = 0, avoidY = 0;
            for (const arc of volta.arcs) {
              if (arc.veNode) continue; // VE-internal arcs don't register as threats
              const mx = (arc.a.x + arc.b.x) * 0.5, my = (arc.a.y + arc.b.y) * 0.5;
              const dx = ap.x - mx, dy = ap.y - my;
              const d  = Math.hypot(dx, dy) || 1;
              if (d < 320) {
                const str = (1 - d / 320) * (1 - d / 320);
                avoidX += (dx / d) * str;
                avoidY += (dy / d) * str;
              }
            }
            const avoidMag = Math.hypot(avoidX, avoidY);
            if (avoidMag > 0.001) {
              const avoidAngle = Math.atan2(avoidY / avoidMag, avoidX / avoidMag);
              let delta = avoidAngle - ap.wAngle;
              while (delta >  Math.PI) delta -= Math.PI * 2;
              while (delta < -Math.PI) delta += Math.PI * 2;
              ap.wAngle += delta * clamp(avoidMag * 0.018 * dt, 0, 0.55);
              // Direct velocity flee — wangle redirect alone is too subtle
              ap.vx += (avoidX / (avoidMag || 1)) * avoidMag * 0.10;
              ap.vy += (avoidY / (avoidMag || 1)) * avoidMag * 0.10;
            }
            // Flee from Volta creature center directly
            const fdx = ap.x - volta.cx, fdy = ap.y - volta.cy;
            const fd  = Math.hypot(fdx, fdy) || 1;
            if (fd < 300) {
              const flee = (1 - fd / 300) * (1 - fd / 300) * 0.14;
              ap.vx += (fdx / fd) * flee;
              ap.vy += (fdy / fd) * flee;
            }
          }
          ap.vx *= 0.988; ap.vy *= 0.988;
          // Edge repulsion only: zero force in the inner 95%, grows in outer 5%
          const ew = w * 0.05, eh = h * 0.05;
          if (ap.x < ew)     ap.vx += Math.pow((ew - ap.x) / ew, 1.6) * 0.022;
          if (ap.x > w - ew) ap.vx -= Math.pow((ap.x - (w - ew)) / ew, 1.6) * 0.022;
          if (ap.y < eh)     ap.vy += Math.pow((eh - ap.y) / eh, 1.6) * 0.022;
          if (ap.y > h - eh) ap.vy -= Math.pow((ap.y - (h - eh)) / eh, 1.6) * 0.022;
          ap.x += ap.vx * dt * 0.026;
          ap.y += ap.vy * dt * 0.026;
        }
      }

      function drawAppParticles(now) {
        for (const ap of appParticles) {
          const local  = lightAt(ap.x, ap.y, now);
          const unstable = ap.audio && ap.playing;
          const vibration = unstable
            ? Math.sin(now * 0.105) * 0.52 + Math.sin(now * 0.173 + 1.7) * 0.31 + Math.sin(now * 0.247) * 0.17
            : 0;
          const pulse  = unstable ? vibration : Math.sin(now * ap.breathRate + ap.breathPhase);
          const t      = (pulse + 1) * 0.5;     // 0=contracted/dim, 1=expanded/bright
          const rDraw  = ap.r0 * (1 + (unstable ? 0.34 : 0.22) * pulse);
          const jitter = unstable ? ap.r0 * 0.24 : 0;
          const drawX  = ap.x + Math.sin(now * 0.39) * jitter;
          const drawY  = ap.y + Math.cos(now * 0.47 + 0.8) * jitter;
          // Dark base — always present
          pctx.globalAlpha = clamp(0.70 + t * 0.17 + local * 0.03 + (unstable ? vibration * 0.16 : 0), 0.2, 1);
          pctx.shadowBlur  = Math.max(0, 1 + t * 5 + local * 8 + (unstable ? vibration * 12 + 12 : 0));
          pctx.shadowColor = ap.brightColor;
          pctx.fillStyle   = ap.color;
          pctx.beginPath();
          pctx.arc(drawX, drawY, rDraw, 0, Math.PI * 2);
          pctx.fill();
          // Bright color overlay: expands with pulse
          pctx.globalAlpha = t * 0.34 + local * 0.23;  // reduced max overlay brightness
          pctx.shadowBlur  = 0;
          pctx.fillStyle   = ap.brightColor;
          pctx.beginPath();
          pctx.arc(drawX, drawY, rDraw, 0, Math.PI * 2);
          pctx.fill();
          // 3D highlight — brightens at peak expansion
          pctx.globalAlpha = 0.05 + t * 0.09 + local * 0.09;
          pctx.fillStyle   = '#fff';
          pctx.beginPath();
          pctx.arc(drawX - rDraw * (0.28 + (unstable ? vibration * 0.12 : 0)),
                   drawY - rDraw * (0.30 - (unstable ? vibration * 0.10 : 0)),
                   rDraw * (0.38 + (unstable ? vibration * 0.12 : 0)), 0, Math.PI * 2);
          pctx.fill();
        }
        pctx.globalAlpha = 1;
        pctx.shadowBlur  = 0;
      }

      // ─── Vector Equilibrium update + draw ───────────────────────────────────

      function destroyVEEdge(ei) {
        ve.destroyedEdges.add(ei);
        // Angular torque on all three rotation axes — edge energy → rotational inertia
        ve.ωx += (Math.random() * 2 - 1) * 0.0038;
        ve.ωy += (Math.random() * 2 - 1) * 0.0038;
        ve.ωz += (Math.random() * 2 - 1) * 0.0019;
        // Translational impulse — each edge death nudges the VE center so it drifts
        ve.vx = clamp(ve.vx + (Math.random() * 2 - 1) * 0.018, -2.2, 2.2);
        ve.vy = clamp(ve.vy + (Math.random() * 2 - 1) * 0.018, -2.2, 2.2);
        // Outward pressure wave from edge midpoint into substrate
        const [vi, vj] = VE_E[ei];
        const ni = ve.vertNodes ? ve.vertNodes[vi] : null;
        const nj = ve.vertNodes ? ve.vertNodes[vj] : null;
        const midX = ni && nj ? (ni.x + nj.x) * 0.5 : ve.x;
        const midY = ni && nj ? (ni.y + nj.y) * 0.5 : ve.y;
        for (const p of particles) {
          if (p.r < 0.05) continue;
          const pdx = p.x - midX, pdy = p.y - midY;
          const pd = Math.hypot(pdx, pdy) || 1;
          if (pd < 130) {
            const f = (1 - pd / 130) * 0.14 / Math.max(p.mass, 0.05);
            p.vx += (pdx / pd) * f; p.vy += (pdy / pd) * f;
          }
        }
      }

      function updateVE(dt) {
        // Raw cursor velocity this frame (px/ms)
        const rawVx = (ve.targetX - ve.prevTX) / Math.max(dt, 1);
        const rawVy = (ve.targetY - ve.prevTY) / Math.max(dt, 1);
        // Cursor acceleration = frame-to-frame velocity delta (tracks flicks + direction changes)
        const ax = rawVx - ve.cvx;
        const ay = rawVy - ve.cvy;
        ve.cvx = rawVx;  // store raw (not smoothed) so acceleration is accurate
        ve.cvy = rawVy;
        ve.prevTX = ve.targetX;
        ve.prevTY = ve.targetY;

        // Rolling-ball torque: direction of motion determines spin axis (cross product with Z).
        // Moving right → Y rotation; moving down → X rotation; diagonal → both.
        ve.ωy += rawVx * 0.000060; // rolling baseline from velocity
        ve.ωx += rawVy * 0.000060;
        ve.ωz += rawVx * rawVy * 0.000015;
        // Acceleration is the dominant torque driver — direction changes = strong spin burst
        ve.ωy += ax * 0.0028;
        ve.ωx += ay * 0.0028;
        ve.ωz += (ax * ay) * 0.00055;

        // Viscous fluid drag — proportional damping, decays to zero when cursor stops
        const ωMax = 0.008;
        ve.ωx = clamp(ve.ωx * 0.985, -ωMax, ωMax);
        ve.ωy = clamp(ve.ωy * 0.985, -ωMax, ωMax);
        ve.ωz = clamp(ve.ωz * 0.985, -ωMax, ωMax);

        // Integrate angles
        ve.θx += ve.ωx * dt;
        ve.θy += ve.ωy * dt;
        ve.θz += ve.ωz * dt;

        // Position: rubber-band when active; held by volta when infected; coast when released
        if (ve.active) {
          const lag = 1 - Math.exp(-dt * 0.011);
          ve.x += (ve.targetX - ve.x) * lag;
          ve.y += (ve.targetY - ve.y) * lag;
        } else {
          // Coast freely whether or not voltaHeld — momentum continues through infection
          const vMax = 3.0;
          ve.vx = clamp(ve.vx * 0.96, -vMax, vMax);
          ve.vy = clamp(ve.vy * 0.96, -vMax, vMax);
          ve.x += ve.vx * dt;
          ve.y += ve.vy * dt;
        }

        // Count orbs inside a fixed-radius presence zone (independent of current scale,
        // so a shrinking VE doesn't expel its own sustaining orbs)
        const presenceR = ve.scale * 0.80; // ≈ inradius at full scale (~42px)
        let orbsInPresence = 0;
        for (const ap of appParticles) {
          if (!ap.audio && Math.hypot(ap.x - ve.x, ap.y - ve.y) < presenceR) orbsInPresence++;
        }
        ve.orbsInside = orbsInPresence; // exposed to drawVE for oscillation scaling

        // Alpha/scale: full when active; orb-sustained when idle; fades when empty
        const inRate = clamp(dt * 0.005, 0, 1);
        if (ve.active || ve.voltaHeld) {
          ve.alphaP += (1 - ve.alphaP) * inRate;
          ve.scaleP += (1 - ve.scaleP) * inRate;
        } else if (orbsInPresence > 0) {
          // Each orb adds 5% to the 50% idle floor (max ~90%)
          const sustainScale = Math.min(0.90, 0.50 + orbsInPresence * 0.05);
          ve.scaleP += (sustainScale - ve.scaleP) * clamp(dt * 0.003, 0, 1);
          ve.alphaP += (0.88 - ve.alphaP) * clamp(dt * 0.003, 0, 1);
        } else {
          ve.alphaP += -ve.alphaP * clamp(dt * 0.002, 0, 1);
          ve.scaleP += -ve.scaleP * clamp(dt * 0.0008, 0, 1);
        }
        // Rubber-band tension: distance to target → strain [0,1]
        const tensionDx = ve.targetX - ve.x, tensionDy = ve.targetY - ve.y;
        const tensionDist = Math.hypot(tensionDx, tensionDy);
        ve.strain = ve.active ? Math.min(1, tensionDist / 180) : 0;
        // Tension torque: being pulled in a direction imparts spin (proportional to strain)
        if (ve.active && tensionDist > 1) {
          const tNorm = tensionDist;
          const tTorque = ve.strain * 0.0005;
          ve.ωy += (tensionDx / tNorm) * tTorque;
          ve.ωx += (tensionDy / tNorm) * tTorque;
        }
        // Strain dims and shrinks VE — floor at 65% scale, 60% alpha
        const strainDim  = 1 - ve.strain * 0.35;
        ve.alpha        = ve.alphaP * 0.88 * (0.60 + strainDim * 0.40); // no global Volta drain — edges dim individually
        ve.scaleCurrent = ve.scale * ve.scaleP * strainDim;

        // Count orbs inside VE footprint → drive excitement
        const captureR = ve.scaleCurrent * 1.2;
        let orbsIn = 0;
        for (const ap of appParticles) {
          if (Math.hypot(ap.x - ve.x, ap.y - ve.y) < captureR) orbsIn++;
        }
        const targetEx = appParticles.length > 0 ? orbsIn / appParticles.length : 0;
        ve.excitement += (targetEx - ve.excitement) * clamp(dt * 0.003, 0, 1);

        // Cache ideal projected vertex positions
        if (ve.scaleCurrent > 0.5) {
          const _cx = Math.cos(ve.θx), _sx = Math.sin(ve.θx);
          const _cy = Math.cos(ve.θy), _sy = Math.sin(ve.θy);
          const _cz = Math.cos(ve.θz), _sz = Math.sin(ve.θz);
          const _S = ve.scaleCurrent, _f = 280;
          ve.projCache = VE_V.map(([vx, vy, vz]) => {
            const y1 = vy*_cx - vz*_sx, z1 = vy*_sx + vz*_cx;
            const x2 = vx*_cy + z1*_sy, z2 = -vx*_sy + z1*_cy;
            const x3 = x2*_cz - y1*_sz, y3 = x2*_sz + y1*_cz;
            const p = _f / (_f + z2 * _S);
            return { px: ve.x + x3*_S*p, py: ve.y + y3*_S*p };
          });

          // Vertex physics: per-edge springs + node repulsion (no "spring toward ideal" — that caused rotational instability)
          if (!ve.vertNodes) {
            ve.vertNodes = ve.projCache.map(p => ({ x: p.px, y: p.py, vx: 0, vy: 0, fx: 0, fy: 0, freedom: 0, drawScale: 1.0, _arced: false }));
          }
          if (!ve.centerNode) {
            ve.centerNode = { x: ve.x, y: ve.y, vx: 0, vy: 0, fx: 0, fy: 0, freedom: 0, drawScale: 1.0, _arced: false };
          }
          // Freedom + force reset
          for (let i = 0; i < 12; i++) {
            const node = ve.vertNodes[i];
            const deg = VE_VERTEX_EDGES[i].length || 1;
            node.freedom = VE_VERTEX_EDGES[i].reduce((n, ei) => n + (ve.destroyedEdges.has(ei) ? 1 : 0), 0) / deg;
            node.fx = 0; node.fy = 0;
          }
          // Once infection starts (edgeEnergies exists), ALL nodes enter full physics —
          // no more projCache snapping. Pre-infection, freedom=0 nodes still snap.
          const infecting = ve.edgeEnergies !== null;
          const center = ve.centerNode;
          center.fx = 0; center.fy = 0;
          // Per-edge spring attraction
          for (let ei = 0; ei < VE_E.length; ei++) {
            if (ve.destroyedEdges.has(ei)) continue;
            const [vi, vj] = VE_E[ei];
            const ni = ve.vertNodes[vi], nj = ve.vertNodes[vj];
            if (!infecting && ni.freedom === 0 && nj.freedom === 0) continue;
            const dx = nj.x - ni.x, dy = nj.y - ni.y;
            const d = Math.hypot(dx, dy) || 1;
            // Spring is full-strength until the edge snaps — no gradual weakening
            const f = VE_SPRING_K * (d - VE_E_REST[ei]);
            if (infecting || ni.freedom > 0) { ni.fx += (dx/d)*f; ni.fy += (dy/d)*f; }
            if (infecting || nj.freedom > 0) { nj.fx -= (dx/d)*f; nj.fy -= (dy/d)*f; }
          }
          // Node-pair repulsion — all nodes during infection; only free nodes pre-infection
          for (let i = 0; i < 12; i++) {
            if (!infecting && ve.vertNodes[i].freedom === 0) continue;
            for (let j = i+1; j < 12; j++) {
              const ni = ve.vertNodes[i], nj = ve.vertNodes[j];
              const dx = ni.x - nj.x, dy = ni.y - nj.y;
              const d2 = dx*dx + dy*dy;
              const d = Math.sqrt(d2) || 1;
              const f = VE_REP_STR / (d2 + 80);
              ni.fx += (dx/d)*f; ni.fy += (dy/d)*f;
              if (infecting || nj.freedom > 0) { nj.fx -= (dx/d)*f; nj.fy -= (dy/d)*f; }
            }
          }
          // Volta spasm: velocity impulses during infection — always present, carry momentum after Volta leaves
          if (infecting && volta.state === 'infecting') {
            const _si = 1 - ve.destroyedEdges.size / VE_E.length;
            const jitterVel = (0.0008 + (1 - _si) * volta.charge * 0.002) * dt;
            for (let i = 0; i < 12; i++) {
              ve.vertNodes[i].vx += (Math.random() * 2 - 1) * jitterVel;
              ve.vertNodes[i].vy += (Math.random() * 2 - 1) * jitterVel;
            }
            center.vx += (Math.random() * 2 - 1) * jitterVel;
            center.vy += (Math.random() * 2 - 1) * jitterVel;
          }
          // Integrate — pre-infection freedom=0 nodes snap; during infection all use physics
          for (let i = 0; i < 12; i++) {
            const node = ve.vertNodes[i];
            if (!infecting && node.freedom === 0) {
              node.x = ve.projCache[i].px; node.y = ve.projCache[i].py;
              node.vx = 0; node.vy = 0;
            } else {
              node.vx = (node.vx + node.fx) * VE_DAMP;
              node.vy = (node.vy + node.fy) * VE_DAMP;
              node.x += node.vx * dt;
              node.y += node.vy * dt;
            }
          }
          if (!infecting) {
            center.x = ve.x; center.y = ve.y;
            center.vx = 0; center.vy = 0;
          } else {
            // The center is a thirteenth physical node during attack, with the
            // same damping and accumulated Volta impulses as every vertex.
            center.vx = (center.vx + center.fx) * VE_DAMP;
            center.vy = (center.vy + center.fy) * VE_DAMP;
            center.x += center.vx * dt;
            center.y += center.vy * dt;
          }
        }

        // Continuous edge energy drain during Volta infection
        if (volta.state === 'infecting' && !ve.liberated) {
          if (!ve.edgeEnergies) {
            ve.edgeEnergies = new Float32Array(VE_E.length).fill(1.0);
            // Each edge has a randomized drain rate: 0.5→1.5 (mean 1.0) — origami unfolds unevenly
            ve.edgeDrainRates = Float32Array.from({length: VE_E.length}, () => 0.5 + Math.random());
          }
          for (let i = 0; i < VE_E.length; i++) {
            if (ve.destroyedEdges.has(i)) continue;
            const drain = volta.charge * 0.00022 * ve.edgeDrainRates[i] * dt;
            ve.edgeEnergies[i] = Math.max(0, ve.edgeEnergies[i] - drain);
            if (ve.edgeEnergies[i] <= 0) destroyVEEdge(i);
          }
          if (ve.destroyedEdges.size >= VE_E.length) ve.liberated = true;
        }

        // On first liberation, harvest all 13 nodes (12 vertices + center) into liberatedNodes
        if (ve.liberated && ve.vertNodes && liberatedNodes.length === 0) {
          for (let i = 0; i < 12; i++) {
            const n = ve.vertNodes[i];
            liberatedNodes.push({ x: n.x, y: n.y, vx: n.vx, vy: n.vy, mass: 8, alpha: 1.0, r: 2.3 * (n.drawScale || 1.0) });
          }
          const c = ve.centerNode;
          liberatedNodes.push({ x: c.x, y: c.y, vx: c.vx, vy: c.vy, mass: 8, alpha: 1.0, r: 2.3 * (c.drawScale || 1.0) });
        }
        // VE never resets — once destroyed it stays destroyed
      }

      function drawVE() {
        if (ve.scaleP < 0.01) return;
        // Electric jitter: speeds up and brightens as orbs enter the VE
        const ex = ve.excitement;
        // As orbs fill VE: center of each property rises, jitter amplitude collapses
        const stability = 1 - ex * 0.90;  // 1.0 → 0.10 as excitement grows
        const now2 = performance.now() * (2.0 + ex * 3.0);
        const elec = (
          Math.sin(now2 * 0.0284) * 0.38 +
          Math.sin(now2 * 0.0548) * 0.28 +
          Math.sin(now2 * 0.1172) * 0.18 +
          Math.sin(now2 * 0.2044) * 0.10 +
          Math.sin(now2 * 0.3588) * 0.06
        );
        const elecPos = (elec + 1) * 0.5;
        const orbBoost = 1 + (ve.orbsInside || 0) * 0.05; // +5% oscillation range per orb
        const elecAmp = elecPos * elecPos * orbBoost;
        const focal = 280, S = ve.scaleCurrent * (1 + ex * 0.20) * (1 + elecAmp * 0.015 * stability);
        // Precompute trig
        const cx = Math.cos(ve.θx), sx = Math.sin(ve.θx);
        const cy = Math.cos(ve.θy), sy = Math.sin(ve.θy);
        const cz = Math.cos(ve.θz), sz = Math.sin(ve.θz);
        // Rotate + project all 12 vertices
        const proj = VE_V.map(([vx, vy, vz]) => {
          const y1 = vy*cx - vz*sx, z1 = vy*sx + vz*cx;
          const x2 = vx*cy + z1*sy, z2 = -vx*sy + z1*cy;
          const x3 = x2*cz - y1*sz, y3 = x2*sz + y1*cz;
          const persp = focal / (focal + z2 * S);
          return { px: ve.x + x3*S*persp, py: ve.y + y3*S*persp, z: z2 };
        });
        // Override screen positions with physics-simulated vertex positions (spring-damper drift)
        if (ve.vertNodes) {
          for (let i = 0; i < 12; i++) {
            proj[i].px = ve.vertNodes[i].x;
            proj[i].py = ve.vertNodes[i].y;
          }
        }

        pctx.save();

        // Faces — sorted back→front; disappear when any constituent edge dies
        const allFaces = [
          ...VE_T.map((f, fi) => ({ pts: f.map(i => proj[i]), z: f.reduce((s,i)=>s+proj[i].z,0)/f.length, eIdx: VE_T_EDGES[fi] })),
          ...VE_Q.map((f, fi) => ({ pts: f.map(i => proj[i]), z: f.reduce((s,i)=>s+proj[i].z,0)/f.length, eIdx: VE_Q_EDGES[fi] }))
        ].sort((a, b) => a.z - b.z);
        for (const { pts, eIdx } of allFaces) {
          const faceE = ve.edgeEnergies ? eIdx.reduce((mn, ei) => Math.min(mn, ve.edgeEnergies[ei]), 1) : 1;
          if (faceE < 0.06) continue; // face dissolves with its weakest edge
          pctx.beginPath();
          pctx.moveTo(pts[0].px, pts[0].py);
          for (let k = 1; k < pts.length; k++) pctx.lineTo(pts[k].px, pts[k].py);
          pctx.closePath();
          pctx.globalAlpha = Math.min(0.9, ve.alpha * faceE * ((0.04 + ex * 0.10) + elecAmp * 0.06 * stability));
          pctx.fillStyle = '#88ccff';
          pctx.fill();
        }

        // Structural integrity (for node glow boost — edges dim individually, nodes don't)
        const structIntegrity = VE_E.length > 0 ? 1 - ve.destroyedEdges.size / VE_E.length : 1;

        // Edges — each dims individually based on its own energy
        pctx.shadowBlur  = 8 + ex * 14 + elecAmp * 8 * stability;
        pctx.shadowColor = '#40ccff';
        pctx.strokeStyle = '#b8eeff';
        for (let ei = 0; ei < VE_E.length; ei++) {
          if (ve.destroyedEdges.has(ei)) continue;
          const edgeE = ve.edgeEnergies ? ve.edgeEnergies[ei] : 1;
          if (edgeE < 0.005) continue;
          const [i, j] = VE_E[ei];
          const a = proj[i], b = proj[j];
          const zf = 0.35 + 0.65 * (1 - (a.z + b.z) * 0.5) * 0.5;
          pctx.globalAlpha = Math.min(1, ve.alpha * zf * ((0.65 + ex * 0.23) + elecAmp * 0.20 * stability) * edgeE);
          pctx.lineWidth   = (0.5 + zf * 0.6 + elecAmp * 0.8) * edgeE;
          pctx.beginPath();
          pctx.moveTo(a.px, a.py);
          pctx.lineTo(b.px, b.py);
          pctx.stroke();
        }

        // Radial spokes — dim per vertex based on average energy of its edges
        const centerX = ve.centerNode ? ve.centerNode.x : ve.x;
        const centerY = ve.centerNode ? ve.centerNode.y : ve.y;
        pctx.shadowBlur  = 4 + ex * 8 + elecAmp * 4 * stability;
        pctx.shadowColor = '#40ccff';
        pctx.strokeStyle = '#b8eeff';
        for (let i = 0; i < 12; i++) {
          const { px, py, z } = proj[i];
          const zf = 0.35 + 0.65 * (1 - z) * 0.5;
          const spokeE = ve.edgeEnergies
            ? VE_VERTEX_EDGES[i].reduce((s, ei) => s + ve.edgeEnergies[ei], 0) / (VE_VERTEX_EDGES[i].length || 1)
            : 1;
          pctx.globalAlpha = Math.min(1, ve.alpha * zf * ((0.28 + ex * 0.17) + elecAmp * 0.12 * stability) * spokeE);
          pctx.lineWidth   = 0.3 + zf * 0.28 + elecAmp * 0.35;
          pctx.beginPath();
          pctx.moveTo(px, py);
          pctx.lineTo(centerX, centerY);
          pctx.stroke();
        }
        pctx.shadowBlur = 0;

        // Center node — once liberated it's a liberatedNode; only draw while VE lives
        if (!ve.liberated) {
          const centerBoost = volta.state === 'infecting' ? (1 + (1 - structIntegrity) * 0.55) : 1;
          pctx.globalAlpha = Math.min(1, ve.alpha * 0.92 * centerBoost);
          pctx.shadowBlur  = (14 + ex * 14) * centerBoost;
          pctx.shadowColor = '#80e8ff';
          pctx.fillStyle   = '#e8f8ff';
          pctx.beginPath();
          const centerScale = (ve.centerNode && ve.centerNode.drawScale) || 1.0;
          pctx.arc(centerX, centerY, 2.5 * centerBoost * centerScale, 0, Math.PI * 2);
          pctx.fill();
        }
        pctx.shadowBlur = 0;

        // Vertices — drawn here while VE lives; once liberated, liberatedNodes handles them
        if (!ve.liberated) {
          const infBoost = volta.state === 'infecting' ? (1 + (1 - structIntegrity) * 0.6) : 1;
          pctx.shadowBlur  = (11 + ex * 10) * infBoost;
          pctx.shadowColor = '#70e0ff';
          pctx.fillStyle   = '#e0f8ff';
          for (let i = 0; i < 12; i++) {
            const { px, py, z } = proj[i];
            const zf = 0.4 + 0.6 * (1 - z) * 0.5;
            const nodeBoost = volta.state === 'infecting' && ve.vertNodes
              ? (1 + ve.vertNodes[i].freedom * 0.5) : 1;
            pctx.globalAlpha = Math.min(1, ve.alpha * zf * nodeBoost);
            pctx.beginPath();
            const nScale = (ve.vertNodes && ve.vertNodes[i].drawScale) || 1.0;
            pctx.arc(px, py, 2.3 * nScale, 0, Math.PI * 2);
            pctx.fill();
          }
        }


        pctx.shadowBlur  = 0;
        pctx.globalAlpha = 1;
        pctx.restore();
      }

      // ─── Volta — arc lightning creature ─────────────────────────────────────

      const VOLTA_ARC_DIST = 116; // 150% link range; keeps the constellation coherent
      const VOLTA_SEARCH_R = 104; // radius around creature center for harvesting nodes
      const VOLTA_SPEED    = 28;  // px/s toward target
      const VOLTA_MAX_ARCS = 22;  // constellation budget

      function scheduleVoltaSpawn() {
        const delay = Math.max(20000, gaussianRandom(120000, 60000));
        volta.nextSpawn = performance.now() + delay;
      }

      function spawnVolta() {
        if (volta.active) return;
        const w = stage.clientWidth, h = stage.clientHeight;
        switch (Math.floor(Math.random() * 4)) {
          case 0: volta.cx = rand(0, w); volta.cy = -40;    break; // top
          case 1: volta.cx = w + 40;     volta.cy = rand(0, h); break; // right
          case 2: volta.cx = rand(0, w); volta.cy = h + 40; break; // bottom
          default: volta.cx = -40;       volta.cy = rand(0, h); break; // left
        }
        volta.energy           = 1.0;
        volta.arcs             = [];
        volta.infectedTimer    = 0;
        volta.infectedDuration = rand(7000, 11000);
        volta.charge           = 0;
        volta.state            = 'entering';
        volta.active           = true;
      }

      function voltaJags(x1, y1, x2, y2) {
        const n = 4, dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len, ny = dx / len, jags = [];
        for (let i = 1; i < n; i++) {
          const t = i / n, mag = (Math.random() * 2 - 1) * len * 0.20;
          jags.push({ x: x1 + dx * t + nx * mag, y: y1 + dy * t + ny * mag });
        }
        return jags;
      }

      function updateLiberatedNodes(dt, now) {
        if (liberatedNodes.length === 0) return;
        for (const n of liberatedNodes) {
          // Dim slowly to ambient level — nodes lose energy but don't disappear
          n.alpha = Math.max(0.12, n.alpha - 0.00012 * dt);
          // Substrate friction only — momentum conserved otherwise
          n.vx *= 0.993;
          n.vy *= 0.993;
          // Substrate pressure from taps/clicks — pushed outward, never attracted
          for (const l of lights) {
            const dx = n.x - l.x, dy = n.y - l.y;
            const d  = Math.hypot(dx, dy) || 1;
            if (d < 200) {
              const inten = lightIntensity(l, now);
              const str = inten * (1 - d / 200) * 0.045 / n.mass;
              n.vx += (dx / d) * str;
              n.vy += (dy / d) * str;
            }
          }
          // Orb repulsion
          for (const ap of appParticles) {
            const dx = n.x - ap.x, dy = n.y - ap.y;
            const d  = Math.hypot(dx, dy) || 1;
            if (d < 90) {
              const f = (1 - d / 90) * 0.014 / n.mass;
              n.vx += (dx / d) * f;
              n.vy += (dy / d) * f;
            }
          }
          // No boundary — nodes drift off canvas freely
          n.x += n.vx * dt;
          n.y += n.vy * dt;
        }
      }

      function drawLiberatedNodes() {
        if (liberatedNodes.length === 0) return;
        pctx.save();
        pctx.shadowColor = '#70e0ff';
        pctx.fillStyle   = '#d8f4ff';
        for (const n of liberatedNodes) {
          if (n.alpha < 0.01) continue;
          pctx.shadowBlur  = 9 * n.alpha;
          pctx.globalAlpha = n.alpha * 0.88;
          pctx.beginPath();
          pctx.arc(n.x, n.y, n.r || 2.3, 0, Math.PI * 2);
          pctx.fill();
        }
        pctx.restore();
      }

      function updateVolta(dt, now) {
        if (!volta.active) {
          if (now >= volta.nextSpawn) { spawnVolta(); scheduleVoltaSpawn(); }
          return;
        }
        const w = stage.clientWidth, h = stage.clientHeight;
        // Arc energy pool regens continuously — arcs consume it, giving ebb-and-flow brightness
        volta.pool = Math.min(1.0, volta.pool + dt * 0.00045);

        if (volta.state === 'infecting') {
          volta.cx = ve.x; volta.cy = ve.y;
          volta.infectedTimer += dt;
          volta.charge = Math.min(1, volta.infectedTimer / 3500);
          // Repel all orbs outward from VE center
          for (const ap of appParticles) {
            const dx = ap.x - ve.x, dy = ap.y - ve.y;
            const d  = Math.hypot(dx, dy) || 1;
            ap.vx += (dx / d) * volta.charge * 0.20 / Math.max(d * 0.012, 0.5);
            ap.vy += (dy / d) * volta.charge * 0.20 / Math.max(d * 0.012, 0.5);
          }
          // Force liberation if duration elapsed before all edges naturally died
          if (volta.infectedTimer >= volta.infectedDuration && !ve.liberated) {
            for (let i = 0; i < VE_E.length; i++) {
              if (!ve.destroyedEdges.has(i)) destroyVEEdge(i);
            }
            ve.liberated = true;
          }
          // Deplete energy after infection duration — signals the end of the encounter
          if (volta.infectedTimer >= volta.infectedDuration) {
            volta.energy -= dt * 0.003;
            if (volta.energy <= 0) {
              volta.active = false; volta.state = 'dormant'; volta.charge = 0;
              ve.voltaHeld = false; scheduleVoltaSpawn(); return;
            }
          }
        } else {
          // Volta center = centroid of arc body (emergent) + gentle pull toward VE
          if (volta.arcs.length > 0) {
            let sx = 0, sy = 0, cnt = 0;
            for (const arc of volta.arcs) {
              sx += arc.a.x + arc.b.x; sy += arc.a.y + arc.b.y; cnt += 2;
            }
            volta.cx += ((sx / cnt) - volta.cx) * clamp(dt * 0.014, 0, 1);
            volta.cy += ((sy / cnt) - volta.cy) * clamp(dt * 0.014, 0, 1);
          }
          // Still drift toward VE so the arc body eventually reaches it
          const tx = (ve.scaleCurrent > 5) ? ve.x : w * 0.5;
          const ty = (ve.scaleCurrent > 5) ? ve.y : h * 0.5;
          const ddx = tx - volta.cx, ddy = ty - volta.cy;
          const dd  = Math.hypot(ddx, ddy) || 1;
          volta.cx += (ddx / dd) * Math.min(VOLTA_SPEED * 0.55 * dt * 0.001, dd);
          volta.cy += (ddy / dd) * Math.min(VOLTA_SPEED * 0.55 * dt * 0.001, dd);
          // Check infection trigger: creature reaches VE — burst of attack arcs at the moment of contact
          if (ve.scaleCurrent > 5 && Math.hypot(volta.cx - ve.x, volta.cy - ve.y) < ve.scaleCurrent * 1.5) {
            volta.state = 'infecting'; volta.infectedTimer = 0; ve.voltaHeld = true;
            // Stinger burst: connect every arc endpoint to nearest VE vertex
            if (ve.vertNodes) {
              const attackNodes = ve.centerNode ? [...ve.vertNodes, ve.centerNode] : ve.vertNodes;
              const pts = new Set();
              for (const arc of volta.arcs) { pts.add(arc.a); pts.add(arc.b); }
              for (const pt of pts) {
                let bestVN = null, bestD = Infinity;
                for (const node of attackNodes) {
                  const d = Math.hypot(pt.x - node.x, pt.y - node.y);
                  if (d < bestD) { bestD = d; bestVN = node; }
                }
                if (bestVN && bestD < VOLTA_ARC_DIST * 2.5) {
                  volta.arcs.push({ a: pt, b: bestVN, born: now, maxAge: rand(200, 500), strength: 1.0, veNode: true });
                }
              }
            }
          }
          if (volta.state === 'entering') volta.state = 'traversing';
        }

        // ── Arc management ──────────────────────────────────────────────────
        volta.arcs = volta.arcs.filter(arc => now - arc.born < arc.maxAge);

        // VE node drawScale: jitter scale 90-110% when newly arced; retain on disconnect
        if (ve.vertNodes) {
          const scalableNodes = ve.centerNode ? [...ve.vertNodes, ve.centerNode] : ve.vertNodes;
          const arcedIdx = new Set();
          for (const arc of volta.arcs) {
            if (!arc.veNode) continue;
            const ia = scalableNodes.indexOf(arc.a), ib = scalableNodes.indexOf(arc.b);
            if (ia >= 0) arcedIdx.add(ia);
            if (ib >= 0) arcedIdx.add(ib);
          }
          for (let i = 0; i < scalableNodes.length; i++) {
            const node = scalableNodes[i];
            const isNow = arcedIdx.has(i), wasBefore = node._arced;
            if (isNow && !wasBefore) {
              node.drawScale = 1.0; // reset first, then randomize
              node.drawScale = rand(0.90, 1.10);
            }
            node._arced = isNow;
          }
        }

        // Magnetic pull: particle arcs draw their two nodes together; force scales with strength
        for (const arc of volta.arcs) {
          if (!arc.freeNode && !arc.veNode) {
            const dx = arc.b.x - arc.a.x, dy = arc.b.y - arc.a.y;
            const d  = Math.hypot(dx, dy) || 1;
            const f  = (arc.strength || 0.6) * 0.00055 * dt;
            arc.a.vx += (dx / d) * f; arc.a.vy += (dy / d) * f;
            arc.b.vx -= (dx / d) * f; arc.b.vy -= (dy / d) * f;
          }
        }

        // Post-liberation: arc between drifting VE vertex nodes with magnetic pull
        if (ve.liberated && ve.vertNodes) {
          for (const arc of volta.arcs) {
            if (arc.veNode) {
              const dx = arc.b.x - arc.a.x, dy = arc.b.y - arc.a.y;
              const d  = Math.hypot(dx, dy) || 1;
              const f  = 0.0006 * dt;
              arc.a.vx += (dx / d) * f; arc.a.vy += (dy / d) * f;
              arc.b.vx -= (dx / d) * f; arc.b.vy -= (dy / d) * f;
            }
          }
          if (volta.arcs.length < VOLTA_MAX_ARCS) {
            const vn = ve.vertNodes;
            const ni = Math.floor(Math.random() * 12), nj = Math.floor(Math.random() * 12);
            if (ni !== nj && ve.alpha > 0.03) {
              const d = Math.hypot(vn[ni].x - vn[nj].x, vn[ni].y - vn[nj].y);
              if (d < 240 && !volta.arcs.some(a => (a.a === vn[ni] && a.b === vn[nj]) || (a.a === vn[nj] && a.b === vn[ni])))
                volta.arcs.push({ a: vn[ni], b: vn[nj], born: now, maxAge: rand(80, 260), veNode: true });
            }
          }
          return;
        }

        // Infecting state: never run traversal arc code regardless of liberation status
        if (volta.state === 'infecting') {
          if (!ve.liberated && ve.vertNodes) {
            // Particle pressure: blow particles outward from VE as energy is consumed
            if (Math.random() < 0.3) {
              for (const p of particles) {
                const dx = p.x - ve.x, dy = p.y - ve.y;
                const d  = Math.hypot(dx, dy) || 1;
                if (d < 160) { const f = volta.charge * (1 - d/160) * 0.025 / Math.max(p.mass, 0.05); p.vx += (dx/d)*f; p.vy += (dy/d)*f; }
              }
            }
            // Internal VE arcs only
            if (volta.arcs.length < VOLTA_MAX_ARCS) {
              const internalNodes = ve.centerNode ? [...ve.vertNodes, ve.centerNode] : ve.vertNodes;
              const ni = Math.floor(Math.random() * internalNodes.length), nj = Math.floor(Math.random() * internalNodes.length);
              if (ni !== nj) {
                const a = internalNodes[ni], b = internalNodes[nj];
                const d = Math.hypot(a.x - b.x, a.y - b.y);
                if (d > 5 && d < ve.scaleCurrent * 1.9 && !volta.arcs.some(arc => arc.a === a && arc.b === b))
                  volta.arcs.push({ a, b, born: now, maxAge: rand(60, 200), veNode: true });
              }
            }
          }
          return; // never fall through to traversal arc code
        }

        // Traversal: organic arc search toward VE
        const veX = ve.scaleCurrent > 5 ? ve.x : w * 0.5;
        const veY = ve.scaleCurrent > 5 ? ve.y : h * 0.5;
        const veDist = Math.hypot(stage.clientWidth, stage.clientHeight);

        // Volta's forward direction (toward VE)
        const voltaFwdX = veX - volta.cx, voltaFwdY = veY - volta.cy;
        const voltaFwdL = Math.hypot(voltaFwdX, voltaFwdY) || 1;

        // Harvest nearby particles — bias strongly forward; backward particles are excluded
        const nearby = [];
        for (const p of particles) {
          if (p.r >= 0.05) {
            const dpx = p.x - volta.cx, dpy = p.y - volta.cy;
            const distFromVolta = Math.hypot(dpx, dpy) || 1;
            if (distFromVolta < VOLTA_SEARCH_R) {
              // Forwardness: +1 = directly ahead, -1 = directly behind Volta toward VE
              const forwardness = (dpx * voltaFwdX + dpy * voltaFwdY) / (distFromVolta * voltaFwdL);
              if (forwardness < -0.25) continue; // hard-exclude particles >105° behind Volta
              const prox    = 1 - distFromVolta / VOLTA_SEARCH_R;
              const toVE    = Math.hypot(p.x - veX, p.y - veY);
              const closerToVE = Math.max(0, 1 - toVE / veDist);
              const toDirX  = veX - p.x, toDirY = veY - p.y;
              const toDirL  = Math.hypot(toDirX, toDirY) || 1;
              const vSpeed  = Math.hypot(p.vx, p.vy) || 0.0001;
              const velAlign = (p.vx * toDirX + p.vy * toDirY) / (toDirL * vSpeed);
              const massBonus = Math.min(1, (p.mass || 0.1) / 0.5);
              nearby.push({ p, score: prox * prox * 0.30 + closerToVE * 0.28
                                   + Math.max(0, forwardness) * 0.22
                                   + Math.max(0, velAlign) * 0.14
                                   + massBonus * 0.04 + Math.random() * 0.02 });
            }
          }
        }

        // Particle availability sustains Volta. It only fades when the local
        // substrate can no longer support even one arc, never while surrounded.
        if (nearby.length >= 2) {
          volta.energy = Math.min(1, volta.energy + dt * 0.00018);
        } else {
          volta.energy -= dt * 0.000011;
          if (volta.energy <= 0) {
            volta.active = false; volta.state = 'dormant'; scheduleVoltaSpawn(); return;
          }
        }

        // Attempt ONE new arc per frame — all arcs must stay contiguous (connected chain)
        // Spawn up to 4 new arcs per frame — constellation branching from any existing node
        const spawnBudget = Math.min(4, VOLTA_MAX_ARCS - volta.arcs.length);
        if (spawnBudget > 0 && nearby.length >= 2) {
          nearby.sort((a, b) => b.score - a.score);
          // Build set of all nodes already in the arc graph
          const existingPts = new Set();
          for (const arc of volta.arcs) { existingPts.add(arc.a); existingPts.add(arc.b); }

          for (let spawn = 0; spawn < spawnBudget; spawn++) {
            let src = null;
            if (existingPts.size === 0) {
              // First arc: pick from top-scoring half
              const srcPool = nearby.slice(0, Math.max(2, Math.ceil(nearby.length * 0.5)));
              src = srcPool[Math.floor(Math.random() * srcPool.length)].p;
            } else {
              // Branch from any existing node in the graph — enables multi-arc nodes
              const connected = nearby.filter(({p}) => existingPts.has(p));
              if (connected.length > 0) {
                connected.sort((a, b) => b.score - a.score);
                src = connected[Math.floor(Math.random() * Math.min(5, connected.length))].p;
              }
            }
            if (!src) break;

            const targets = nearby.filter(({p}) => p !== src
                            && Math.hypot(p.x - src.x, p.y - src.y) < VOLTA_ARC_DIST
                            && Math.hypot(p.x - src.x, p.y - src.y) > 10
                            && !volta.arcs.some(arc => (arc.a === src && arc.b === p) || (arc.a === p && arc.b === src)));
            if (targets.length === 0) continue;
            targets.sort((a, b) => b.score - a.score);
            const tgt = targets[Math.floor(Math.random() * Math.min(4, targets.length))].p;
            // Flat cost — mass still affects score, not cost, so pool stays full enough to sustain constellation
            const arcCost = 0.04 / Math.max(tgt.mass || 0.1, 0.1);
            const strength = clamp(1 - arcCost * 0.4, 0.35, 1.0);
            volta.pool = Math.max(0, volta.pool - arcCost);
            volta.arcs.push({ a: src, b: tgt, born: now, maxAge: rand(55, 220), strength });
            existingPts.add(src); existingPts.add(tgt);
          }
        }

        // Attack arcs: when Volta is close enough to VE, bridge from constellation to VE vertices
        if (ve.scaleCurrent > 5 && !ve.liberated && ve.vertNodes) {
          const distToVE = Math.hypot(volta.cx - ve.x, volta.cy - ve.y);
          const attackRange = ve.scaleCurrent * 5.0 + VOLTA_ARC_DIST;
          if (distToVE < attackRange && volta.arcs.length > 0) {
            const existingPtsAtk = new Set();
            for (const arc of volta.arcs) { existingPtsAtk.add(arc.a); existingPtsAtk.add(arc.b); }
            // Try to bridge from each arc endpoint to each VE vertex within range
            for (const pt of existingPtsAtk) {
              if (volta.arcs.length >= VOLTA_MAX_ARCS) break;
              // Find closest unreached VE vertex within arc distance
              let bestVN = null, bestD = VOLTA_ARC_DIST * 1.3;
              const attackNodes = ve.centerNode ? [...ve.vertNodes, ve.centerNode] : ve.vertNodes;
              for (const vn of attackNodes) {
                const d = Math.hypot(pt.x - vn.x, pt.y - vn.y);
                if (d < bestD && !volta.arcs.some(a => (a.a === pt && a.b === vn) || (a.a === vn && a.b === pt))) {
                  bestD = d; bestVN = vn;
                }
              }
              if (bestVN) {
                volta.arcs.push({ a: pt, b: bestVN, born: now, maxAge: rand(120, 380), strength: 1.0, veNode: true });
              }
            }
          }
        }

        // Traversal arcs deposit edge energy into the same thermal accumulator
        // used by substrate friction. Cooling and ablation happen in updateParticles.
        if (volta.state === 'traversing') {
          for (const arc of volta.arcs) {
            if (arc.veNode) continue;
            const age = (now - arc.born) / arc.maxAge;
            const vitality = Math.sin(age * Math.PI);
            const d = Math.hypot(arc.a.x - arc.b.x, arc.a.y - arc.b.y);
            const arcEnergy = Math.max(0, 1 - d / VOLTA_ARC_DIST); // shorter = more energetic
            const transfer = clamp(vitality * arcEnergy * (arc.strength || 1), 0, 1);
            if (arc.a.thermalInput !== undefined) arc.a.thermalInput = Math.max(arc.a.thermalInput, transfer);
            if (arc.b.thermalInput !== undefined) arc.b.thermalInput = Math.max(arc.b.thermalInput, transfer);
          }
        }
      }

      function drawVolta(now) {
        if (!volta.active || volta.arcs.length === 0) return;
        // Pool-based master alpha: hard floor so arcs are always legible during traversal
        const masterAlpha = clamp(volta.energy, 0, 1) * clamp(volta.pool * 5.0, 0.92, 1.0);
        if (masterAlpha < 0.01) return;

        // VE proximity drives brightness — builds as Volta converges, peaks inside
        let vePx = 1.0;
        if (ve.scaleCurrent > 5) {
          if (volta.state === 'infecting') {
            vePx = 1.8; // maximum when inside/consuming
          } else {
            const dToVE = Math.hypot(volta.cx - ve.x, volta.cy - ve.y);
            const horizon = Math.hypot(particlesCanvas.width, particlesCanvas.height) * 0.45 || 600;
            vePx = 0.25 + 1.55 * Math.max(0, 1 - dToVE / horizon);
          }
        }

        pctx.save();
        pctx.lineCap = 'round';
        pctx.strokeStyle = '#ffffff';
        for (const arc of volta.arcs) {
          const age     = (now - arc.born) / arc.maxAge;
          const life    = Math.sin(age * Math.PI);
          const flicker = clamp(0.5 + Math.sin(now * 0.035 + arc.born * 0.001) * 0.3
                                    + Math.sin(now * 0.071 + arc.born * 0.002) * 0.2, 0.05, 1);
          const d       = Math.hypot(arc.a.x - arc.b.x, arc.a.y - arc.b.y);
          // VE node arcs: always full brightness; traversal arcs: inverse-distance energy
          const arcE    = arc.veNode ? 1.0 : Math.max(0, 1 - d / VOLTA_ARC_DIST);
          const str     = arc.strength || 1.0;
          const energy  = clamp(Math.max(arcE, vePx * 0.6) * vePx * str, 0, 1);
          const bright  = energy * energy;
          const a       = masterAlpha * life * flicker * (0.78 + bright * 0.22);
          if (a < 0.02) continue;
          pctx.globalAlpha = Math.min(1, a * 1.8);
          // Live blur only: it is redrawn with this arc and disappears with it.
          pctx.shadowBlur  = 8 + bright * 26;
          pctx.shadowColor = '#d0eeff';
          pctx.lineWidth   = 0.4 + bright * 1.2;
          pctx.beginPath();
          pctx.moveTo(arc.a.x, arc.a.y);
          pctx.lineTo(arc.b.x, arc.b.y);
          pctx.stroke();
        }
        pctx.restore();
      }

      // ─── Main loop ──────────────────────────────────────────────────────────

      function resize() {
        setCanvasSize(particlesCanvas, pctx);
        buildTitle();
        seedParticles();
      }

      function frame(now) {
        const dt = Math.min(32, now - (lastFrame || now));
        lastFrame = now;
        updateLights(dt);
        updateVE(dt);
        updateVolta(dt, now);
        updateParticles(dt);
        updateAppParticles(dt);
        updateLiberatedNodes(dt, now);
        updateTitle(dt);
        // Rebuild hot-particle list once per frame (avoids O(N²) in lightAt)
        hotParticles.length = 0;
        for (const p of particles) {
          if (p.heat >= 0.3 && p.r >= 0.05) hotParticles.push(p);
        }
        drawParticles(now);
        drawAppParticles(now);
        drawVE();
        drawLiberatedNodes();
        drawVolta(now);
        requestAnimationFrame(frame);
      }

      stage.addEventListener('pointerdown', e => {
        holdActive = true;
        // 12-tap summon: rapid taps within 2.5s summon the Volta creature
        const tNow = performance.now();
        volta.tapTimes.push(tNow);
        while (volta.tapTimes.length > 0 && tNow - volta.tapTimes[0] > 2500) volta.tapTimes.shift();
        if (volta.tapTimes.length >= 12 && !volta.active) {
          spawnVolta(); scheduleVoltaSpawn(); volta.tapTimes.length = 0;
        }
        // Spike to 100%, settle to 70% (mouse click) or 30% (touch hold)
        const touch = e.pointerType === 'touch';
        pointerLight(e, 1.0, touch ? 0.30 : 0.70);
        if (e.button === 0 || touch) {
          ve.ωx += (Math.random() * 2 - 1) * 0.0035;
          ve.ωy += (Math.random() * 2 - 1) * 0.0035;
          ve.ωz += (Math.random() * 2 - 1) * 0.0018;
        }
      });
      stage.addEventListener('pointermove', e => {
        if (e.pointerType === 'mouse') {
          if (e.buttons & 1) pointerLight(e, null, 0.70);  // held click — sustain 70%
          else               pointerLight(e, 0.30, 0.30);  // hover — steady 30%
        } else if (e.buttons) {
          // Touch swipe: speed scales sustain from 30% to 70%
          const speed = Math.hypot(e.movementX || 0, e.movementY || 0);
          const sus   = Math.min(0.70, 0.30 + speed * 0.08);
          pointerLight(e, null, sus);
        }
      });
      stage.addEventListener('pointerup',     releasePointerLight);
      stage.addEventListener('pointercancel', releasePointerLight);
      stage.addEventListener('touchend',      releasePointerLight, { passive: true });
      window.addEventListener('resize', resize);

      // Navigate on tap/click of an app particle
      stage.addEventListener('click', e => {
        const rect = stage.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        for (const ap of appParticles) {
          if (Math.hypot(cx - ap.x, cy - ap.y) <= ap.r0 * 1.5) {
            if (ap.audio) {
              if (nautilusAudio.paused) nautilusAudio.play().catch(() => { ap.playing = false; });
              else nautilusAudio.pause();
              return;
            }
            window.location.href = '/' + ap.path;
            return;
          }
        }
      });

      const syncNautilusOrb = () => {
        const orb = appParticles.find(ap => ap.audio);
        if (orb) orb.playing = !nautilusAudio.paused && !nautilusAudio.ended;
      };
      nautilusAudio.addEventListener('play', syncNautilusOrb);
      nautilusAudio.addEventListener('pause', syncNautilusOrb);
      nautilusAudio.addEventListener('ended', syncNautilusOrb);

      document.getElementById('ver-stamp').textContent = VERSION;
      resize();
      seedAppParticles();
      scheduleVoltaSpawn();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
