<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Adividiardi</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #040507;
      --bg2: #090b10;
      --ink: #e8e0d1;
      --ink-dim: rgba(232, 224, 209, 0.18);
      --ink-faint: rgba(232, 224, 209, 0.08);
    }
    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.022), transparent 22%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      color: var(--ink);
      font-family: Cambria, Georgia, "Times New Roman", serif;
      touch-action: none;
    }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    #particles, #veil, #quotes, #wordmark-wrap {
      position: absolute;
      inset: 0;
    }
    #particles, #veil, #quotes {
      pointer-events: none;
    }
    #veil::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(78vw, 760px);
      height: 1px;
      transform: translate(-50%, -50%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    }
    #wordmark-wrap {
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    #wordmark {
      position: relative;
      display: inline-block;
      will-change: transform;
    }
    .title-letter {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      white-space: pre;
      will-change: transform;
      pointer-events: none;
    }
      color: var(--ink);
      font-weight: 700;
      letter-spacing: 0.08em;
      white-space: pre;
      animation: breathe 6.8s ease-in-out infinite;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.03),
        0 0 14px rgba(232, 224, 209, 0.035);
      will-change: transform, text-shadow, opacity;
    }
    #wordmark::after {
      content: "";
      position: absolute;
      inset: -18px -22px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(232,224,209,0.07), rgba(232,224,209,0.02) 34%, transparent 72%);
      opacity: 0.18;
      filter: blur(22px);
      z-index: -1;
      animation: glowBreathe 6.8s ease-in-out infinite;
    }
    .quote {
      position: absolute;
      max-width: min(38vw, 320px);
      color: rgba(232, 224, 209, 0.72);
      opacity: 0;
      filter: blur(0.2px);
      transition: opacity 900ms ease;
      will-change: opacity;
    }
    .quote .body {
      font-size: clamp(13px, 1.45vw, 18px);
      line-height: 1.42;
      letter-spacing: 0.01em;
    }
    .quote .cite {
      margin-top: 8px;
      font-size: clamp(11px, 1vw, 13px);
      color: rgba(232, 224, 209, 0.46);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .quote.left { text-align: left; }
    .quote.right { text-align: right; }
    @keyframes breathe {
      0%, 100% { transform: scale(0.994); opacity: 0.92; }
      50% { transform: scale(1.012); opacity: 1; }
    }
    @keyframes glowBreathe {
      0%, 100% { opacity: 0.12; transform: scale(0.98); }
      50% { opacity: 0.22; transform: scale(1.025); }
    }
    @media (max-width: 720px) {
      .quote {
        max-width: min(62vw, 260px);
      }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Interactive Adividiardi landing page">
    <canvas id="particles"></canvas>
    <div id="veil"></div>
    <div id="quotes"></div>
    <div id="wordmark-wrap"><div id="wordmark" aria-label="ADIVIDIARDI"></div></div>
  </main>

  <script>
    (() => {
      const stage = document.getElementById('stage');
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      const word = document.getElementById('wordmark');
      const quotesEl = document.getElementById('quotes');
      if (!ctx) return;

      const quotePool = [
        { body: '"The world is my representation."', cite: 'Arthur Schopenhauer' },
        { body: '"We do not know what we want and yet we are responsible for what we are."', cite: 'Jean-Paul Sartre' },
        { body: '"The eternal silence of these infinite spaces terrifies me."', cite: 'Blaise Pascal' },
        { body: '"No man ever steps in the same river twice."', cite: 'Heraclitus' },
        { body: '"Be patient toward all that is unsolved in your heart."', cite: 'Rainer Maria Rilke' },
        { body: '"The mystery of life is not a problem to be solved but a reality to be experienced."', cite: 'Søren Kierkegaard' }
      ];

      const zones = [];
      const activeQuotes = [];
      const lights = [];
      const particles = [];
      const titleLetters = [];
      const MAX_QUOTES = 2;
      const PARTICLE_COUNT = 56;
      const TITLE_TEXT = 'ADIVIDIARDI';
      let nextQuoteAt = 0;
      let lastFrame = 0;

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(min, max) { return min + Math.random() * (max - min); }
      function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

      function buildTitle() {
        if (titleLetters.length) return;
        const measureCanvas = document.createElement('canvas');
        const measureCtx = measureCanvas.getContext('2d');
        if (!measureCtx) return;
        word.innerHTML = '';
        const fontSize = clamp(stage.clientWidth * 0.105, 38, 108);
        const tracking = fontSize * 0.08;
        measureCtx.font = `700 ${fontSize}px Cambria, Georgia, Times New Roman, serif`;
        const widths = [...TITLE_TEXT].map(ch => measureCtx.measureText(ch).width);
        const total = widths.reduce((a,b)=>a+b,0) + tracking * (widths.length - 1);
        word.style.width = `${Math.ceil(total)}px`;
        word.style.height = `${Math.ceil(fontSize * 1.2)}px`;
        let x = 0;
        for (let i = 0; i < TITLE_TEXT.length; i++) {
          const span = document.createElement('span');
          span.className = 'title-letter';
          span.textContent = TITLE_TEXT[i];
          span.style.fontSize = `${fontSize}px`;
          span.style.left = `${x + widths[i] / 2}px`;
          word.appendChild(span);
          titleLetters.push({
            el: span,
            baseX: x + widths[i] / 2,
            x: x + widths[i] / 2,
            y: 0,
            vx: 0,
            vy: 0,
            kick: 0
          });
          x += widths[i] + tracking;
        }
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(stage.clientWidth * dpr);
        canvas.height = Math.round(stage.clientHeight * dpr);
        canvas.style.width = stage.clientWidth + 'px';
        canvas.style.height = stage.clientHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        titleLetters.length = 0;
        buildTitle();
        buildZones();
      }

      function buildZones() {
        const w = stage.clientWidth;
        const h = stage.clientHeight;
        zones.length = 0;
        zones.push({ x: w * 0.2, y: h * 0.24, align: 'left' });
        zones.push({ x: w * 0.78, y: h * 0.28, align: 'right' });
        zones.push({ x: w * 0.18, y: h * 0.72, align: 'left' });
        zones.push({ x: w * 0.8, y: h * 0.68, align: 'right' });
      }

      function addLight(x, y, strength = 1, ttl = 3200) {
        lights.push({ x, y, strength, ttl, maxTtl: ttl });
      }


      function nearestZoneIndex(x, y) {
        let best = 0;
        let bestDist = Infinity;
        for (let i = 0; i < zones.length; i++) {
          const z = zones[i];
          const d = dist(x, y, z.x, z.y);
          if (d < bestDist) { best = i; bestDist = d; }
        }
        return best;
      }

      function ensureQuoteNear(x, y) {
        if (!zones.length) return;
        const zoneIndex = nearestZoneIndex(x, y);
        const existing = activeQuotes.find(q => q.zoneIndex === zoneIndex);
        if (existing) {
          existing.born = performance.now();
          existing.graceUntil = performance.now() + 2600;
          return;
        }
        const usedBodies = new Set(activeQuotes.map(q => q.body));
        const options = quotePool.filter(q => !usedBodies.has(q.body));
        if (!options.length) return;
        const quote = options[Math.floor(Math.random() * options.length)];
        const zone = zones[zoneIndex];
        const el = document.createElement('div');
        el.className = `quote ${zone.align}`;
        el.innerHTML = `<div class="body">${quote.body}</div><div class="cite">${quote.cite}</div>`;
        el.style.left = zone.x + 'px';
        el.style.top = zone.y + 'px';
        el.style.transform = zone.align === 'right' ? 'translate(-100%, -50%)' : 'translate(0, -50%)';
        quotesEl.appendChild(el);
        activeQuotes.push({ ...quote, el, zoneIndex, x: zone.x, y: zone.y, born: performance.now(), life: rand(9000, 14000), reveal: 1, graceUntil: performance.now() + 2600, align: zone.align, swayX: 0, swayY: 0, svx: 0, svy: 0 });
        while (activeQuotes.length > MAX_QUOTES) {
          const old = activeQuotes.shift();
          old.el.remove();
        }
      }
      function pointerLight(event, strength = 1) {
        const rect = stage.getBoundingClientRect();
        const p = event.touches ? event.touches[0] : event;
        const x = p.clientX - rect.left;
        const y = p.clientY - rect.top;
        addLight(x, y, strength, event.touches ? 3400 : 2600);
        ensureQuoteNear(x, y);
      }

      function spawnQuote() {
        if (zones.length === 0) return;
        const usedBodies = new Set(activeQuotes.map(q => q.body));
        const options = quotePool.filter(q => !usedBodies.has(q.body));
        if (!options.length) return;
        const quote = options[Math.floor(Math.random() * options.length)];
        const freeZones = zones.filter((_, i) => !activeQuotes.some(q => q.zoneIndex === i));
        const zone = (freeZones.length ? freeZones : zones)[Math.floor(Math.random() * (freeZones.length ? freeZones.length : zones.length))];
        const zoneIndex = zones.indexOf(zone);

        const el = document.createElement('div');
        el.className = `quote ${zone.align}`;
        el.innerHTML = `<div class="body">${quote.body}</div><div class="cite">${quote.cite}</div>`;
        el.style.left = zone.x + 'px';
        el.style.top = zone.y + 'px';
        el.style.transform = zone.align === 'right' ? 'translate(-100%, -50%)' : 'translate(0, -50%)';
        quotesEl.appendChild(el);

        activeQuotes.push({
          ...quote,
          el,
          zoneIndex,
          x: zone.x,
          y: zone.y,
          born: performance.now(),
          life: rand(9000, 14000),
          reveal: 0,
          graceUntil: 0,
          align: zone.align,
          swayX: 0,
          swayY: 0,
          svx: 0,
          svy: 0,
        });

        while (activeQuotes.length > MAX_QUOTES) {
          const old = activeQuotes.shift();
          old.el.remove();
        }
      }

      function seedParticles() {
        particles.length = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * stage.clientWidth,
            y: Math.random() * stage.clientHeight,
            vx: rand(-0.018, 0.018),
            vy: rand(-0.012, 0.012),
            size: Math.random() > 0.84 ? 2 : 1,
            tw: Math.random() * Math.PI * 2,
            alpha: rand(0.1, 0.22)
          });
        }
      }

      function lightAt(x, y) {
        let total = 0;
        for (const light of lights) {
          const d = dist(x, y, light.x, light.y);
          const radius = 180 + light.strength * 110;
          total += Math.max(0, 1 - d / radius) * light.strength * (light.ttl / light.maxTtl);
        }
        return clamp(total, 0, 1.25);
      }

      function updateQuotes(now) {
        for (let i = activeQuotes.length - 1; i >= 0; i--) {
          const quote = activeQuotes[i];
          const age = now - quote.born;
          if (age > quote.life) {
            quote.el.remove();
            activeQuotes.splice(i, 1);
            continue;
          }
          const light = Math.max(lightAt(quote.x + (quote.align === 'right' ? -36 : 36), quote.y), now < quote.graceUntil ? 1 : 0);
          quote.reveal = lerp(quote.reveal, light, 0.18);
          const fadeIn = clamp(age / 700, 0, 1);
          const fadeOut = clamp((quote.life - age) / 1800, 0, 1);
          const opacity = Math.min(fadeIn, fadeOut) * (0.02 + quote.reveal * 0.31);
          quote.el.style.opacity = opacity.toFixed(3);
        }

        if (now >= nextQuoteAt) {
          spawnQuote();
          nextQuoteAt = now + rand(11000, 19000);
        }
      }

      function updateParticles(dt) {
        const w = stage.clientWidth;
        const h = stage.clientHeight;
        for (const p of particles) {
          p.tw += dt * 0.0007;
          for (const light of lights) {
            const dx = p.x - light.x;
            const dy = p.y - light.y;
            const d = Math.hypot(dx, dy) || 1;
            const influence = Math.max(0, 1 - d / 130) * light.strength * 0.03;
            p.vx += (dx / d) * influence;
            p.vy += (dy / d) * influence;
          }
          p.vx *= 0.9985;
          p.vy *= 0.9985;
          p.x += p.vx * dt * 0.028;
          p.y += p.vy * dt * 0.028;
          if (p.x < -6) p.x = w + 6;
          if (p.x > w + 6) p.x = -6;
          if (p.y < -6) p.y = h + 6;
          if (p.y > h + 6) p.y = -6;
        }
      }

      function drawParticles(now) {
        ctx.clearRect(0, 0, stage.clientWidth, stage.clientHeight);
        for (const p of particles) {
          const local = lightAt(p.x, p.y);
          const pulse = 0.5 + Math.sin(now * 0.0008 + p.tw) * 0.5;
          const alpha = (p.alpha * 0.22) + local * (0.08 + pulse * 0.08);
          if (alpha < 0.03) continue;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#f1eadc';
          ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
        }
        ctx.globalAlpha = 1;
      }

      function updateLights(dt) {
        for (let i = lights.length - 1; i >= 0; i--) {
          lights[i].ttl -= dt;
          if (lights[i].ttl <= 0) lights.splice(i, 1);
        }
      }

      function updateWordGlow() {
        let centerLight = lightAt(stage.clientWidth / 2, stage.clientHeight / 2);
        centerLight = clamp(centerLight, 0, 1);
        word.style.textShadow = `0 1px 0 rgba(255,255,255,0.03), 0 0 ${14 + centerLight * 18}px rgba(232,224,209,${0.03 + centerLight * 0.06})`;
        word.style.opacity = (0.92 + centerLight * 0.06).toFixed(3);
      }

      function updateTitle(dt) {
        const w = stage.clientWidth;
        const h = stage.clientHeight;
        for (const l of titleLetters) {
          let fx = 0;
          let fy = 0;
          for (const light of lights) {
            const dx = l.baseX + (w - word.offsetWidth) * 0.5 - light.x;
            const dy = h * 0.5 - light.y;
            const d = Math.hypot(dx, dy) || 1;
            const influence = Math.max(0, 1 - d / 170) * light.strength;
            fx += (dx / d) * influence * 0.22;
            fy += (dy / d) * influence * 0.16;
          }
          l.vx += fx;
          l.vy += fy;
          l.vx += (-l.x + l.baseX) * 0.028;
          l.vy += (-l.y) * 0.032;
          l.vx *= 0.86;
          l.vy *= 0.84;
          l.x += l.vx * dt * 0.06;
          l.y += l.vy * dt * 0.06;
          const rot = clamp(l.vx * 1.1, -4, 4);
          const sx = 1 + Math.min(0.018, Math.abs(l.vx) * 0.003);
          const sy = 1 - Math.min(0.01, Math.abs(l.vx) * 0.0015);
          l.el.style.transform = `translate(-50%, -50%) translate(${l.x - l.baseX}px, ${l.y}px) rotate(${rot}deg) scale(${sx}, ${sy})`;
        }
      }

      function updateQuoteSprings(dt) {
        for (const q of activeQuotes) {
          let fx = 0;
          let fy = 0;
          for (const light of lights) {
            const dx = q.x - light.x;
            const dy = q.y - light.y;
            const d = Math.hypot(dx, dy) || 1;
            const influence = Math.max(0, 1 - d / 140) * light.strength;
            fx += (dx / d) * influence * 0.01;
            fy += (dy / d) * influence * 0.008;
          }
          q.svx += fx + (-q.swayX) * 0.02;
          q.svy += fy + (-q.swayY) * 0.022;
          q.svx *= 0.82;
          q.svy *= 0.82;
          q.swayX += q.svx * dt * 0.03;
          q.swayY += q.svy * dt * 0.03;
          q.swayX = clamp(q.swayX, -4, 4);
          q.swayY = clamp(q.swayY, -3, 3);
          const base = q.align === 'right' ? 'translate(-100%, -50%)' : 'translate(0, -50%)';
          q.el.style.transform = `${base} translate(${q.swayX}px, ${q.swayY}px)`;
        }
      }

      function frame(now) {
        const dt = Math.min(32, now - (lastFrame || now));
        lastFrame = now;
        updateLights(dt);
        updateParticles(dt);
        updateQuotes(now);
        updateTitle(dt);
        updateQuoteSprings(dt);
        updateWordGlow();
        drawParticles(now);
        requestAnimationFrame(frame);
      }

      stage.addEventListener('pointerdown', (event) => pointerLight(event, 1.2));
      stage.addEventListener('pointermove', (event) => {
        if (event.pointerType === 'mouse') pointerLight(event, 0.6);
        else if (event.buttons) pointerLight(event, 0.9);
      });
      stage.addEventListener('touchstart', (event) => pointerLight(event, 1.15), { passive: true });
      stage.addEventListener('touchmove', (event) => pointerLight(event, 0.85), { passive: true });
      stage.addEventListener('pointerleave', () => addLight(stage.clientWidth * 0.5, stage.clientHeight * 0.5, 0.25, 1200));
      window.addEventListener('resize', () => { resize(); seedParticles(); });

      resize();
      seedParticles();
      addLight(stage.clientWidth * 0.5, stage.clientHeight * 0.5, 0.4, 2600);
      nextQuoteAt = performance.now() + 6000;
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
