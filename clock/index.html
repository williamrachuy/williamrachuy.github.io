<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1d1d20;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #clock {
            color: #fff;
            font-family: Cantarell, sans-serif;
            font-size: 6rem;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: baseline;
        }

        #h {
            width: 2ch;
            text-align: right;
        }

        .sep {
            display: inline-block;
            transform: translateY(-0.1em);
        }
    </style>
</head>
<body>
    <div id="clock"><span id="h"></span><span class="sep">:</span><span id="m"></span></div>
    <script>
        function tick() {
            const now = new Date();
            document.getElementById('h').textContent = now.getHours() % 12 || 12;
            document.getElementById('m').textContent = String(now.getMinutes()).padStart(2, '0');
        }
        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
