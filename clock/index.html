<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1d1d20;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #clock {
            color: #fff;
            font-family: Cantarell, sans-serif;
            font-size: 6rem;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: baseline;
        }

        .sep {
            display: inline-block;
            transform: translateY(-0.1em);
        }
    </style>
</head>
<body>
    <div id="clock"><span id="h0"></span><span id="h1"></span><span class="sep">:</span><span id="m"></span></div>
    <script>
        function tick() {
            const now = new Date();
            const h = String(now.getHours() % 12 || 12).padStart(2, '0');
            const h0 = document.getElementById('h0');
            h0.textContent = h[0];
            h0.style.opacity = h[0] === '0' ? '0.25' : '1';
            document.getElementById('h1').textContent = h[1];
            document.getElementById('m').textContent = String(now.getMinutes()).padStart(2, '0');
        }
        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
