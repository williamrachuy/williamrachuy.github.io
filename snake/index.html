<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --green: #4ade80;
  --green-mid: #22c55e;
  --green-dark: #16a34a;
  --red: #f87171;
  --bg: #080810;
  --surface: #10101e;
  --border: #1e1e38;
  --text-dim: #555;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: #d0d0e0;
  font-family: 'Courier New', Courier, monospace;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  height: 100dvh;
}

/* ── Header ───────────────────────────── */
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 420px;
  padding: 10px 20px 6px;
  flex-shrink: 0;
}

.stat { text-align: center; min-width: 64px; }
.stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--green); line-height: 1; margin-top: 2px; }
#score-val { font-size: 30px; }

/* ── Canvas area ──────────────────────── */
#arena {
  position: relative;
  flex-shrink: 1;
  /* Fill remaining height between header and controls */
  width: min(100vw, 100dvh - 180px, 420px);
  aspect-ratio: 1 / 1;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  image-rendering: pixelated;
}

/* ── Overlay (start / game-over) ──────── */
#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(8, 8, 16, 0.90);
  border-radius: 6px;
  gap: 6px;
}

#overlay h1 {
  font-size: 42px;
  letter-spacing: 6px;
  color: var(--green);
  text-shadow: 0 0 24px rgba(74, 222, 128, 0.5);
}

#overlay h1.over { color: var(--red); text-shadow: 0 0 24px rgba(248, 113, 113, 0.5); }

.ov-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 6px; }
.ov-score { font-size: 20px; color: #ccd; }
.ov-level { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }

#start-btn {
  background: var(--green);
  color: var(--bg);
  border: none;
  padding: 13px 36px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  border-radius: 4px;
  cursor: pointer;
  margin-top: 6px;
  transition: background 0.1s, transform 0.1s;
}
#start-btn:active { background: var(--green-mid); transform: scale(0.97); }

/* ── Level-up toast ───────────────────── */
#toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  background: rgba(74, 222, 128, 0.12);
  border: 1.5px solid var(--green);
  border-radius: 8px;
  padding: 10px 24px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--green);
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s, transform 0.15s;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ── D-pad controls ───────────────────── */
#dpad {
  display: grid;
  grid-template-areas: ". up ." "left . right" ". down .";
  grid-template-columns: 1fr 1fr 1fr;
  gap: 5px;
  padding: 8px 20px 12px;
  flex-shrink: 0;
}

.btn {
  width: 64px;
  height: 64px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 22px;
  color: var(--green);
  user-select: none;
  transition: background 0.08s, border-color 0.08s;
  -webkit-user-select: none;
  touch-action: none;
}
.btn:active, .btn.flash { background: #1e1e3a; border-color: var(--green); }

#bu { grid-area: up; }
#bl { grid-area: left; }
#br { grid-area: right; }
#bd { grid-area: down; }

/* empty center cell */
#dpad::after { content: ''; display: block; }

#hint { font-size: 10px; color: #333; letter-spacing: 1px; padding-bottom: 4px; text-align: center; flex-shrink: 0; }

/* ── Progress bar ─────────────────────── */
#prog-wrap {
  width: 100%;
  max-width: 420px;
  height: 3px;
  background: var(--surface);
  flex-shrink: 0;
}
#prog-bar {
  height: 100%;
  background: var(--green);
  transition: width 0.3s, background 0.3s;
  width: 0%;
}
</style>
</head>
<body>

<div id="header">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score-val">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Level</div>
    <div class="stat-value" id="level-val">1</div>
  </div>
  <div class="stat">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="best-val">0</div>
  </div>
</div>

<div id="prog-wrap"><div id="prog-bar"></div></div>

<div id="arena">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>SNAKE</h1>
    <div class="ov-sub">Swipe · Arrow keys · WASD</div>
    <button id="start-btn">START GAME</button>
  </div>
  <div id="toast">LEVEL UP!</div>
</div>

<div id="dpad">
  <button class="btn" id="bu">▲</button>
  <button class="btn" id="bl">◀</button>
  <button class="btn" id="br">▶</button>
  <button class="btn" id="bd">▼</button>
</div>

<div id="hint">Arrow keys / WASD on desktop</div>

<script>
// ── Constants ────────────────────────────────────────────────
const GRID = 20;
const RES  = 400; // internal canvas resolution
const CELL = RES / GRID;

// Level table: [speed ms, points needed to advance]
const LEVELS = [
  [180,  50],
  [150, 100],
  [120, 160],
  [100, 220],
  [ 80, 300],
  [ 65, 380],
  [ 52, 480],
  [ 42, 600],
  [ 33, 750],
  [ 26, Infinity], // max level
];

const UP    = { x:  0, y: -1 };
const DOWN  = { x:  0, y:  1 };
const LEFT  = { x: -1, y:  0 };
const RIGHT = { x:  1, y:  0 };

// ── DOM ──────────────────────────────────────────────────────
const canvas    = document.getElementById('c');
const ctx       = canvas.getContext('2d');
const overlay   = document.getElementById('overlay');
const toast     = document.getElementById('toast');
const scoreEl   = document.getElementById('score-val');
const levelEl   = document.getElementById('level-val');
const bestEl    = document.getElementById('best-val');
const progBar   = document.getElementById('prog-bar');

canvas.width  = RES;
canvas.height = RES;

// ── State ────────────────────────────────────────────────────
let snake, food, dir, score, level, levelPts, gameState, loop;
let inputQueue = []; // buffered direction changes, drained one per tick
let best = +localStorage.getItem('snake-best') || 0;
bestEl.textContent = best;

// ── Init / Start ─────────────────────────────────────────────
function initGame() {
  const mx = Math.floor(GRID / 2), my = Math.floor(GRID / 2);
  snake = [{ x: mx, y: my }, { x: mx-1, y: my }, { x: mx-2, y: my }];
  dir = RIGHT;
  inputQueue = [];
  score = 0; level = 1; levelPts = 0;
  gameState = 'playing';
  placeFood();
  updateUI();
  draw();
}

function startGame() {
  overlay.style.display = 'none';
  initGame();
  clearInterval(loop);
  loop = setInterval(tick, LEVELS[0][0]);
}

// ── Game tick ────────────────────────────────────────────────
function tick() {
  if (inputQueue.length > 0) dir = inputQueue.shift();
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    return gameOver();
  }
  // Self collision (skip tail — it moves away this frame)
  for (let i = 0; i < snake.length - 1; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    const pts = level * 10;
    score   += pts;
    levelPts += pts;
    placeFood();
    checkLevel();
    updateUI();
  } else {
    snake.pop();
  }

  draw();
}

// ── Level progression ─────────────────────────────────────────
function checkLevel() {
  if (level >= LEVELS.length) return;
  const needed = LEVELS[level - 1][1];
  if (levelPts >= needed) {
    level++;
    levelPts = 0;
    updateUI();
    showToast('LEVEL ' + level + '!');
    clearInterval(loop);
    loop = setInterval(tick, LEVELS[level - 1][0]);
  }
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 900);
}

// ── Food placement ────────────────────────────────────────────
function placeFood() {
  const used = new Set(snake.map(s => s.x + ',' + s.y));
  const free = [];
  for (let x = 0; x < GRID; x++)
    for (let y = 0; y < GRID; y++)
      if (!used.has(x + ',' + y)) free.push({ x, y });
  food = free[Math.floor(Math.random() * free.length)];
  foodPulse = 0;
}

// ── UI update ─────────────────────────────────────────────────
function updateUI() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  const needed = LEVELS[level - 1][1];
  const pct = needed === Infinity ? 100 : Math.min(100, (levelPts / needed) * 100);
  progBar.style.width = pct + '%';
  if (level >= LEVELS.length) progBar.style.background = '#f59e0b'; // gold at max
}

// ── Draw ──────────────────────────────────────────────────────
let foodPulse = 0;
const PULSE_SPEED = 0.08;

function draw() {
  // Background
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, RES, RES);

  // Subtle grid
  ctx.strokeStyle = '#0e0e1c';
  ctx.lineWidth = 0.5;
  for (let i = 1; i < GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, RES); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(RES, i * CELL); ctx.stroke();
  }

  // Snake
  const len = snake.length;
  snake.forEach((seg, i) => {
    const t = i / len; // 0 = head, 1 = tail
    const r = Math.round(lerp(0x22, 0x0a, t));
    const g = Math.round(lerp(0xc5, 0x60, t));
    const b = Math.round(lerp(0x5e, 0x28, t));
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    const pad = i === 0 ? 1 : i === len - 1 ? 3 : 2;
    roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 3);
    ctx.fill();
  });

  // Head eyes
  if (snake.length > 0) drawEyes(snake[0], dir);

  // Food (pulsing circle)
  foodPulse += PULSE_SPEED;
  const pulse = 0.85 + 0.15 * Math.sin(foodPulse);
  const fr = (CELL / 2 - 2) * pulse;
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;

  // Glow
  const grd = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr * 2);
  grd.addColorStop(0, 'rgba(248,113,113,0.25)');
  grd.addColorStop(1, 'rgba(248,113,113,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(fx, fy, fr * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Food body
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(fx - fr * 0.28, fy - fr * 0.3, fr * 0.32, 0, Math.PI * 2);
  ctx.fill();

  // Request next frame for food animation
  if (gameState === 'playing') requestAnimationFrame(() => {
    // Only redraw food glow — or just leave frame-driven via setInterval
  });
}

function drawEyes(head, d) {
  ctx.fillStyle = '#080810';
  const cx = head.x * CELL + CELL / 2;
  const cy = head.y * CELL + CELL / 2;
  const es = 2.5;
  const off = 4;

  if (d === RIGHT || d === LEFT) {
    const ex = cx + (d === RIGHT ? off : -off);
    ctx.fillRect(ex - es/2, cy - off,     es, es);
    ctx.fillRect(ex - es/2, cy + off - es, es, es);
  } else {
    const ey = cy + (d === DOWN ? off : -off);
    ctx.fillRect(cx - off,     ey - es/2, es, es);
    ctx.fillRect(cx + off - es, ey - es/2, es, es);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// Smooth food animation (runs alongside game loop)
function animate() {
  if (gameState === 'playing') draw();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ── Game over ─────────────────────────────────────────────────
function gameOver() {
  gameState = 'over';
  clearInterval(loop);

  if (score > best) {
    best = score;
    localStorage.setItem('snake-best', best);
    bestEl.textContent = best;
  }

  overlay.innerHTML = `
    <h1 class="over">GAME OVER</h1>
    <div class="ov-score">Score: ${score}</div>
    <div class="ov-level">Level ${level} · Best: ${best}</div>
    <button id="start-btn">PLAY AGAIN</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

// ── Direction input ───────────────────────────────────────────
function move(d) {
  if (gameState !== 'playing') return;
  // Check reversal against last queued direction (or current if queue empty)
  const last = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : dir;
  if (d === UP    && last === DOWN)  return;
  if (d === DOWN  && last === UP)    return;
  if (d === LEFT  && last === RIGHT) return;
  if (d === RIGHT && last === LEFT)  return;
  // Buffer up to 2 inputs so rapid presses aren't lost
  if (inputQueue.length < 2) inputQueue.push(d);
}

// Keyboard
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': move(UP);    e.preventDefault(); break;
    case 'ArrowDown':  case 's': case 'S': move(DOWN);  e.preventDefault(); break;
    case 'ArrowLeft':  case 'a': case 'A': move(LEFT);  e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': move(RIGHT); e.preventDefault(); break;
    case ' ':
      if (gameState === 'over') startGame();
      break;
  }
});

// D-pad
function dpadBtn(el, d) {
  el.addEventListener('pointerdown', e => {
    move(d);
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 120);
    e.preventDefault();
  });
}
dpadBtn(document.getElementById('bu'), UP);
dpadBtn(document.getElementById('bd'), DOWN);
dpadBtn(document.getElementById('bl'), LEFT);
dpadBtn(document.getElementById('br'), RIGHT);

// Touch swipe on canvas — fires on touchmove for instant response
let ts = null, swipeFired = false;
canvas.addEventListener('touchstart', e => {
  ts = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  swipeFired = false;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!ts || swipeFired) return;
  const dx = e.touches[0].clientX - ts.x;
  const dy = e.touches[0].clientY - ts.y;
  const min = 18;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > min) { move(dx > 0 ? RIGHT : LEFT); swipeFired = true; }
  } else {
    if (Math.abs(dy) > min) { move(dy > 0 ? DOWN : UP); swipeFired = true; }
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (!ts) return;
  if (!swipeFired) {
    // Short tap/flick — fall back to endpoint delta
    const dx = e.changedTouches[0].clientX - ts.x;
    const dy = e.changedTouches[0].clientY - ts.y;
    const min = 10;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (Math.abs(dx) > min) move(dx > 0 ? RIGHT : LEFT);
    } else {
      if (Math.abs(dy) > min) move(dy > 0 ? DOWN : UP);
    }
  }
  ts = null;
  e.preventDefault();
}, { passive: false });

// Start button
document.getElementById('start-btn').addEventListener('click', startGame);

// Initial draw
draw();
</script>
</body>
</html>
