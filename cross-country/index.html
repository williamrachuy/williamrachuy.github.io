<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cross Country — An Eventing Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1410; --bg2:#141d16; --panel:#1c2a20; --panel2:#243527;
    --ink:#ece3d0; --ink-dim:rgba(236,227,208,.62); --ink-faint:rgba(236,227,208,.34);
    --line:rgba(236,227,208,.14);
    --grass:#6a9a4c; --grass-d:#3f6b2f; --earth:#7a5636; --earth-d:#573c25;
    --gold:#e3b53f; --gold-d:#b8862a; --sky:#8fb4d6;
    --red:#d0563f; --green:#5fae5a; --blue:#4f86c0;
    --shadow:0 10px 34px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 100% at 50% -10%,#1b2a1c 0%,var(--bg) 55%,#080c09 100%);
    color:var(--ink); font-family:'Baloo 2',system-ui,sans-serif;
    overflow:hidden; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center;
  }
  .cinzel{font-family:'Cinzel',serif}
  #app{
    position:relative; width:min(100vw,860px); height:min(100vh,660px);
    max-height:100vh; overflow:hidden;
    background:linear-gradient(180deg,#16221a,#0e1712);
    border:1px solid var(--line); border-radius:0;
    box-shadow:var(--shadow);
  }
  @media(min-width:880px){ #app{border-radius:18px} }
  .screen{position:absolute; inset:0; display:none; flex-direction:column; overflow:hidden}
  .screen.on{display:flex}
  .scroll{overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; padding:18px}
  .scroll::-webkit-scrollbar{width:8px} .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  h1,h2,h3{margin:0; font-weight:700; letter-spacing:.4px}
  .muted{color:var(--ink-dim)} .faint{color:var(--ink-faint)}
  .center{text-align:center}
  .btn{
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px;
    color:#20160a; background:linear-gradient(180deg,var(--gold),var(--gold-d));
    border:none; border-radius:12px; padding:13px 20px; cursor:pointer;
    box-shadow:0 4px 0 #7c5a1c, 0 6px 14px rgba(0,0,0,.4); transition:transform .05s, box-shadow .05s;
  }
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 #7c5a1c, 0 3px 8px rgba(0,0,0,.4)}
  .btn.sec{color:var(--ink); background:linear-gradient(180deg,var(--panel2),var(--panel)); box-shadow:0 4px 0 #101a12,0 6px 14px rgba(0,0,0,.35)}
  .btn.sec:active{box-shadow:0 1px 0 #101a12}
  .btn:disabled{opacity:.4; cursor:default; box-shadow:none; transform:none}
  .btn.sm{font-size:13px; padding:8px 12px; border-radius:9px}
  .row{display:flex; gap:10px} .wrap{flex-wrap:wrap} .col{display:flex;flex-direction:column;gap:10px}
  .grow{flex:1} .center-x{align-items:center;justify-content:center}
  input.txt{
    font-family:'Baloo 2'; font-size:16px; color:var(--ink); background:#0e1712;
    border:1px solid var(--line); border-radius:10px; padding:11px 13px; width:100%; outline:none;
  }
  input.txt:focus{border-color:var(--gold-d)}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:14px; padding:14px}
  .tag{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; background:rgba(255,255,255,.08); color:var(--ink-dim)}
  .stars{color:var(--gold); letter-spacing:2px}

  /* Title */
  #s-title{background:linear-gradient(180deg,#20344a 0%,#3f5a5c 42%,#6a9a4c 58%,#4f7a34 100%)}
  .hills{position:absolute; inset:0; width:100%; height:100%; overflow:hidden}
  .titlewrap{position:relative; z-index:3; margin-top:auto; padding:24px; text-align:center}
  #s-title h1{font-size:min(13vw,58px); color:#fff8e6; text-shadow:0 3px 0 #2c4a1e,0 6px 18px rgba(0,0,0,.5); line-height:.98}
  #s-title .sub{color:#fdf3d9; font-weight:600; letter-spacing:3px; text-transform:uppercase; font-size:12px; margin-top:6px; opacity:.9}

  /* Stat bars */
  .stat{display:flex; align-items:center; gap:8px; font-size:12px; margin:3px 0}
  .stat .lbl{width:70px; color:var(--ink-dim); font-weight:600}
  .bar{flex:1; height:9px; background:rgba(0,0,0,.35); border-radius:6px; overflow:hidden}
  .bar > i{display:block; height:100%; border-radius:6px; background:linear-gradient(90deg,var(--grass-d),var(--grass))}
  .bar.gold > i{background:linear-gradient(90deg,var(--gold-d),var(--gold))}
  .stat .num{width:26px; text-align:right; color:var(--ink-dim); font-variant-numeric:tabular-nums}

  .horsecard{cursor:pointer; transition:transform .08s, border-color .1s; position:relative}
  .horsecard:active{transform:scale(.99)}
  .horsecard.selected{border-color:var(--gold); box-shadow:0 0 0 2px rgba(227,181,63,.35)}
  .portrait{width:100%; height:96px; border-radius:10px; background:radial-gradient(120% 120% at 50% 20%,#2f4630,#16241a); display:flex; align-items:center; justify-content:center; font-size:56px; margin-bottom:8px; overflow:hidden}

  /* HUD / run */
  #s-run{background:#0b120d}
  #cv{position:absolute; inset:0; width:100%; height:100%; touch-action:none}
  .hud{position:absolute; left:0; right:0; top:0; padding:10px 12px; z-index:5; pointer-events:none; display:flex; gap:10px; align-items:flex-start; justify-content:space-between}
  .hudbox{background:rgba(8,14,10,.62); border:1px solid var(--line); border-radius:10px; padding:6px 10px; font-size:12px; font-weight:600; backdrop-filter:blur(3px)}
  .hudbox b{font-size:15px; font-family:'Cinzel'}
  .meter{width:130px; height:8px; background:rgba(0,0,0,.4); border-radius:5px; overflow:hidden; margin-top:4px}
  .meter > i{display:block;height:100%}
  .controls{position:absolute; left:0; right:0; bottom:0; z-index:6; display:flex; justify-content:space-between; padding:14px; gap:12px; pointer-events:none}
  .cbtn{pointer-events:auto; flex:1; max-width:180px; height:74px; border-radius:16px; border:none; font-family:'Baloo 2'; font-weight:700; font-size:18px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 5px 0 rgba(0,0,0,.4)}
  .cbtn:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.4)}
  .cbtn.pace{background:linear-gradient(180deg,#4f86c0,#345f8e)}
  .cbtn.pace.gallop{background:linear-gradient(180deg,#d08a3f,#a5632a)}
  .cbtn.jump{background:linear-gradient(180deg,#5fae5a,#3d7a3a)}
  .cbtn.pace.route{background:linear-gradient(180deg,#6a8fb0,#3f5f7e)}
  .cbtn.jump.route{background:linear-gradient(180deg,#d0563f,#9a3826); animation:pulseR .7s infinite}
  @keyframes pulseR{0%,100%{box-shadow:0 5px 0 rgba(0,0,0,.4)}50%{box-shadow:0 5px 0 rgba(0,0,0,.4),0 0 18px rgba(208,86,63,.7)}}
  .toast{position:absolute; left:50%; top:64px; transform:translateX(-50%); z-index:7; background:rgba(8,14,10,.85); border:1px solid var(--line); padding:8px 14px; border-radius:20px; font-weight:600; font-size:14px; white-space:nowrap; opacity:0; transition:opacity .2s, top .2s; pointer-events:none; max-width:92%; overflow:hidden; text-overflow:ellipsis}
  .toast.show{opacity:1}
  .decide{position:absolute; left:50%; top:96px; transform:translateX(-50%); z-index:7; text-align:center; pointer-events:none; opacity:0; transition:opacity .2s}
  .decide.show{opacity:1}
  .decide .nm{font-family:'Cinzel'; font-weight:700; font-size:17px; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.7)}
  .decide .q{font-size:12px; color:var(--ink); background:rgba(8,14,10,.7); border:1px solid var(--line); border-radius:16px; padding:4px 12px; margin-top:5px; display:inline-block}

  .rosette{font-size:40px}
  .result-row{display:flex; justify-content:space-between; padding:7px 2px; border-bottom:1px solid var(--line); font-size:14px}
  .result-row.me{color:var(--gold); font-weight:700}
  .money{color:var(--gold); font-weight:700}
  .pill{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-weight:600;font-size:13px}
  .shopitem{display:flex; gap:10px; align-items:center}
  .shopitem .ic{font-size:26px; width:40px; text-align:center}
  .topbar{display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--line); background:rgba(0,0,0,.16)}
  .iconbtn{pointer-events:auto; background:rgba(8,14,10,.62); border:1px solid var(--line); color:var(--ink); width:38px; height:38px; border-radius:10px; font-size:17px; cursor:pointer}
  .seg{display:flex; background:#0e1712; border:1px solid var(--line); border-radius:10px; overflow:hidden}
  .seg button{flex:1; background:none; border:none; color:var(--ink-dim); font-family:'Baloo 2'; font-weight:700; padding:9px; cursor:pointer; font-size:13px}
  .seg button.on{background:var(--panel2); color:var(--ink)}
  .fade{animation:fade .35s ease}
  @keyframes fade{from{opacity:0} to{opacity:1}}
  a.home{position:absolute; top:10px; left:12px; z-index:8; color:var(--ink-faint); text-decoration:none; font-size:12px; pointer-events:auto}
  a.home:hover{color:var(--ink)}
</style>

<div id="app"></div>
<canvas id="cv" style="display:none"></canvas>

<script>
"use strict";
//====================================================================
// CROSS COUNTRY — an eventing game.  Self-contained, no dependencies.
//====================================================================
const APP = document.getElementById('app');
const SAVE_KEY = 'xc_eventing_save_v1';
const $ = (s,r=document)=>r.querySelector(s);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const rnd=(a=1,b=0)=>b+Math.random()*(a-b);
const rint=(a,b)=>Math.floor(rnd(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=n=>'$'+Math.round(n).toLocaleString();

//---------------------------------------------------------------
// DATA
//---------------------------------------------------------------
// Stats: gallop, stamina, scope, boldness, ride (0..100)

  { id:'biscuit', name:'Biscuit', emoji:'🦄', breed:'Welsh Cob', silk:'#8a6a3a',

    bio:'A scopey show-jumper slumming it in eventing. Immaculate over coloured poles and skinnies. Detests getting her feet wet.' },
  { id:'wildfire', name:'Wildfire', emoji:'🔥', breed:'Off-track Trakehner', silk:'#e0913a',
    stats:{gallop:74,stamina:66,scope:82,boldness:88,ride:38},

// Fence archetypes. window = base takeoff tolerance (px). stat = which helps.
// spook = base balk chance modifier. idealPace: 'steady'|'gallop'|'any'.
const FENCE_TYPES = {
  log:      { label:'Log',       glyph:'log',     window:1.00, stat:'scope',    spook:0.02, idealPace:'any',    efforts:1 },
  brush:    { label:'Brush',     glyph:'brush',   window:1.05, stat:'scope',    spook:0.02, idealPace:'gallop', efforts:1 },
  table:    { label:'Table',     glyph:'table',   window:0.92, stat:'scope',    spook:0.05, idealPace:'gallop', efforts:1 },
  rolltop:  { label:'Rolltop',   glyph:'rolltop', window:0.94, stat:'scope',    spook:0.06, idealPace:'gallop', efforts:1 },
  water:    { label:'Water',     glyph:'water',   window:0.90, stat:'boldness', spook:0.20, idealPace:'steady', efforts:1, wet:true },
  ditch:    { label:'Ditch',     glyph:'ditch',   window:0.82, stat:'boldness', spook:0.18, idealPace:'any',    efforts:1 },
  trakehner:{ label:'Trakehner', glyph:'trak',    window:0.74, stat:'boldness', spook:0.24, idealPace:'gallop', efforts:1 },
  coffin:   { label:'Coffin',    glyph:'coffin',  window:0.72, stat:'ride',     spook:0.16, idealPace:'steady', efforts:2 },
  corner:   { label:'Corner',    glyph:'corner',  window:0.64, stat:'ride',     spook:0.10, idealPace:'steady', efforts:1, accuracy:true },
  skinny:   { label:'Skinny',    glyph:'skinny',  window:0.60, stat:'ride',     spook:0.12, idealPace:'steady', efforts:1, accuracy:true },
  bank:     { label:'Bank',      glyph:'bank',    window:0.86, stat:'scope',    spook:0.06, idealPace:'steady', efforts:1 },
  drop:     { label:'Drop',      glyph:'drop',    window:0.84, stat:'boldness', spook:0.12, idealPace:'steady', efforts:1, jolt:true },
  bounce:   { label:'Bounce',    glyph:'bounce',  window:0.70, stat:'scope',    spook:0.10, idealPace:'steady', efforts:2 },
};

// THE GOING — ground conditions. speed/drain/jar/slip multipliers; rush = how
// much a horse instinctively quickens on deep ground (you must steady it).
const GOINGS = {
  firm:  { label:'Firm',         emoji:'🌤️', speed:1.05, drain:1.12, jar:1.5, slip:0.00, rush:0.00, sky:'sunny',    note:'Fast but jarring — hard on the legs.' },
  good:  { label:'Good',         emoji:'☀️', speed:1.00, drain:1.00, jar:1.0, slip:0.00, rush:0.00, sky:'sunny',    note:'Perfect galloping ground.' },
  gts:   { label:'Good to Soft', emoji:'⛅', speed:0.95, drain:1.12, jar:0.9, slip:0.12, rush:0.15, sky:'overcast', note:'A touch holding — studs advised.' },
  soft:  { label:'Soft',         emoji:'🌧️', speed:0.88, drain:1.30, jar:0.8, slip:0.28, rush:0.35, sky:'rain',     note:'Holding & slick — tiring; horses rush.' },
  heavy: { label:'Heavy',        emoji:'🟤', speed:0.80, drain:1.50, jar:0.7, slip:0.45, rush:0.50, sky:'mud',      note:'Deep mud — sapping, slippery, hard graft.' },
};

// Career events, ascending. Upper levels are tributes to the real 5* fixtures,
// each with its signature fences & complexes. `sig` entries get injected at
// spread-out positions; complex:true => a route-choice question (direct/long).
const EVENTS = [
  { id:0, venue:'Loch Moy Starter', region:'Maryland, USA', theme:'meadow', star:1, fences:12, fee:0, purse:600,
    goings:['good','good','firm','gts'], pool:['log','brush','table','ditch','bank','rolltop','log','brush'],
    sig:[ {type:'water', name:'The Splash'} ] },
  { id:1, venue:'Riverbend Horse Trials', region:'Area II', theme:'meadow', star:2, fences:16, fee:80, purse:1400,
    goings:['good','gts','firm','soft'], pool:['log','brush','table','rolltop','ditch','bank','drop','skinny','corner'],
    sig:[ {type:'water', name:'The River Crossing', complex:true}, {type:'coffin', name:'The Sunken Lane', terrain:'hollow'} ] },
  { id:2, venue:'Stable View', region:'Aiken, South Carolina', theme:'meadow', star:3, fences:20, fee:220, purse:3600,
    goings:['good','firm','gts','soft'], pool:['table','rolltop','water','ditch','coffin','corner','skinny','drop','bounce','brush','bank'],
    sig:[ {type:'water', name:'The Pond', complex:true}, {type:'coffin', name:'The Hollow', terrain:'hollow'}, {type:'corner', name:'The Brush Corners'} ] },
  { id:3, venue:'Maryland 5 Star at Fair Hill', region:'Elkton, Maryland', theme:'estate', star:4, fences:24, fee:520, purse:8000,
    designer:'Ian Stark',
    goings:['good','gts','soft','soft'], pool:['table','rolltop','water','trakehner','coffin','corner','skinny','drop','bounce','ditch'],
    sig:[ {type:'water', name:'The Fair Hill Waterway', complex:true}, {type:'bank', name:'The Sawmill', terrain:'bank'}, {type:'trakehner', name:'The Ridge Trakehner'}, {type:'skinny', name:'The Chapel Skinnies'} ] },
  { id:4, venue:'Defender Kentucky', region:'Kentucky Horse Park', theme:'bluegrass', star:5, fences:28, fee:1100, purse:16000,
    designer:'Derek di Grazia',
    goings:['firm','good','good','gts'], pool:['table','rolltop','water','trakehner','coffin','corner','skinny','drop','bounce','ditch','brush'],
    sig:[ {type:'rolltop', name:'Head of the Lake', complex:true, terrain:'water'}, {type:'coffin', name:"Pete's Hollow", terrain:'hollow'}, {type:'skinny', name:'The Corgi', fun:'🐕'}, {type:'corner', name:'The Normandy Bank', terrain:'bank'} ] },
  { id:5, venue:'Badminton', region:'Gloucestershire, England', theme:'parkland', star:5, fences:30, fee:1500, purse:20000,
    designer:'Eric Winter',
    goings:['good','gts','soft','soft'], pool:['table','rolltop','water','trakehner','coffin','corner','skinny','drop','bounce','ditch','brush'],
    sig:[ {type:'trakehner', name:'The Vicarage Vee', complex:true}, {type:'brush', name:'The Sunken Road', terrain:'hollow'}, {type:'water', name:'The Lake', complex:true}, {type:'skinny', name:"Huntsman's Close"} ] },
  { id:6, venue:'Burghley', region:'Lincolnshire, England', theme:'estate', star:5, fences:32, fee:1800, purse:24000,
    designer:'Derek di Grazia',
    goings:['good','firm','gts','soft'], pool:['table','rolltop','water','trakehner','coffin','corner','skinny','drop','bounce','ditch','brush'],
    sig:[ {type:'ditch', name:'The Cottesmore Leap', complex:true}, {type:'water', name:'The Trout Hatchery', complex:true, terrain:'water'}, {type:'drop', name:'The Leaf Pit', terrain:'drop'}, {type:'coffin', name:"Capability's Cutting", terrain:'hollow'} ] },
];

const TACK = [
  { id:'studs',   name:'Studs',            ic:'🔩', cost:250,  desc:'Screw-in grip (bigger behind — the engine). Cancels most soft/heavy-ground slip.', stat:null,       flag:'grip' },
  { id:'bit',     name:'Anatomic Bit',     ic:'🎛️', cost:400,  desc:'+6 Rideability. Softer, more responsive steering.', stat:'ride', amt:6 },
  { id:'breast',  name:'Breastplate',      ic:'🎗️', cost:400,  desc:'+8 Stamina. Keeps the saddle — and the engine — in place.', stat:'stamina', amt:8 },
  { id:'pad',     name:'Sheepskin Half-Pad', ic:'🐑', cost:500, desc:'+6 Scope. A comfy back is a brave back.', stat:'scope', amt:6 },
  { id:'vest',    name:'Air Vest',         ic:'🦺', cost:650,  desc:'Halves fall penalties. Deploys with a satisfying WHUMP.', stat:null,   flag:'vest' },
  { id:'martingale',name:'Running Martingale',ic:'➰', cost:350,desc:'+5 Rideability at scary fences (helps control the head).', stat:'ride', amt:5 },
  { id:'browband',name:'Bling Browband',   ic:'💎', cost:150,  desc:'+0 stats. +100 style. Sparkles at the crowd.', stat:null, flag:'style' },
];

const TIPS = [
  'At a signature complex you choose your line: DIRECT saves seconds but is bold and unforgiving; the LONG ROUTE is safe but costs time.',
  'Read the going. On Soft or Heavy ground buy Studs — without them you slip on landings. Deep ground also makes horses rush, so steady them.',
  'Green takeoff patch = clean. Yellow = a rub. Miss it and your horse ducks out: 20 penalties.',
  'Every second over the optimum is 0.4 penalties. Faster than optimum earns nothing — pace, don’t race.',
  'Gallop the open lanes, steady into the technical questions. Uphill saps stamina; downhill, collect before the fence.',
  'Brave horses shrug off water and ditches; rideable horses hold a line to skinnies and corners.',
  'The birthplace of US 5* eventing is the Kentucky Horse Park. Its Head of the Lake is the most famous water on the planet.',
];

//---------------------------------------------------------------
// AUDIO ENGINE (WebAudio, procedural)
//---------------------------------------------------------------
const Audio_ = (()=>{
  let ctx=null, master=null, musicGain=null, sfxGain=null;
  let muted = localStorage.getItem('xc_mute')==='1';
  let musicTimer=null, musicStep=0, musicMode=null;
  function ensure(){
    if(ctx) return;
    try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=ctx.createGain(); master.gain.value=muted?0:0.9; master.connect(ctx.destination);
    musicGain=ctx.createGain(); musicGain.gain.value=0.5; musicGain.connect(master);
    sfxGain=ctx.createGain(); sfxGain.gain.value=0.9; sfxGain.connect(master);
  }
  function now(){ return ctx?ctx.currentTime:0; }
  function tone(freq,t0,dur,type='sine',gain=0.2,dest=null,glideTo=null){
    if(!ctx) return;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,glideTo),t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(gain,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g); g.connect(dest||sfxGain); o.start(t0); o.stop(t0+dur+0.02);
  }
  function noise(t0,dur,gain=0.2,dest=null,hp=false){
    if(!ctx) return;
    const n=Math.floor(dur*ctx.sampleRate), buf=ctx.createBuffer(1,n,ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const g=ctx.createGain(); g.gain.value=gain;
    let node=src;
    if(hp){ const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1400; src.connect(f); node=f; }
    node.connect(g); g.connect(dest||sfxGain); src.start(t0);
  }
  const SFX = {
    hoof(){ if(!ctx)return; const t=now(); noise(t,0.05,0.11); tone(90,t,0.06,'sine',0.10); },
    jump(){ if(!ctx)return; const t=now(); tone(300,t,0.22,'sine',0.16,null,620); noise(t,0.12,0.06,null,true); },
    clean(){ if(!ctx)return; const t=now(); tone(660,t,0.12,'triangle',0.2); tone(990,t+0.07,0.14,'triangle',0.18); },
    rub(){ if(!ctx)return; const t=now(); tone(150,t,0.14,'square',0.14,null,90); noise(t,0.08,0.1); },
    splash(){ if(!ctx)return; const t=now(); noise(t,0.28,0.22,null,true); tone(240,t,0.2,'sine',0.08,null,120); },
    refuse(){ if(!ctx)return; const t=now(); tone(220,t,0.3,'sawtooth',0.16,null,110); tone(210,t+0.14,0.24,'sawtooth',0.13,null,100); },
    spook(){ if(!ctx)return; const t=now(); tone(880,t,0.12,'sine',0.14,null,1500); tone(760,t+0.06,0.1,'sine',0.1,null,1200); },
    fall(){ if(!ctx)return; const t=now(); noise(t,0.4,0.3); tone(140,t,0.4,'sawtooth',0.2,null,60); },
    bell(){ if(!ctx)return; const t=now(); tone(1320,t,0.5,'sine',0.2); tone(1760,t,0.5,'sine',0.12); },
    coin(){ if(!ctx)return; const t=now(); tone(880,t,0.08,'square',0.14); tone(1320,t+0.06,0.14,'square',0.14); },
    cheer(){ if(!ctx)return; const t=now(); for(let i=0;i<6;i++) noise(t+i*0.03,0.5,0.05,null,true); tone(520,t,0.3,'triangle',0.06); },
    fanfare(){ if(!ctx)return; const t=now(); [523,659,784,1047].forEach((f,i)=>tone(f,t+i*0.11,0.5,'triangle',0.18)); },
    whinny(){ if(!ctx)return; const t=now(); tone(700,t,0.16,'sawtooth',0.14,null,1100); tone(1100,t+0.1,0.2,'sawtooth',0.12,null,500); },
    click(){ if(!ctx)return; tone(440,now(),0.05,'square',0.1); },
  };
  // Music: two simple loops (menu pastoral, run gallop)
  const MENU_BASS=[0,0,7,7,5,5,3,3], MENU_MEL=[12,16,19,16, 14,17,12,10];
  const RUN_BASS=[0,7,0,7], RUN_MEL=[12,15,19,15];
  const SCALE=n=>220*Math.pow(2,n/12);
  function step(){
    if(!ctx||muted){ return; }
    const t=now()+0.02;
    if(musicMode==='menu'){
      const b=MENU_BASS[musicStep%8], m=MENU_MEL[musicStep%8];
      tone(SCALE(b-12),t,0.5,'sine',0.10,musicGain);
      tone(SCALE(m),t,0.42,'triangle',0.07,musicGain);
      if(musicStep%2===0) noise(t,0.03,0.02,musicGain,true);
    } else if(musicMode==='run'){
      const b=RUN_BASS[musicStep%4], m=RUN_MEL[musicStep%4];
      tone(SCALE(b-12),t,0.16,'sawtooth',0.06,musicGain);
      tone(SCALE(m),t,0.14,'square',0.045,musicGain);
    }
    musicStep++;
  }
  function startMusic(mode){
    ensure();
    if(musicMode===mode && musicTimer) return;
    stopMusic(); musicMode=mode; musicStep=0;
    const interval = mode==='menu'?300:210;
    musicTimer=setInterval(step, interval);
  }
  function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } musicMode=null; }
  function setMusicTempo(ms){ /* run tempo adaptivity via restart */ }
  function toggleMute(){
    muted=!muted; localStorage.setItem('xc_mute', muted?'1':'0');
    ensure(); if(master) master.gain.value=muted?0:0.9;
    return muted;
  }
  return {
    ensure, resume(){ ensure(); if(ctx&&ctx.state==='suspended') ctx.resume(); },
    play(name){ ensure(); if(SFX[name]) SFX[name](); },
    startMusic, stopMusic, toggleMute, isMuted(){ return muted; }
  };
})();

const DEFAULT = ()=>({
  rider:'', horse:null,      // horse = {base horse id, name, stats(current), fitness, mood}
  money:400, tack:[], eventIdx:0, career:[], bestPen:null, played:0,
});
let G = load();
function load(){
  try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s&&s.horse) return Object.assign(DEFAULT(),s); }catch(e){}
  return DEFAULT();
}
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(G)); }catch(e){} }
function hasSave(){ try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); return !!(s&&s.horse); }catch(e){ return false; } }

// effective stats = horse current stats + tack bonuses
function effStats(){
  const s=Object.assign({}, G.horse.stats);
  for(const id of G.tack){ const t=TACK.find(x=>x.id===id); if(t&&t.stat){ s[t.stat]=clamp((s[t.stat]||0)+t.amt,0,100); } }
  // fitness scales stamina in effect
  s.stamina = clamp(s.stamina*0.5 + G.horse.fitness*0.5, 0, 100);
  return s;
}
function hasTack(f){ return G.tack.some(id=>{ const t=TACK.find(x=>x.id===id); return t&&t.flag===f; }); }
function baseHorse(){ return STABLE.find(h=>h.id===G.horse.base); }

function titleAnim(){
  const c=$('#titlecv'); if(!c) return; const x=c.getContext('2d');
  let t=0, run=true;
  const horse=new HorseSprite();
  (function loop(){
    if(!$('#titlecv')){ run=false; return; } if(!run) return;
    const pr=(c.parentElement||c).getBoundingClientRect();
    c.width=pr.width||430; c.height=pr.height||660;   // keep buffer synced to layout
    t+=0.016; const W=c.width,H=c.height; x.clearRect(0,0,W,H);
    // sun
    x.fillStyle='rgba(255,244,214,.5)'; x.beginPath(); x.arc(W*0.78,H*0.18,34,0,7); x.fill();
    // rolling hills parallax — three bands sweeping across
    const bands=[['#5a8a54',0.52,26,14],['#4a7a44',0.64,34,26],['#3a6636',0.78,44,40]];
    bands.forEach(([col,base,amp,sp],i)=>{
      x.fillStyle=col; x.beginPath(); x.moveTo(0,H);
      for(let px=0;px<=W;px+=6){ const y=H*base - Math.sin(px*0.007 + t*sp*0.03 + i*1.3)*amp - Math.cos(px*0.002+i)*amp*0.4; x.lineTo(px,y); }
      x.lineTo(W,H); x.closePath(); x.fill();
    });
    // galloping silhouette along the lower hill
    const span=W+220, hx=((t*70)%span)-110, hy=H*0.80;
    x.save(); x.translate(hx,hy); x.scale(0.9,0.9); horse.draw(x,t*11,'#162812',true); x.restore();
    requestAnimationFrame(loop);
  })();
}

function makeCourse(ev){
  const going = pick(ev.goings||['good']);
  const weather = GOINGS[going].sky;
  const pool=ev.pool;
  const isTech=t=>{ const f=FENCE_TYPES[t]; return f.idealPace==='steady'||f.wet||f.accuracy||f.efforts>1; };
  const simple=pool.filter(t=>!isTech(t)), tech=pool.filter(t=>isTech(t));
  const anySimple=()=>simple.length?pick(simple):pick(pool);
  const anyTech=()=>tech.length?pick(tech):pick(pool);
  const tightBase=360 - ev.star*8, galBase=760 - ev.star*14;
  const fences=[]; let x=760;
  function add(type,gap){ x+=gap; const ft=FENCE_TYPES[type];
    fences.push({ type, x, done:false, refusals:0, spookRolled:false, efforts:ft.efforts, effortsDone:0, id:fences.length, name:null, complex:false, route:null }); }
  add('log',0); add(anySimple(), galBase);
  while(fences.length<ev.fences){
    const left=ev.fences-fences.length, roll=Math.random();
    if(roll<0.42 || tech.length===0){                    // galloping lane
      add(anySimple(), galBase+rnd(70,-50));
      if(left>3 && Math.random()<0.45) add(anySimple(), rnd(540,430));
    } else if(roll<0.76){                                 // technical cluster
      const n=Math.min(left, rint(2,3));
      add(anyTech(), tightBase+rnd(140,50));
      for(let k=1;k<n;k++) add(anyTech(), tightBase+rnd(40,-20));
    } else {                                              // combination "line"
      const n=Math.min(left, rint(2,3));
      add(anyTech(), tightBase+rnd(80,10));
      for(let k=1;k<n;k++) add(pick(pool), rnd(310,240));
    }
  }
  fences.length=Math.min(fences.length,ev.fences); fences.forEach((f,i)=>f.id=i);
  // undulating base terrain the ground/horse follow
  const hills=[]; for(let i=0,n=rint(2,3);i<n;i++) hills.push({ a:rnd(15,6), f:(2*Math.PI)/rnd(920,340), p:rnd(6.28,0) });
  const features=[];
  // inject the venue's SIGNATURE fences at spread-out positions & tag terrain
  const sig=ev.sig||[]; const F=fences.length; const used=new Set();
  sig.forEach((s,i)=>{
    let idx=Math.round((i+1)/(sig.length+1)*(F-3))+2; // avoid first 2 & last
    while(used.has(idx) && idx<F-1) idx++;
    used.add(idx); const f=fences[idx]; if(!f) return;
    f.type=s.type; f.name=s.name; f.complex=!!s.complex; f.fun=s.fun||null;
    f.efforts=FENCE_TYPES[s.type].efforts; f.effortsDone=0;
    if(s.terrain){ f.terrain=s.terrain;
      const w=s.terrain==='water'?150:110, amp=s.terrain==='bank'?30:s.terrain==='water'?20:26;
      features.push({ x:f.x, kind:s.terrain, w, amp }); }
  });
  // guarantee a clear galloping run-up before every route-choice complex so the
  // rider always has room to read it and commit to a line
  for(let i=1;i<fences.length;i++){ if(fences[i].complex){
    const gap=fences[i].x-fences[i-1].x, need=680;
    if(gap<need){ const shift=need-gap; for(let j=i;j<fences.length;j++) fences[j].x+=shift; }
  }}
  // (re)build terrain features from the fences' final positions
  features.length=0;
  fences.forEach(f=>{ if(f.terrain){ const w=f.terrain==='water'?150:110, amp=f.terrain==='bank'?30:f.terrain==='water'?20:26; features.push({ x:f.x, kind:f.terrain, w, amp }); } });
  const courseLen = fences[fences.length-1].x + 460;
  // optimum tied to the pixel course; a partial allowance for testing ground
  const optimum = courseLen/(238+ev.star*15) * (1 + (1-GOINGS[going].speed)*0.6);
  const scenery=[]; for(let sx=180; sx<courseLen-200; sx+=rint(150,360)) scenery.push({ x:sx, type:pick(['tree','tree','bush','bush','crowd']), s:rnd(1.25,0.7), far:Math.random()<0.5 });
  return { fences, courseLen, optimum, weather, going, ev, hills, features, scenery };
}
// terrain helpers — offset(worldPx) sums hill sines + local features (hollows,
// banks, drops, water). ground rises as the offset grows (screen y shrinks).
function bump(d,w){ return Math.exp(-(d*d)/(w*w)); }
function terrOff(R,wx){
  let o=0; if(R.hills) for(const h of R.hills) o+=h.a*Math.sin(wx*h.f+h.p);
  if(R.features) for(const f of R.features){ const d=wx-f.x;
    if(f.kind==='bank') o+=f.amp*bump(d,f.w);
    else if(f.kind==='drop') o+=f.amp*(0.5-0.5*Math.tanh(d/(f.w*0.5)));
    else o-=f.amp*bump(d,f.w); // hollow / water = dip
  }
  return o;
}
function slopeAt(R,wx){ return (terrOff(R,wx+8)-terrOff(R,wx-8))/16; }
function groundYAt(R,wx,base){ return base - terrOff(R,wx); }

  $('#bk').onclick=()=>{ G.money+=ev.fee; save(); scrYard(); }; // refund if backing out

//---------------------------------------------------------------
// HORSE SPRITE (canvas)
//---------------------------------------------------------------
const DEG=Math.PI/180;
function HorseSprite(){}
// draw a galloping horse + rider. origin = ground contact point, faces +x.
// jumpP: null while galloping, else 0..1 progress through the jump arc.
HorseSprite.prototype.draw=function(x,phase,silk,silhouette,jumpP){
  const sil=!!silhouette;
  const coat = sil?silk:'#7a5230', shade=sil?silk:'#5e3e23', belly=sil?silk:'#87613a';
  const mane = sil?silk:'#2f2010', hoof=sil?silk:'#20140a';
  const tuck = jumpP==null?0:Math.sin(clamp(jumpP,0,1)*Math.PI); // 0→1→0 over the arc
  const bob = jumpP==null ? Math.sin(phase*2)*1.3 : 0;            // gait body bounce
  x.save(); x.translate(0,bob);

  // ---- articulated leg: anchor, seg lengths, upper/lower angles (deg from vertical), widths
  function leg(ax,ay,L1,L2,upA,loA,w1,w2){
    const u=upA*DEG, l=loA*DEG;
    const kx=ax+Math.sin(u)*L1, ky=ay+Math.cos(u)*L1;
    const hx=kx+Math.sin(l)*L2, hy=ky+Math.cos(l)*L2;
    x.strokeStyle=shade; x.lineCap='round';
    x.lineWidth=w1; x.beginPath(); x.moveTo(ax,ay); x.lineTo(kx,ky); x.stroke();
    x.lineWidth=w2; x.beginPath(); x.moveTo(kx,ky); x.lineTo(hx,hy); x.stroke();
    x.fillStyle=hoof; x.beginPath(); x.ellipse(hx,hy,w2*0.75,w2*0.6,l,0,7); x.fill();
  }
  const sN=Math.sin(phase), s2=Math.sin(phase+Math.PI);   // lead / trailing pair
  const L=(a,b)=>a+(b-a)*tuck;                              // lerp toward jump pose

  // ---- HIND legs (behind body) : hip ~ (-20,-34)
  // gallop: push back then gather; jump: extended back then tucked up
  (function(){
    const hipx=-20, hipy=-34;
    // near hind (lead)
    leg(hipx-3,hipy, 15,15, L(-14+26*sN, -46+18*tuck), L(-14+26*sN+ (34+18*Math.max(0,sN)), -78+40*tuck), 8,5.5);
    // far hind (trailing)
    leg(hipx+2,hipy, 15,15, L(-14+26*s2, -40+18*tuck), L(-14+26*s2+ (34+18*Math.max(0,s2)), -70+40*tuck), 7,5);
  })();

  // ---- TAIL (flows behind)
  x.strokeStyle=mane; x.lineCap='round'; x.lineWidth=7;
  const tSwing=jumpP==null?Math.sin(phase*2)*5:14*tuck+8;
  x.beginPath(); x.moveTo(-30,-40);
  x.quadraticCurveTo(-46,-34+tSwing*0.4, -50,-14+tSwing);
  x.quadraticCurveTo(-51,-6+tSwing, -46,-2+tSwing); x.stroke();

  // ---- BODY (barrel + haunch + chest)
  x.fillStyle=coat;
  x.beginPath(); x.ellipse(-2,-36,32,17,0,0,7); x.fill();      // barrel
  x.beginPath(); x.ellipse(-20,-36,15,17,0,0,7); x.fill();     // haunch
  x.beginPath(); x.ellipse(20,-38,15,15,0,0,7); x.fill();      // shoulder/chest
  x.fillStyle=belly; x.beginPath(); x.ellipse(-2,-30,28,9,0,0,7); x.fill(); // belly highlight

  // ---- NECK + HEAD (angle lifts a touch on take-off)
  const headLift=tuck*6;
  x.fillStyle=coat; x.beginPath();
  x.moveTo(26,-46);
  x.quadraticCurveTo(40,-58-headLift, 47,-56-headLift);          // crest
  x.quadraticCurveTo(56,-54-headLift, 57,-46-headLift);          // poll→face
  x.lineTo(60,-40-headLift);                                     // muzzle top
  x.quadraticCurveTo(58,-36-headLift, 53,-37-headLift);          // muzzle underside
  x.quadraticCurveTo(46,-40-headLift, 40,-42);                   // throat
  x.quadraticCurveTo(30,-42, 26,-38); x.closePath(); x.fill();
  // ear
  x.fillStyle=shade; x.beginPath(); x.moveTo(47,-56-headLift); x.lineTo(48,-64-headLift); x.lineTo(52,-55-headLift); x.closePath(); x.fill();
  // mane along the crest
  x.strokeStyle=mane; x.lineWidth=3;
  for(let i=0;i<7;i++){ const t=i/6; const mx=28+ (47-28)*t, my=-46 + (-56-headLift+46)*t;
    x.beginPath(); x.moveTo(mx,my); x.lineTo(mx-3-2*Math.sin(phase*3+i),my+7); x.stroke(); }
  if(!sil){ x.fillStyle='#160d05'; x.beginPath(); x.arc(52,-49-headLift,1.6,0,7); x.fill(); } // eye

  // ---- FRONT legs (in front of body) : shoulder ~ (20,-34)
  (function(){
    const shx=20, shy=-34;
    // near fore (lead) : reaches forward in gallop; tucks up in jump
    leg(shx+2,shy, 15,15, L(10+30*s2, 42-10*tuck), L(10+30*s2-(30+16*Math.max(0,-s2)), 42-120*tuck), 8,5.5);
    // far fore
    leg(shx-3,shy, 15,15, L(10+30*sN, 36-10*tuck), L(10+30*sN-(30+16*Math.max(0,-sN)), 36-118*tuck), 7,5);
  })();

  // ---- RIDER (two-point / jumping seat; folds deeper over the fence)
  const silkC = sil?silk:(silk||'#3f7ac0');
  const fold=tuck; // extra forward fold during jump
  // anchor points
  const hipX=2-fold*2, hipY=-48;
  const shX=12+fold*4, shY=-58+fold*3;      // shoulders fold down & forward on jump
  const handX=30+fold*3, handY=-45-headLift; // hands follow the horse's mouth
  const kneeX=9, kneeY=-40, heelX=4, heelY=-29;
  // upper leg + boot (heel down)
  x.strokeStyle='#2b2b30'; x.lineCap='round'; x.lineWidth=6;
  x.beginPath(); x.moveTo(hipX,hipY); x.lineTo(kneeX,kneeY); x.lineTo(heelX,heelY); x.stroke();
  x.fillStyle='#15151a'; x.beginPath(); x.ellipse(heelX-1,heelY+1,4,3,0,0,7); x.fill(); // boot
  // torso (silks)
  x.strokeStyle=silkC; x.lineWidth=11; x.lineCap='round';
  x.beginPath(); x.moveTo(hipX,hipY); x.lineTo(shX,shY); x.stroke();
  // arm to rein contact
  x.lineWidth=5; x.beginPath(); x.moveTo(shX,shY); x.quadraticCurveTo((shX+handX)/2,shY+2,handX,handY); x.stroke();
  // rein line to bit
  x.strokeStyle=sil?silk:'#20140a'; x.lineWidth=1.5; x.beginPath(); x.moveTo(handX,handY); x.lineTo(59,-40-headLift); x.stroke();
  // head + helmet
  x.fillStyle=sil?silk:'#e6c9a4'; x.beginPath(); x.arc(shX+4,shY-6,4.6,0,7); x.fill();
  x.fillStyle=sil?silk:'#26262c'; x.beginPath(); x.arc(shX+4,shY-8,5.4,Math.PI*0.9,Math.PI*2.1); x.fill();
  x.fillStyle=sil?silk:'#26262c'; x.fillRect(shX+7,shY-9,4,2); // peak
  x.restore();
};

  }
  pace.onclick=leftBtn; jumpB.onclick=rightBtn;
  const key=e=>{ if(e.repeat)return;
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='ArrowRight'){ e.preventDefault(); rightBtn(); }
    else if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='ArrowDown'||e.code==='ArrowLeft'){ e.preventDefault(); leftBtn(); } };
  window.addEventListener('keydown',key);
  $('#quitrun').onclick=(e)=>{ e.preventDefault(); if(confirm('Retire on course? Counts as elimination.')){ cleanup(); G.horse.mood=clamp(G.horse.mood-6,0,100); save(); scrYard(); } };
  function cleanup(){ window.removeEventListener('keydown',key); window.removeEventListener('resize',resize); cv.style.display='none'; APP.style.background=''; Audio_.startMusic('menu'); RUN=null; }
  R._cleanup=cleanup;

  let last=performance.now();
  (function loop(t){
    if(!RUN) return;
    let dt=(t-last)/1000; last=t; if(dt>0.05)dt=0.05;
    update(R,dt); render(cx,cv,R,horse);
    if(R.finished){ setTimeout(()=>{ cleanup(); scrResults(R); }, 700); return; }
    requestAnimationFrame(loop);
  })(last);
}

// core physics
function update(R,dt){
  if(R.state==='done'){ R.finished=true; return; }
  R.elapsed+=dt;
  // pace easing
  R.pace += (R.targetPace-R.pace)*Math.min(1,dt*3.2);
  // quirks affecting pace
  if(R.bh.quirk==='racehorse' && R.state==='run'){ R.targetPace=Math.min(R.gallopPace, R.targetPace+dt*0.02); }
  if(R.bh.quirk==='bombproof'){ R.gallopPace=Math.min(R.gallopPace,0.58+R.es.gallop/520); }
  // THE GOING: on soft/heavy ground the horse instinctively quickens — you must
  // steady it — and every stride costs more; firm ground is fast but jars.
  if(R.gd.rush>0 && R.state==='run'){ R.targetPace=Math.min(R.gallopPace, R.targetPace + dt*0.05*R.gd.rush); }
  // stamina — fitness/stamina stat is the main lever (higher stat => far less drain)
  const drain=Math.max(0.08,(R.pace>0.5?0.82:0.38)*(1 - R.es.stamina/165))*R.gd.drain;
  if(R.state==='run'||R.state==='approach') R.stamina=clamp(R.stamina - drain*dt*3.2, 0, 100);
  const tired = R.stamina<28 ? (0.6+R.stamina/70) : 1; // <1 when tired
  // speed
  let base = 250 + R.pace*360;
  base *= (0.82 + R.es.gallop/300) * tired * R.gd.speed;
  // carry momentum THROUGH the fence — a horse keeps its gallop rhythm over a
  // jump. Only a slight dip at the apex; a rub scrubs a bit more speed.
  if(R.jumping){
    const p=R.jumping.t/R.jumping.dur;
    const drag=R.jumping.result==='rub'?0.80:0.97;
    base *= drag*(1 - 0.10*Math.sin(p*Math.PI));
  }
  // terrain slope: uphill saps a little speed, downhill adds a little
  if(R.hills){ base *= clamp(1 - slopeAt(R,R.horseX)*0.9, 0.8, 1.15); }
  if(R.state==='refuse') base=0;
  R.speedPx = base;
  R.horseX += base*dt; R.dist += base*dt;
  R.wobble = R.stamina<30 ? Math.sin(R.elapsed*20)*(30-R.stamina)*0.08 : 0;

  // hoofbeats tied to pace
  R.lastHoof-=dt; if(R.lastHoof<=0 && !R.jumping && R.state!=='refuse'){ Audio_.play('hoof'); R.lastHoof=0.34 - R.pace*0.18; }

  // jump arc
  if(R.jumping){ R.jumping.t+=dt;
    if(R.jumping.t>=R.jumping.dur){ landJump(R); } }

  // refusal recovery
  if(R.state==='refuse'){ R.refuseT-=dt; if(R.refuseT<=0){ R.state='run'; } }

  // minute markers (immersion) — call the minute as it ticks over
  const m=Math.floor(R.elapsed/60); if(m>R.minute){ R.minute=m; if(!R.finished && !R.deciding) toast(R, `⏱️ ${m} minute${m>1?'s':''} — ${R.elapsed<R.optimum?'on your minute!':'a touch behind…'}`); }

  // approach detection / route decision / spook
  const nf=R.fences[R.nextIdx];
  if(nf && R.state==='run' && !R.jumping){
    const d=nf.x - R.horseX;
    // route choice at a signature complex — offer it early, lock in near the fence
    if(nf.complex && !nf.route){
      if(d<540 && d>150){ if(R.deciding!==nf){ R.deciding=nf; setDecideBtns(R); } }
      else if(d<=150){ chooseRoute(R,'long', true); } // default to the safe line
    }
    if(d<300 && d>0 && !nf.spookRolled){ nf.spookRolled=true; rollSpook(R,nf); }
    if(d<=0 && !nf.done){ refuse(R,nf,'ran past the takeoff'); }
  }
  // finish
  if(R.dist>=R.len && !R.jumping){ finishRun(R); }
  // HUD
  hud(R);
}

// route choice at a complex: DIRECT is bold/fast/unforgiving; LONG is safe/slow
function chooseRoute(R, kind, auto){
  const nf=R.deciding || (R.fences[R.nextIdx] && R.fences[R.nextIdx].complex ? R.fences[R.nextIdx] : null);
  if(!nf || nf.route) { R.deciding=null; return; }
  nf.route=kind; R.deciding=null;
  restoreBtns(R);
  if(kind==='direct'){ Audio_.play('click'); toast(R, `➡️ Direct route at ${nf.name||'the complex'} — kick on!`); }
  else { Audio_.play('click'); toast(R, `↩️ Long route at ${nf.name||'the complex'} — safe & steady.`);
    if(!auto) R.targetPace=0.42; R.longPending=nf; }
}
function restoreBtns(R){ if(!R._btn)return; const g=R.targetPace>0.5;
  R._btn.pace.textContent=g?'🐇 GALLOP':'🐢 STEADY'; R._btn.pace.classList.toggle('gallop',g); R._btn.pace.classList.remove('route');
  R._btn.jumpB.textContent='JUMP ⤴'; R._btn.jumpB.classList.remove('route'); }
function setDecideBtns(R){ if(!R._btn)return;
  R._btn.pace.textContent='↩️ LONG'; R._btn.pace.classList.add('route'); R._btn.pace.classList.remove('gallop');
  R._btn.jumpB.textContent='➡️ DIRECT'; R._btn.jumpB.classList.add('route'); }

function rollSpook(R,nf){
  const ft=FENCE_TYPES[nf.type];
  if(ft.spook<=0.03) return;
  if(R.bh.quirk==='bombproof') return;
  let chance=ft.spook*(1 - R.es.boldness/140);
  if(R.targetPace>0.5) chance*=1.35;              // galloping into scary fence = worse
  if(R.bh.quirk==='diva' && ft.wet) chance+=0.22;  // diva hates water
  if(hasTack('vest')) chance*=0.9;
  chance*=(1.1 - G.horse.mood/300);
  if(Math.random()<chance){ nf.willSpook=true;
    Audio_.play('spook'); toast(R, spookLine(R,nf)); }
}
function spookLine(R,nf){
  const nm=San(G.horse.name); const ft=FENCE_TYPES[nf.type];
  const lines=[`${nm} eyes the ${ft.label.toLowerCase()}…`,`Uh oh — ${nm} isn't sure about this one`,`${nm} has SEEN something`,`A wobble on the approach!`];
  if(ft.wet) return pick([`${nm} does NOT want wet socks`,`${nm} eyes the water suspiciously…`,`"It's just a puddle," you lie to ${nm}`]);
  if(R.bh.quirk==='diva') return `${nm} would like a word with her agent`;
  return pick(lines);
}

function tryJump(R){
  if(R.state==='refuse'||R.jumping||R.finished) return;
  const nf=R.fences[R.nextIdx]; if(!nf){ return; }
  const ft=FENCE_TYPES[nf.type];
  const d=nf.x - R.horseX;           // distance to fence face
  if(d>240){ return; }                // too early, ignore (no penalty for eager tap far out)
  // takeoff window scales with the governing stat, pace and stamina
  const statVal=R.es[ft.stat]||60;
  const paceOk = ft.idealPace==='any' ? 1 : (ft.idealPace==='steady'? (R.pace<0.5?1:0.6) : (R.pace>0.5?1:0.85));
  const stamF = R.stamina<30?0.7:1;
  // route modifier: DIRECT is unforgiving (tighter window); LONG is generous
  const routeW = nf.route==='direct' ? 0.82 : nf.route==='long' ? 1.7 : 1;
  let cleanHalf = 46*ft.window*routeW*(0.7+statVal/220)*paceOk*stamF;
  let okHalf = cleanHalf*1.9;
  const ideal = 118*(0.8+R.pace*0.5);   // ideal distance-out for takeoff
  const err=Math.abs(d-ideal);
  // long route neutralises spooks; direct/none can still balk
  if(nf.route!=='long' && nf.willSpook && !(R.pace<0.5 && err<okHalf)){ refuse(R,nf,'spooked'); nf.willSpook=false; return; }
  nf.willSpook=false;
  let result;
  if(err<=cleanHalf) result='clean';
  else if(err<=okHalf) result='rub';
  else if(d<ideal*0.5) result='rub';      // very late but still leaves the ground = ugly but clears
  else { refuse(R,nf,'wrong distance'); return; }
  // water at gallop = splash penalty (still clears)
  const splash = ft.wet && R.pace>0.5;
  // slip on landing — worse on soft/heavy going, at drops/water/turns; studs help
  const slip = Math.random() < R.slipChance*((ft.jolt||ft.wet)?1.4:0.7);
  Audio_.play('jump');
  R.jumping={ t:0, dur: ft.efforts>1?0.72:0.56, fromX:R.horseX, type:nf.type, result, fence:nf, splash, slip, ft };
  R.state='run';
}

function landJump(R){
  const j=R.jumping; const nf=j.fence; const ft=j.ft;
  R.jumping=null;
  nf.effortsDone++;
  if(nf.effortsDone<ft.efforts){
    // combination: line up next effort quickly (auto-continue, small window)
    R.jumping={ t:0, dur:0.5, fromX:R.horseX, type:nf.type, result:j.result, fence:nf, ft, combo:true };
    return;
  }
  nf.done=true; R.nextIdx++;
  // stamina cost per fence — firm ground jars more; a rub costs a little extra
  R.stamina=clamp(R.stamina - ((ft.jolt?3:1.5)*R.gd.jar) - (j.result==='rub'?1:0), 0, 100);
  // long route costs time but keeps you safe; direct route saves it
  if(nf.route==='long'){ addTime(R, 4.5 + nf.efforts*1.2); }
  if(j.result==='clean'){
    if(j.splash){ Audio_.play('splash'); addTime(R,1.2); toast(R,'💦 Big splash — through the water!'); }
    else { Audio_.play('clean'); if(nf.name) toast(R, `✅ Clear at ${nf.name}!`); else if(Math.random()<0.25) toast(R, cleanLine(R,ft)); }
  } else { // rub
    Audio_.play('rub'); addTime(R,0.8); if(Math.random()<0.5) toast(R,'😬 A rub — that stays up, just.'); }
  if(j.slip){ Audio_.play('splash'); addTime(R,1.2); toast(R, hasTack('grip')?'🩹 A slither on landing!':'🩹 Slips on the going! (studs would help)'); }
  hud(R);
}
function cleanLine(R,ft){
  const nm=San(G.horse.name);
  const g=[`Foot-perfect over the ${ft.label.toLowerCase()}! 👏`,`${nm} pings it! `,`Clean and clear!`,`Textbook.`,`${nm} makes it look easy`];
  if(R.bh.quirk==='sendit') g.push(`${nm} SENDS it 🔥`);
  return pick(g);
}

function refuse(R,nf,reason){
  if(nf.done) return;
  nf.refusals++;
  Audio_.play('refuse');
  if(nf.refusals>=3){ // elimination -> treat as fall/end
    R.penalties+=40; toast(R,`🚫 Third refusal — eliminated at fence ${nf.id+1}.`);
    fallOut(R); return;
  }
  const pen = nf.refusals===1?20:40;
  R.penalties+=pen; R.jumpPen+=pen;
  R.state='refuse'; R.refuseT=0.9;
  // bounce the horse back a touch to re-present
  R.horseX = nf.x - 175 - rnd(20,0);
  addTime(R,3.0);
  const nm=San(G.horse.name);
  toast(R, pick([`🛑 Run-out! ${pen} penalties.`,`${nm} says "no thank you" — ${pen} pen.`,`Ducked out! ${pen} penalties.`,`Slammed on the brakes — ${pen}.`]));
  // re-arm spook off for the retry
  nf.willSpook=false;
  hud(R);
}
function fallOut(R){
  Audio_.play('fall');
  const vest=hasTack('vest');
  R.fell=true; R.state='done';
  toast(R, vest?'🦺 Air vest deploys — WHUMP! You walk away.':'💥 A fall! You walk away, dusty and wiser.');
  G.horse.mood=clamp(G.horse.mood-10,0,100);
}
function addTime(R,sec){ R.elapsed+=sec; }

function finishRun(R){
  if(R.state==='done') return;
  R.state='done';
  // time penalties: 0.4 per second over optimum
  const over=Math.max(0,R.elapsed-R.optimum);
  R.timePen=Math.round(over*0.4*10)/10;
  R.penalties=Math.round((R.penalties+R.timePen)*10)/10;
  Audio_.play('bell'); Audio_.play('cheer');
}

function hud(R){
  const T=$('#h-time'); if(!T) return;
  T.textContent=fmtTime(R.elapsed);
  T.style.color = R.elapsed>R.optimum ? 'var(--red)' : 'var(--ink)';
  $('#h-fence').textContent=`${Math.min(R.nextIdx+1,R.fences.length)}/${R.fences.length}`;
  $('#h-pen').textContent=Math.round(R.penalties + Math.max(0,R.elapsed-R.optimum)*0.4);
  const sb=$('#stambar'); if(sb) sb.firstElementChild.style.width=R.stamina+'%';
  const dc=$('#decide'); if(dc){ if(R.deciding){ dc.classList.add('show'); dc.firstElementChild.textContent=R.deciding.name||'Complex'; } else dc.classList.remove('show'); }
}
let _toastT=null;
function toast(R,msg){ const el=$('#toast'); if(!el)return; el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('show'),1600); }

//---------------------------------------------------------------
// RENDER
//---------------------------------------------------------------
function render(cx,cv,R,horse){
  const W=cv.width,H=cv.height;
  R.camX = R.horseX - W*0.28;
  const ground=H*0.72;
  // sky
  const wx=R.course.weather;
  const sky=cx.createLinearGradient(0,0,0,ground);
  if(wx==='rain'||wx==='mud'){ sky.addColorStop(0,'#5a6470'); sky.addColorStop(1,'#8a94a0'); }
  else if(wx==='overcast'){ sky.addColorStop(0,'#7a90a4'); sky.addColorStop(1,'#aebcc6'); }
  else { sky.addColorStop(0,'#5fa0d6'); sky.addColorStop(1,'#cfe6f2'); }
  cx.fillStyle=sky; cx.fillRect(0,0,W,ground);
  // sun/clouds
  if(wx==='sunny'){ cx.fillStyle='rgba(255,246,214,.85)'; cx.beginPath(); cx.arc(W*0.8,H*0.16,30,0,7); cx.fill(); }
  // parallax hills
  hills(cx,W,ground,R.camX*0.2,'#8bbf76',-0.12,H);
  hills(cx,W,ground,R.camX*0.4,'#6ba35a',-0.05,H);
  // far scenery (behind ground line, drawn at half parallax)
  drawScenery(cx,R,ground,W,true);
  // ground — follows the undulating terrain
  const gcol = wx==='mud'?'#6f5a35':'#6a9a4c', gedge= wx==='mud'?'#5a4a2c':'#5a8640';
  cx.fillStyle=gcol; cx.beginPath(); cx.moveTo(0,H);
  for(let px=0;px<=W;px+=8){ cx.lineTo(px, groundYAt(R,R.camX+px,ground)); }
  cx.lineTo(W,H); cx.closePath(); cx.fill();
  // grassy top edge
  cx.strokeStyle=gedge; cx.lineWidth=4; cx.beginPath();
  for(let px=0;px<=W;px+=8){ const y=groundYAt(R,R.camX+px,ground); if(px===0)cx.moveTo(px,y);else cx.lineTo(px,y); } cx.stroke();
  // water pools in the terrain dips
  drawWaterFeatures(cx,R,ground,W);
  // near scenery (on the ground)
  drawScenery(cx,R,ground,W,false);
  // start/finish flags
  drawPost(cx, worldX(R,0)+40, groundYAt(R,0,ground), 'START');
  drawPost(cx, worldX(R,R.len-380), groundYAt(R,R.len-380,ground), 'FINISH');
  // course line markers (distance ticks)
  cx.strokeStyle='rgba(255,255,255,.12)'; cx.lineWidth=2;
  for(let mx=0; mx<R.len; mx+=260){ const sx=worldX(R,mx); if(sx>-20&&sx<W+20){ const gy=groundYAt(R,mx,ground); cx.beginPath(); cx.moveTo(sx,gy); cx.lineTo(sx,gy+7); cx.stroke(); } }

  // fences + takeoff patches
  R.fences.forEach((f,i)=>{
    const sx=worldX(R,f.x); if(sx<-140||sx>W+140) return;
    const gy=groundYAt(R,f.x,ground);
    if(!f.done && i===R.nextIdx){ drawTakeoff(cx,R,f,ground); }
    drawFence(cx, sx, gy, f, R);
    if(!f.done){ cx.textAlign='center';
      cx.fillStyle='rgba(0,0,0,.5)'; cx.font='bold 11px Baloo 2, sans-serif'; cx.fillText((i+1), sx, gy-58);
      if(f.name){ // signature fence: name plate + optional fun emoji
        cx.font='bold 12px "Cinzel", serif'; const tw=cx.measureText(f.name).width+14;
        cx.fillStyle='rgba(8,14,10,.7)'; roundRect(cx, sx-tw/2, gy-92, tw, 18, 6); cx.fill();
        cx.fillStyle=f.complex?'#e3b53f':'#ece3d0'; cx.fillText(f.name, sx, gy-79);
        if(f.fun){ cx.font='16px serif'; cx.fillText(f.fun, sx, gy-98); }
      }
    }
  });

  // horse
  cx.save();
  let hbase=groundYAt(R,R.horseX,ground);
  let hy=hbase + (R.wobble||0);
  let hx=worldX(R,R.horseX);
  let jP=null;
  if(R.jumping){ const p=R.jumping.t/R.jumping.dur; jP=p; const arc=Math.sin(p*Math.PI);
    hy -= arc*72*(FENCE_TYPES[R.jumping.type].efforts>1?1.08:1);
    if(FENCE_TYPES[R.jumping.type].jolt && p>0.62) hy += (p-0.62)*46; // drop fence: lower landing
    cx.translate(hx,hy); cx.rotate((0.5-p)*0.34*(R.jumping.result==='clean'?1:0.7));
  } else {
    // subtle body pitch following the slope of the ground
    cx.translate(hx,hy); cx.rotate(clamp(slopeAt(R,R.horseX),-0.25,0.25));
  }
  const gallSpeed = R.state==='refuse'?0:(8+R.pace*22);
  R.phase += 0.016*gallSpeed;
  horse.draw(cx, R.phase, R.silk, false, jP);
  cx.restore();

  // dust kicked up at the hooves
  if(R.speedPx>220 && !R.jumping && R.state!=='refuse'){
    cx.fillStyle='rgba(180,160,120,.26)';
    for(let k=0;k<3;k++){ const dx=hx-26-k*13-Math.random()*10, dy=hbase-3-Math.random()*7;
      cx.beginPath(); cx.arc(dx,dy,4+Math.random()*4,0,7); cx.fill(); }
  }
  // rain
  if(wx==='rain'){ cx.strokeStyle='rgba(200,220,235,.35)'; cx.lineWidth=1.5;
    for(let k=0;k<60;k++){ const rx=(k*53 + (R.elapsed*600))%W, ry=(k*37+(R.elapsed*900))%ground;
      cx.beginPath(); cx.moveTo(rx,ry); cx.lineTo(rx-4,ry+10); cx.stroke(); } }
}
function worldX(R,wx){ return wx - R.camX; }
function roundRect(cx,x,y,w,h,r){ cx.beginPath(); cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r); cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath(); }
// water pools that sit in the terrain dips at 'water' feature complexes
function drawWaterFeatures(cx,R,ground,W){
  if(!R.features) return;
  for(const f of R.features){ if(f.kind!=='water') continue;
    const sx=worldX(R,f.x); if(sx<-220||sx>W+220) continue;
    const gy=groundYAt(R,f.x,ground), half=f.w*0.9;
    cx.fillStyle='#4f97bd'; cx.beginPath(); cx.ellipse(sx,gy+3,half,14,0,0,7); cx.fill();
    cx.strokeStyle='rgba(255,255,255,.35)'; cx.lineWidth=2;
    for(let i=-3;i<=3;i++){ const yy=gy+i*2.4+((R.elapsed*24)%5); cx.beginPath(); cx.moveTo(sx-half*0.7,yy); cx.lineTo(sx+half*0.7,yy); cx.stroke(); }
  }
}
function hills(cx,W,ground,off,col,tilt,H){
  cx.fillStyle=col; cx.beginPath(); cx.moveTo(0,ground);
  for(let px=0;px<=W;px+=10){ const wx=px+off; const y=ground-70 - Math.sin(wx*0.004)*40 - Math.cos(wx*0.0015)*30; cx.lineTo(px,y); }
  cx.lineTo(W,ground); cx.closePath(); cx.fill();
}
function drawPost(cx,sx,ground,label){
  if(sx<-40||sx>cx.canvas.width+40) return;
  cx.strokeStyle='#e8e0d0'; cx.lineWidth=3; cx.beginPath(); cx.moveTo(sx,ground); cx.lineTo(sx,ground-60); cx.stroke();
  cx.fillStyle=label==='FINISH'?'#d0563f':'#5fae5a'; cx.fillRect(sx,ground-60,26,14);
  cx.fillStyle='#fff'; cx.font='bold 8px Baloo 2'; cx.textAlign='left'; cx.fillText(label,sx+2,ground-50);
}
function drawTakeoff(cx,R,f,ground){
  const ft=FENCE_TYPES[f.type]; const statVal=R.es[ft.stat]||60;
  const paceOk = ft.idealPace==='any'?1:(ft.idealPace==='steady'?(R.pace<0.5?1:0.6):(R.pace>0.5?1:0.85));
  const stamF=R.stamina<30?0.7:1;
  const cleanHalf=46*ft.window*(0.7+statVal/220)*paceOk*stamF;
  const okHalf=cleanHalf*1.9;
  const ideal=118*(0.8+R.pace*0.5);
  const cx0=worldX(R, f.x-ideal);
  const gy=groundYAt(R, f.x-ideal, ground);
  // yellow band
  cx.fillStyle='rgba(227,181,63,.28)'; cx.fillRect(cx0-okHalf, gy-3, okHalf*2, 8);
  // green band
  cx.fillStyle='rgba(95,174,90,.55)'; cx.fillRect(cx0-cleanHalf, gy-3, cleanHalf*2, 8);
  cx.strokeStyle='rgba(95,174,90,.85)'; cx.lineWidth=2; cx.strokeRect(cx0-cleanHalf, gy-3, cleanHalf*2,8);
}
// roadside scenery — trees, bushes, crowd clusters, at their terrain height
function drawScenery(cx,R,ground,W,far){
  if(!R.scenery) return;
  const par = far?0.55:1;            // far objects drift slower (parallax)
  for(const o of R.scenery){
    if(o.far!==far) continue;
    const sx = (o.x - R.camX*par) ; if(sx<-80||sx>W+80) continue;
    const gy = groundYAt(R, o.x, ground) + (far?-6:0);
    const s=o.s*(far?0.7:1);
    cx.save(); cx.translate(sx,gy); cx.scale(s,s); cx.globalAlpha=far?0.7:1;
    if(o.type==='tree'){
      cx.fillStyle=far?'#3f6b46':'#5a3c22'; cx.fillRect(-3,-28,6,28);
      cx.fillStyle=far?'#4f7e52':'#4e7a3c'; cx.beginPath(); cx.arc(0,-34,15,0,7); cx.arc(-9,-26,11,0,7); cx.arc(9,-26,11,0,7); cx.fill();
    } else if(o.type==='bush'){
      cx.fillStyle=far?'#4a744a':'#517a38'; cx.beginPath(); cx.arc(0,-6,9,0,7); cx.arc(-8,-3,7,0,7); cx.arc(8,-3,7,0,7); cx.fill();
    } else { // crowd cluster
      const cols=['#d0563f','#4f86c0','#e3b53f','#e8e0d0','#7aa35a','#b46fb0'];
      for(let i=0;i<7;i++){ cx.fillStyle=cols[i%cols.length]; const px=-16+i*5+(i%2?1:-1)*2, py=-6-(i%3)*3;
        cx.beginPath(); cx.arc(px,py,3,0,7); cx.fill(); cx.fillStyle='#2c2016'; cx.beginPath(); cx.arc(px,py-3,2,0,7); cx.fill(); }
    }
    cx.restore();
  }
}
function drawFence(cx,sx,ground,f,R){
  const ft=FENCE_TYPES[f.type]; const done=f.done;
  cx.save(); cx.translate(sx,ground); cx.globalAlpha=done?0.4:1;
  const brown='#6e4a2a', dk='#4f3620', wood='#8a5f34';
  // red/white flags (right=red)
  const flag=(fx,red)=>{ cx.fillStyle=red?'#c9463a':'#f4efe6'; cx.fillRect(fx,-40,4,40); cx.fillStyle=red?'#c9463a':'#e8e0d0'; cx.beginPath(); cx.moveTo(fx+4,-40); cx.lineTo(fx+16,-35); cx.lineTo(fx+4,-30); cx.fill(); };
  switch(ft.glyph){
    case 'log': cx.fillStyle=wood; cx.fillRect(-26,-22,52,18); cx.fillStyle=dk; cx.beginPath(); cx.arc(26,-13,9,0,7); cx.fill(); break;
    case 'brush': cx.fillStyle=wood; cx.fillRect(-24,-14,48,12); cx.fillStyle='#4f6b34'; for(let i=-24;i<24;i+=6){ cx.beginPath(); cx.moveTo(i,-14); cx.lineTo(i+3,-40); cx.lineTo(i+6,-14); cx.fill(); } break;
    case 'table': cx.fillStyle=brown; cx.fillRect(-30,-30,60,26); cx.fillStyle=wood; cx.fillRect(-32,-32,64,6); break;
    case 'rolltop': cx.fillStyle=wood; cx.beginPath(); cx.moveTo(-28,-2); cx.lineTo(-28,-18); cx.quadraticCurveTo(0,-34,28,-18); cx.lineTo(28,-2); cx.closePath(); cx.fill(); cx.fillStyle='rgba(255,255,255,.12)'; cx.fillRect(-28,-20,56,4); break;
    case 'water': cx.fillStyle='#5fa8c8'; cx.fillRect(-40,-6,80,10); cx.fillStyle='rgba(255,255,255,.4)'; for(let i=-36;i<40;i+=14){ cx.fillRect(i+(R.elapsed*20%14),-3,6,2);} break;
    case 'ditch': cx.fillStyle='#2c2116'; cx.fillRect(-24,-4,48,10); cx.fillStyle=wood; cx.fillRect(-26,-8,52,5); break;
    case 'trak': cx.fillStyle='#2c2116'; cx.fillRect(-24,-4,48,8); cx.fillStyle=wood; cx.save(); cx.rotate(-0.12); cx.fillRect(-28,-26,56,8); cx.restore(); break;
    case 'coffin': cx.fillStyle=wood; cx.fillRect(-34,-20,7,18); cx.fillRect(28,-20,7,18); cx.fillStyle='#2c2116'; cx.fillRect(-14,-4,28,8); break;
    case 'corner': cx.fillStyle=brown; cx.beginPath(); cx.moveTo(-28,-4); cx.lineTo(26,-4); cx.lineTo(26,-26); cx.closePath(); cx.fill(); break;
    case 'skinny': cx.fillStyle=wood; cx.fillRect(-9,-30,18,26); cx.fillStyle=dk; cx.fillRect(-9,-30,18,5); break;
    case 'bank': cx.fillStyle='#6a5236'; cx.fillRect(-30,-24,60,22); cx.fillStyle='#7a9a4c'; cx.fillRect(-30,-26,60,5); break;
    case 'drop': cx.fillStyle=wood; cx.fillRect(-26,-24,52,10); cx.fillStyle='#5a7a3c'; cx.fillRect(-26,-14,52,6); break;
    case 'bounce': cx.fillStyle=wood; cx.fillRect(-30,-22,10,18); cx.fillRect(18,-22,10,18); break;
    default: cx.fillStyle=wood; cx.fillRect(-24,-22,48,18);
  }
  if(!done){ flag(-34,false); flag(30,true); }
  cx.restore();
}

//---------------------------------------------------------------
// RESULTS
//---------------------------------------------------------------
function scrResults(R){
  const ev=R.course.ev;
  const myPen = R.fell ? 999 : Math.round(R.penalties*10)/10;
  // simulated field: skill improves at higher star. lower is better.
  const N = 8 + ev.star;
  const field=[];
  for(let i=0;i<N-1;i++){
    const skill = rnd(0,1);
    let p = Math.max(0, (skill*ev.star*7) + rnd(0,18) - 6);
    if(Math.random()<0.12) p += 20; // an AI run-out
    if(Math.random()<0.05) p += 200; // AI elimination
    field.push({ name:pick(AI_NAMES), pen:Math.round(p*10)/10, me:false });
  }
  field.push({ name:San(G.rider), pen:myPen, me:true, fell:R.fell });
  field.sort((a,b)=>a.pen-b.pen);
  const place=field.findIndex(f=>f.me)+1;
  // prize money by placing
  const prizeTable=[0.4,0.24,0.15,0.09,0.06,0.04,0.02];
  let prize = R.fell ? 0 : Math.round((prizeTable[place-1]||0)*ev.purse);
  if(place===1) prize=Math.round(ev.purse*0.4);
  G.money+=prize; G.played=(G.played||0)+1;
  // record
  G.career.push({ venue:ev.venue, star:ev.star, place, pen:myPen===999?0:myPen, prize });
  if(!R.fell && (G.bestPen==null || myPen<G.bestPen)) G.bestPen=myPen;
  // progression: a clear-ish round unlocks next event
  const advanced = !R.fell && myPen < 45 && G.eventIdx===ev.id && G.eventIdx<EVENTS.length-1;
  if(advanced){ G.eventIdx++; G.selEvent=G.eventIdx; } else { G.selEvent=ev.id; }
  G.horse.mood=clamp(G.horse.mood + (place<=3?8:place<=6?2:-2),0,100);
  G.horse.fitness=clamp(G.horse.fitness-4,0,100); // running takes it out of them
  save();

  const ros = place===1?'🥇':place===2?'🥈':place===3?'🥉':(place<=6?'🎗️':'');
  Audio_.startMusic('menu');
  if(place===1){ Audio_.play('fanfare'); } else if(place<=3){ Audio_.play('coin'); }
  show(`<div class="screen on"><div class="topbar"><h2 class="cinzel">${San(ev.venue)}</h2>
      <span class="stars" style="margin-left:auto">${starStr(ev.star)}</span></div>
    <div class="scroll"><div style="max-width:460px;margin:0 auto">
      <div class="card center" style="border-color:${place<=3?'var(--gold-d)':'var(--line)'}">
        <div class="rosette">${ros||'🐴'}</div>
        <h1 class="cinzel" style="font-size:34px">${place}${ord(place)} place</h1>
        <div class="muted">${R.fell?'Did not finish — a fall on course':`${myPen.toFixed(1)} penalties · ${fmtTime(R.elapsed)}`}</div>
        <div style="margin-top:8px" class="row center-x" style="justify-content:center;gap:8px">
          <span class="pill">Jump faults ${R.jumpPen||0}</span>
          <span class="pill">Time ${R.fell?'—':(R.timePen||0)+' '}</span>
          <span class="pill money">Won ${fmt(prize)}</span>
        </div>
        ${advanced?`<div class="card" style="margin-top:12px;border-color:var(--green)"><b>🎉 You've moved up!</b><br><span class="muted">Next up: ${San(EVENTS[G.eventIdx].venue)} (${starStr(EVENTS[G.eventIdx].star)}).</span></div>`:''}
        ${(!R.fell && !advanced && myPen>=45 && ev.id===G.eventIdx && G.eventIdx<EVENTS.length-1)?`<div class="faint" style="font-size:12px;margin-top:10px">A cleaner round (under 45 faults) moves you up a level.</div>`:''}
        <div class="commentary faint" style="font-size:12.5px;margin-top:10px;font-style:italic">“${commentary(place,myPen,R)}”</div>
      </div>
      <div class="card" style="margin-top:12px"><h3 class="cinzel">Final Standings</h3>
        <div style="margin-top:6px">${field.slice(0,8).map((f,i)=>`<div class="result-row ${f.me?'me':''}">
          <span>${i+1}. ${San(f.name)}</span><span>${f.pen>=900?'ELIM':f.pen.toFixed(1)}</span></div>`).join('')}
          ${place>8?`<div class="result-row me"><span>${place}. ${San(G.rider)}</span><span>${myPen>=900?'ELIM':myPen.toFixed(1)}</span></div>`:''}
        </div></div>
      <div class="row" style="margin-top:14px">
        <button class="btn grow" id="again">Ride Again</button>
        <button class="btn sec" id="yard">To the Yard</button>
      </div>
    </div></div></div>`);
  $('#again').onclick=()=>{ const e=EVENTS[Math.min(ev.id,EVENTS.length-1)]; if(G.money<e.fee){ flash('Not enough for entry — drop a level in the yard.'); scrYard(); return;} Audio_.play('bell'); G.money-=e.fee; save(); scrBrief(e); };
  $('#yard').onclick=()=>{ Audio_.play('click'); scrYard(); };
}
const AI_NAMES=['Bramble Down','Iron Kestrel','Miss Marigold','Sir Prize','Copper Penny','Gale Force','Whistlejacket','Duke of Puddles','Nutmeg','Baywatch','Lady Larkspur','Thunderclause','Odds Bodkin','Fern Gully','Captain Carrot','Moonpie','Rowan Rex','Biscuit Tin','Errol','Tuppence'];
function commentary(place,pen,R){
  if(R.fell) return "A tumble at the worst moment — but horse and rider are up and fine. That's eventing.";
  if(place===1) return pick(["A masterclass across the country — they'll be talking about that round for weeks.","Absolutely foot-perfect. The crowd is on its feet.","Clear, bold and inside the time. Simply superb."]);
  if(place<=3) return pick(["A cracking round — right in the mix at the sharp end.","Gutsy riding. A rosette thoroughly deserved.","So nearly the win — a class performance."]);
  if(pen<30) return pick(["Solid and safe — a confidence-builder for the pair.","Tidy work. The engine's there for bigger things.","A workmanlike round with plenty to like."]);
  return pick(["A gutsy education round — every mile makes the horse.","Not their day, but they lived to fight another.","Plenty to work on at home — but the heart is there."]);
}
